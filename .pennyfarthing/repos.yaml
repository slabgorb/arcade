pr_title_format: '{type}({scope}): {title}'
repos:
  orchestrator:
    path: .
    type: orchestrator
    default_branch: main
    # MUST be the literal "trunk-based" — pf's branch-protection hook compares
    # against that exact string (pf/hooks/branch_protection.py). A bare "trunk"
    # silently falls through to the gitflow path and PROTECTS main, blocking the
    # direct sprint commits this repo is supposed to allow.
    branch_strategy: trunk-based
    description: 'Coordination repo for a series of browser-based vector arcade games.

      Holds shared context, sprint/session tooling, tmux session launcher,

      and Pennyfarthing workflows. Each game is a separate subrepo below.

      '
    language: markdown
    notes: 'No application code lives here. Game code lives in the subrepos.

      New games are added as sibling subrepos and registered in this file.

      '
  tempest:
    path: tempest
    type: ui
    default_branch: develop
    branch_strategy: gitflow
    description: 'Faithful browser-based vector clone of Atari''s 1981 Tempest.

      Canvas 2D rendering, no backend, no game/physics engine.

      src/core holds the deterministic sim; src/shell holds render/audio/io.

      '
    language: typescript
    languages:
    - typescript
    framework: vite
    dev_command: npm run dev
    build_command: npm run build
    test_command: npm test
    notes: 'First game in the arcade series. Gitignored subrepo with its own

      git history. Pure game code — sprint/epics managed at the orchestrator.

      '
  lobby:
    path: lobby
    type: ui
    default_branch: develop
    branch_strategy: gitflow
    description: 'Arcade lobby / front-end shell: a vector-style menu on black that
      lists

      the games as glowing tiles, launches them, runs an attract-mode demo loop

      when idle, and shows per-game high scores. Canvas 2D, no backend.

      '
    language: typescript
    languages:
    - typescript
    framework: vite
    notes: 'Second subrepo in the arcade series. Gitignored, with its own git history.

      Pure game code — sprint/epics managed at the orchestrator (epic 7). Project

      scaffold is story 7-1; dev/build/test commands land once that story is done.

      '
    dev_command: 'npm run dev      # vite dev server on http://localhost:5270/lobby/'
    build_command: 'npm run build  # tsc --noEmit && vite build'
    test_command: 'npm test        # vitest run --passWithNoTests'
  star-wars:
    path: star-wars
    type: ui
    default_branch: develop
    branch_strategy: gitflow
    description: 'Faithful browser-based vector clone of Atari''s 1983 Star Wars.

      First-person 3D cockpit shooter (TIE fighters → Death Star surface →

      trench run). Canvas 2D glowing vectors, no backend, no 3D engine.

      src/core holds the deterministic sim + the "Math Box" (math3d); src/shell

      holds render/input/loop.

      '
    language: typescript
    languages:
    - typescript
    framework: vite
    dev_command: npm run dev
    build_command: npm run build
    test_command: npm test
    notes: 'Third subrepo in the arcade series. Gitignored, with its own git history

      (origin github.com/slabgorb/star-wars, default branch develop). Pure game

      code — sprint/epics managed at the orchestrator. Authentic model/audio data

      is ported from the cabinet disassembly under reference/ (gitignored).

      '
  asteroids:
    path: asteroids
    type: ui
    default_branch: develop
    branch_strategy: gitflow
    description: 'Faithful browser-based vector clone of Atari''s 1979 Asteroids.

      Top-down inertial shooter (thrust/rotate ship, splitting rocks, saucers).

      Canvas 2D glowing vectors, no backend, no game/physics engine.

      src/core holds the deterministic sim; src/shell holds render/audio/io.

      '
    language: typescript
    languages:
    - typescript
    framework: vite
    dev_command: npm run dev
    build_command: npm run build
    test_command: npm test
    notes: 'Fourth subrepo in the arcade series. Gitignored, with its own git history

      (origin github.com/slabgorb/asteroids, default branch develop). Pure game

      code — sprint/epics managed at the orchestrator.

      Served under /asteroids/ on port 5275.

      '
  battlezone:
    path: battlezone
    type: ui
    default_branch: develop
    branch_strategy: gitflow
    description: 'Faithful browser-based vector clone of Atari''s 1980 Battlezone.

      First-person 3D wireframe tank duel on a flat plain (dual-tread steering,

      green radar scanner, ROM-positioned obstacles). Canvas 2D glowing green

      vectors, no backend, no 3D engine. src/core holds the deterministic planar

      sim + the ported "Math Box" (math3d); src/shell holds render/input/loop/audio.

      '
    language: typescript
    languages:
    - typescript
    framework: vite
    dev_command: npm run dev
    build_command: npm run build
    test_command: npm test
    notes: 'Fifth subrepo in the arcade series. Gitignored, with its own git history

      (origin github.com/slabgorb/battlezone, default branch develop). Pure game

      code — sprint/epics managed at the orchestrator (epic bz1).

      math3d is PORTED verbatim from star-wars (shared-lib extraction deferred);

      authentic ROM data is quarried under reference/ (gitignored) from bz1-2 on.

      '
  red-baron:
    path: red-baron
    type: ui
    default_branch: develop
    branch_strategy: gitflow
    description: 'Faithful browser-based vector clone of Atari''s 1980 Red Baron. First-person WWI biplane dogfight over a vector landscape (banking flight, tilting horizon, mountains, balloons, ground targets). Battlezone''s Math Box/AVG hardware twin. Canvas 2D glowing vectors, no backend, no 3D engine. src/core holds the deterministic flight sim; src/shell holds render/input/loop/audio.'
    language: typescript
    languages:
    - typescript
    framework: vite
    dev_command: npm run dev
    build_command: npm run build
    test_command: npm test
    notes: 'Seventh subrepo in the arcade series. Gitignored, with its own git history (origin github.com/slabgorb/red-baron, default branch develop). Pure game code — sprint/epics managed at the orchestrator (epics rb1-rb5). First arcade game built as a native @arcade/shared consumer (math3d/rng/highscore/loop at v0.5.0) rather than porting the Math Box. Served under /red-baron/ on port 5277.'
  arcade-shared:
    path: arcade-shared
    type: library
    default_branch: develop
    branch_strategy: gitflow
    description: 'Shared library for the arcade vector games, published as @arcade/shared

      and consumed by each game + the lobby as a version-pinned git-URL dependency.

      Planned subpath exports: /math3d (the ported Atari Math Box), /rng (seeded PRNG),

      /highscore (the lobby/games high-score contract), /loop. Pure shared logic —

      no backend, no rendering.

      '
    language: typescript
    languages:
    - typescript
    framework: vite
    build_command: npm run build
    test_command: npm test
    notes: 'Sixth subrepo in the arcade series. Gitignored, with its own git history

      (origin github.com/slabgorb/arcade-shared, default branch develop, gitflow).

      Established by ADR-0001; package scaffold (exports map, prepare -> ESM + .d.ts

      build, build/test commands) lands in story SH-1. Eligibility bar: only code

      byte/algorithm-identical across >=2 games belongs here.

      '
