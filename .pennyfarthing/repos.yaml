# Repository Configuration for arcade
# Generated by Pennyfarthing project-setup workflow
#
# arcade is the orchestrator for a series of vector-style arcade games.
# Each game lives in its own gitignored subrepo (separate git history).

pr_title_format: "{type}({scope}): {title}"

repos:
  orchestrator:
    path: .
    type: orchestrator
    description: |
      Coordination repo for a series of browser-based vector arcade games.
      Holds shared context, sprint/session tooling, tmux session launcher,
      and Pennyfarthing workflows. Each game is a separate subrepo below.
    language: markdown
    notes: |
      No application code lives here. Game code lives in the subrepos.
      New games are added as sibling subrepos and registered in this file.

  tempest:
    path: tempest
    type: ui
    description: |
      Faithful browser-based vector clone of Atari's 1981 Tempest.
      Canvas 2D rendering, no backend, no game/physics engine.
      src/core holds the deterministic sim; src/shell holds render/audio/io.
    language: typescript
    languages: [typescript]
    framework: vite
    dev_command: npm run dev      # vite dev server on http://localhost:5273
    build_command: npm run build  # tsc --noEmit && vite build
    test_command: npm test        # vitest run --passWithNoTests
    notes: |
      First game in the arcade series. Gitignored subrepo with its own
      git history, sprint/, and .pennyfarthing/.

# Architecture notes:
# - Orchestrator pattern: arcade coordinates, each game is an independent subrepo.
# - Games share a visual language (glowing vector lines on black) but no code yet;
#   extract a shared library only once a second game proves the duplication.
