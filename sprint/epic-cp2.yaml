  - id: cp2-8
    title: Pointer-lock takes two clicks to bind — first click does not acquire
    description: "USER-REPORTED (2026-07-19, cp2-2 human smoke test, real browser tab on this checkout's merged develop): binding the mouse takes TWO clicks — the first click does not acquire pointer lock, the second does. Reproduces on initial bind (user phrasing: 'takes two clicks to bind the mouse'). SUSPECTS, in order: (1) cp2-2's createPointerLock request() deliberately swallows the requestPointerLock() rejection (input.ts:174-178) — correct for the Escape-cooldown path, but it may now be silently eating a FIRST-click failure (e.g. a transient rejection or an engine quirk) that was previously loud; log-then-diagnose before assuming. (2) A first-click focus/gesture ordering issue: the first click may be spent focusing the canvas/window (or an overlay/start interaction) so the lock request happens without the expected engagement state. (3) The pointerlockchange/pointerLockElement guard mis-detecting an acquire as an exit and immediately resetting. It is UNKNOWN whether the double-click predates cp2-2 — the pointer-lock path was never live-verified before this smoke test (cp1-6 Dev finding), so do NOT assume regression; check out d7d27c8 (pre-cp2-2) locally and compare first-click behaviour as the first diagnostic step. Ends with a human re-test: ONE click must bind."
    points: 2
    priority: p1
    status: backlog
    repos: centipede
    workflow: tdd
    acceptance_criteria:
