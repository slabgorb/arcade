      - "Wave-1 train: 12 segments enter and march per MOTION; mushroom and edge encounters drop a row and reverse direction per OBSTAC; behaviour pinned by deterministic seeded tests."
      - "Poisoned-dive branch test-pinned from a debug-seeded poison field (no scorpion yet): the head plunges to the bottom zone per the transcribed MOTION poison path."
      - "The gun can no longer glide into a mushroom cell (horizontal or vertical), per MOVE's own OBSTAC calls; cp1-5's movement/TBLMT tests stay green."
