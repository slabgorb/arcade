id: cp2
type: epic
title: Centipede — the train (MOTION/OBSTAC/NEWHD/EXPLOD, poisoned dives, death + RESTOR) + cp1 escape fixes
description: "Second centipede epic — the centipede train plus the cp1 escapes. DESIGN SPEC: centipede/docs/superpowers/specs/2026-07-18-centipede-clone-design.md (roadmap row cp2: MOTION, OBSTAC, NEWHD, EXPLOD, poisoned dives; demo 'Full wave 1 vs the centipede'). GROUND TRUTH: centipede/docs/rom-study/ — cite the dossier + claims, never re-derive; the citation gate is live since cp1-2 (129 claims green at cp1 close). SUBSYSTEM ANCHORS (subsystems.md, rev-4 CENTI4.MAC): CENTPC init :456, MOTION :1277, NEWHD :1643, OBSTAC :1689, OVRLAP :1741, PLAY :1769, EXPLOD :961, RESTOR :1826. SLOT MODEL (glossary): segments in slots 0-11 (NCENT =12. — DECIMAL by trailing period, CENDEF.MAC:119), flea 12, spider 13, shot 14, gun 15. RADIX: CENTI4.MAC inherits .RADIX 16 via CENDE4 — every bare literal is hex unless trailing-period decimal; every transcribed constant carries a radix-cited comment + a claims entry. SCOPE DEVIATION FROM THE SPEC ROADMAP (logged here deliberately): player death + the frame-stepped RESTOR sweep move UP from cp3 into cp2 per the reviewer-accepted cp1-6 routing ('RESTOR -> cp2 (death + the train)') — a full wave-1 demo without death is not a wave; cp3 rescopes to the menagerie (spider/flea/scorpion, their collisions + scoring, poison creation going LIVE). Poisoned DIVES stay in cp2 per the spec (MOTION owns the branch) but are test/debug-seeded only until the scorpion exists (cp1-6 TEA finding: poison codes 0x38-0x3B unexercised live before cp3). CARRY-FORWARDS OWNED HERE: (a) USER-REPORTED DEFECT 2026-07-19 — every sprite/glyph renders rotated 90 degrees clockwise (cp2-1, lands FIRST: all later visual verification depends on it); (b) cp1-6 review R1 >60Hz input sampling + R4/R5 pointer-lock hardening + the HUMAN pointer-lock smoke test (cp2-2); (c) cp1-5 gun-vs-mushroom MOVE blocking via OBSTAC (cp2-3, where OBSTAC is transcribed). Staying elsewhere: wave colour cycling + the 0x06/0x07 palette-decode divergence (cp4); R3 test-hardening rides with cp2-1 (same test files). Sequencing: cp2-1 first; cp2-2 parallel; cp2-3 -> cp2-4 -> cp2-5. Demo at epic end: full wave 1 vs the centipede on 5278."
priority: p1
status: backlog
