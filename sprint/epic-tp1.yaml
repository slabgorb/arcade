id: tp1
type: epic
title: Tempest — ROM fidelity against Theurer's original 1981 source
description: "Remediation epic for docs/2026-07-12-tempest-primary-source-audit.md, the first audit of our clone against Dave Theurer's ORIGINAL 1981 Atari assembler source (primary source at ~/Projects/tempest-source-text; the CRLF sibling ~/Projects/tempest-source is NOT citable). Our clone was built from SECONDARY sources — the \"Tempest vs Tempest\" book and a third-party disassembly — and the audit found the book wrong 9 times and our own docs/ux/2026-06-27-enemy-roster-rom-extract.md wrong as well, with production code citing it as authority. 236 findings, every citation byte-verified on both sides; 114 recommended fix, merged here into 21 stories. THE HEADLINE: the ROM runs at 28.44 fps (256/9), not 60 — our sim is 2.11x too fast and warp acceleration, which carries the base squared, is 4.45x too fast. The rebase (tp1-1) BLOCKS EVERY OTHER NUMERIC STORY: anything numeric that lands before it re-bakes the 60 and then confirms itself against this document. Second: enemies in the ROM are a bytecode VM (the CAM) with per-level programs — a level-1 flipper never flips while climbing — which our five hand-written state machines cannot express at any constant setting, so src/core/enemies/ does not survive this epic. RULINGS (PM gate, 2026-07-13): the full programme is committed at p1, not trickled; the 24-point CAM+nymph rewrite is bought; SPIKE_MAX_DEPTH is restored to the ROM's 0.929 but ONLY behind the warp-dive rework (tp1-10), since story 6-15's 0.75 was a conscious playability deviation that is only safe to undo once a spike crash replays the wave; SC-001 (the arcade's high-score ladder is 8 deep, @arcade/shared ships 10) is WON'T-FIX — the cabinet-wide convention beats one game's fidelity and it is not filed anywhere. Every story's acceptance criteria cite the ROM; tools/audit + tests/audit/citations.test.ts re-open every cited line byte-for-byte and must stay green."
priority: p1
status: backlog
repos: tempest
stories:
  - id: tp1-1
    title: "THE REBASE — the ROM runs at 28.44 fps (256/9), not 60; our sim is 2.11x too fast"
    description: "Cluster C1. Subsumes FR-001, FR-004, FR-006..FR-015, FR-017, WD-008, WD-009, W-028, W-045, B-005, DA-010 (19 findings — the same error filed nineteen ways). The single most important finding in the audit and the gate on the whole epic. LAND THIS ALONE AND FIRST: every other numeric story is downstream, and any of them that lands first bakes the 60 into its own baseline and then 'confirms' itself against this document. Every timing test re-baselines as part of this story — that is expected, not a regression."
    points: 8
    priority: p1
    status: done
    started: '2026-07-13'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - "A single named constant ROM_FPS = 256/9 (28.444...) exists in core, is cited to the ROM, and is the only place that number is written."
      - "Every explicit `* 60` and `/ 60` in the sim is gone or rebased — rules.ts:46,52,120,154; sim.ts:113,223; flipper.ts:27,39; BULLET_SPEED. Grep proves zero remaining bare 60s used as a frame rate in src/core/."
      - "FR-012 is DECIDED IN WRITING, not left implicit: either the sim's fixed timestep becomes 9/256 s, or every ROM frame count is converted through ROM_FPS at its use site. The choice is recorded in rules.ts with rationale; a mix of both is a failure."
      - "The starfield is driven by the sim, not by requestAnimationFrame (FR-017), and render.ts:905's `renderTime += 1/60` is rebased."
      - "warpAccel's 4.45x error resolves as a CONSEQUENCE of the rebase (it carries the base rate squared) — a test pins warp velocity against the ROM's value rather than against a hand-tuned number."
      - "The game is demonstrably playable at the new rate — this story is allowed to surface that other constants are wrong, but it must NOT compensate for them by re-tuning anything outside the frame-rate family. Those are other stories."
      - "WD-010 (moved here from tp1-3, 2026-07-13, user-approved): warpAccel is fed a 0-based CURWAV, not a 1-based level (rules.ts:51). One character — but it was ordering-constrained behind this story (fixing it while the 60 is still baked in re-bakes the 60), and this story rewrites warpAccel anyway per the AC above. It lands here so it cannot be lost. tp1-3 no longer carries it. >> NOT SHIPPED BY THIS STORY — it was lost exactly as this AC feared, and landed in tp1-23. The move arrived at 17:01 UTC, after this story's session file had snapshotted its other seven ACs at 16:35 and gone into green; tp1-1 merged (tempest#97, d75a4a2) satisfying those seven and never read this eighth. tp1-23 recovered it and fixed it at the CALL SITE (sim.ts, warpAccel(s.level - 1)), leaving this story's ROM_FPS rebase of warpAccel untouched. Deliberately left unticked, as the record of the gap."
      - "npm test -- citations stays green."
