      - "The enemy death burst is WHITE, not yellow — EXPCOL=WHITE; all four EXPL1-4 open CSTAT WHITE. (render.ts:460 ENEMY_BURST_COLOR, V-012 = DA-005)"
      - "SCORE_SPIKE_SEGMENT is 1, not 3. (rules.ts:27, B-016)"
      - "The burst brightness ramp is off by one frame — only frame 0 is dim, not frames 0 and 1: `frame < 2` becomes `frame < 1`. (fx.ts:233, DA-006)"
      - "DEMO_FIRE_LANES is `< 2`, not `<= 2`. (sim.ts:680, B-009)"
      - "The spiker hops to the NEEDIEST lane (shortest or empty), not the tallest — one inverted comparison. This changes the shape of every board: it is why our spikes pile into one lane and the arcade's spread across the well. (sim.ts:169, W-040)"
      - "The fuseball's vulnerability is INVERTED — the arcade's fuseball is killable ONLY while rolling between lanes, and is bulletproof on a lane and at the rim. Ours is the exact opposite. (sim.ts:316, fuseball.ts:41, W-022)"
      - "The invented pulsar strobe is dropped — the ROM's colour is a clean binary toggle for the whole pulse window. (render.ts:363, DA-020)"
