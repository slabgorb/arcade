  - id: tp1-28
    title: The audit doc says MAYBLR chases on an EVEN invader index. It is ODD, and the error has now propagated through three documents.
    description: "Found by TEA and Dev during tp1-25 (2026-07-14). docs/audit/findings/pair-1-alwelg-sim-enemies.json, finding W-023, states in its `claim`: 'MAYBLR only chases on an EVEN invader index (2157-2159).' It is FALSE. ALWELG.MAC:2157-2160 is `TXA / LSR / BCC LEFRIT / JSR FUCHPL`: LSR shifts bit 0 into the carry, BCC branches when the carry is CLEAR — an EVEN index — and that branch goes to LEFRIT, the COIN. The chase (FUCHPL) is what falls through, on an ODD index. The ROM's own comment on 2157 reads ';YES. ONLY IF INDEX IS EVEN' and is simply wrong — the auditor copied the comment instead of reading the branch. From there it propagated: audit claim -> tp1-25's story description -> tp1-25's AC-3, which asked for an 'even-invader-index gate'. This is the same disease as rb4-2 in red-baron: a doc that is cited as authority and is wrong. It cannot spread silently any more (tests/core/tp1-25.source-rules.test.ts pins the refutation with the call-site citation), but the doc still says it. Correct the claim. Do NOT touch the citations' line numbers or the remediated_by mechanics — only the prose that is false."
    points: 1
    priority: p2
    status: backlog
    repos: tempest
    workflow: trivial
    acceptance_criteria:
      - W-023's `claim` in docs/audit/findings/pair-1-alwelg-sim-enemies.json no longer asserts an EVEN gate. It states the code's behaviour — the chase falls through on an ODD index — and cites ALWELG.MAC:2157-2160, noting that the ROM's own comment on 2157 contradicts its own code.
      - "The rest of the claim is preserved, including the parts that are RIGHT: TWFUSC's first record starts at wave 17, and TR alternates 0/$40 across 17-32 (the audit had this correct; it was the story that garbled it into a 'ramp')."
      - npm test -- citations stays green and `node tools/audit/reanchor-citations.mjs` reports 0 lost. The existing refutation test in tests/core/tp1-25.source-rules.test.ts still passes UNCHANGED — it is the guard that stops this being 'corrected' back.
    type: bug
  - id: tp1-29
    title: Give an enemy a STABLE slot id — the port has none, and at least one ROM rule (MAYBLR's parity gate) cannot be ported faithfully without it
    description: "Found by Dev during tp1-25 (2026-07-14); the blocker behind that story's deviation D2. The ROM indexes invaders by X, a slot in the fixed INVAY array: INIINV (ALWELG.MAC:345-350) allocates NINVAD slots once and walks them with DEX, and a slot belongs to an invader for its whole life. The port has no such thing — s.enemies is a SPLICED array (sim.ts, `s.enemies.filter((_, i) => !deadEnemies.has(i))`), so an enemy's index SHIFTS whenever an EARLIER enemy dies. Any ROM rule keyed on the invader index therefore cannot be ported: MAYBLR's parity gate (2157-2160, which chases only on an ODD index — see tp1-28) is the one in front of us, and it is unlikely to be the last. Implementing it on array position would be WORSE than omitting it: a fuseball's chase would flicker on and off as UNRELATED enemies were shot, a behaviour the arcade has not got — it would trade a known, bounded deviation for an invented one. Give an enemy a slot id assigned at spawn and stable for its life, then implement MAYBLR's gate on it."
    points: 3
    priority: p3
    status: backlog
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - An enemy carries a stable slot id, assigned at spawn and unchanged for its lifetime — it must NOT be its index in s.enemies, and it must survive the death of any other enemy. A test kills an earlier enemy and proves a later one's id did not move.
      - MAYBLR's gate is implemented on that id and chases on an ODD index, per ALWELG.MAC:2157-2160 (`TXA / LSR / BCC LEFRIT / JSR FUCHPL`) — NOT the EVEN one the ROM's own comment claims. Cite the branch, not the comment.
      - "tp1-25's deviation D2 is retired. Its behavioural tests (tests/core/tp1-25.fuseball-chase.test.ts) must be re-examined, NOT weakened: they pin a lone fuseball chasing at waves 18/49/100, which under a parity gate depends on that fuseball's slot. Make the test's fixture explicit about the slot rather than deleting the assertion."
      - npm test -- citations stays green and `node tools/audit/reanchor-citations.mjs` reports 0 lost.
    type: refactor
