  - id: tp1-4
    title: "THE CAM, part 1 — build the bytecode interpreter and the 11 enemy programs, selected per wave from CAMWAV"
    description: "Cluster C2, first half. Subsumes W-005, W-006, W-007, W-008 and W-025 (NOT W-009 — see below). Enemies in the ROM are a bytecode VM, not state machines. Our five per-kind steppers cannot express, AT ANY CONSTANT SETTING: 'move N frames then flip' (MOVJMP), 'flip continuously while climbing' (SPIRAL), 'reverse direction every 2 jumps then every 3' (SPIRCH), 'flip only when not standing on a spike' (COWJMP), 'flip AWAY from the player' (AVOIDR), or 'crouch 4 frames at the rim then jump toward the player at double angular speed' (TOPPER). This is a rewrite of src/core/enemies/, not a constant tweak. The behavioural tell that the whole cluster is right: a level-1 flipper NEVER flips while climbing. DELIVERED: it closed W-007 and W-025 as well (the CAM has no random-direction opcode at all — rotation is INVROT, set only by VCHPLA/VCHROT), but it did NOT build the CHASER, so W-009 moves to tp1-5."
    points: 8
    priority: p1
    status: done
    started: '2026-07-13'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - "A CAM interpreter exists in core with the ROM's 20 opcodes, each cited to the source, and is pure/deterministic (no Date, no Math.random — the hard architectural boundary in CLAUDE.md holds)."
      - "All 11 CAM programs are transcribed from the ROM, not paraphrased: MOVJMP, SPIRAL, SPIRCH, COWJMP, AVOIDR, TOPPER and the rest."
      - "The flipper's program is selected PER WAVE from CAMWAV — not a single hard-coded behaviour."
      - "ORACLE TEST: on wave 1, a flipper never flips while climbing. This is the single sharpest behavioural difference from our current build and it must be pinned as a test."
      - "The old per-kind steppers in src/core/enemies/ are deleted, not left dead alongside the interpreter."
      - "Determinism holds: stepGame(state, input, dt) still produces identical output for identical input, driven by the seeded RNG in GameState."
      - "npm test -- citations stays green."
    completed: '2026-07-13'
    type: refactor
    review_findings: "APPROVED on re-review (round 2). Two Highs were found and fixed: (1) shortestRot applied modular wrap on OPEN wells, which the ROM explicitly prevents (WELTYP=0xFF, ';PREVENT WRAP', POLDEL's IFPL guard) — and BOTH of AVOIDR's waves (10, 15) are open sheets, so the avoidance flipper charged the player on 100% of the waves it runs on; (2) the CAM behaviour fixture never rebuilt s.tube, so every wave was tested on level 1's closed circle — the reason (1) shipped green. Also fixed: the mid-jump grab gate now reads the jumping STATE not the kind (pulsars jump under the CAM); the assembler now throws on a jump target past 0xff instead of silently truncating; four stale flipTimer comments. 932/932 green, build clean, citation gate green. THREE NON-BLOCKING FINDINGS ROUTED TO tp1-5, all of which tp1-5 touches directly: (a) jchpla has no zero-delta branch but the ROM does (ASL/IFCC treats zero as positive and sets CCW unconditionally) — CHASER calls JCHPLA for its pincer direction, so tp1-5 must close it; (b) the pulse kill was not widened alongside the grab gate, so a mid-jump pulsar can still electrocute but not grab; (c) speedFor's default throws at runtime but gives no compile-time exhaustiveness — assertNever would fail the build when tp1-5 adds its sixth EnemyKind."
    review_verdict: approved
  - id: tp1-5
    title: "THE CAM, part 2 — the CHASER rim state with its pincer rule, rule-driven flip direction, and the pulsar's program"
    description: "Cluster C2, second half. Subsumes W-009 (the CHASER, moved here from tp1-4), W-023, W-026, W-027, W-032. NOTE: W-025 (the pulsar flips TOWARD the player) and W-007 (rule-driven flip direction) were CLOSED BY tp1-4 — the CAM it landed has no random-direction opcode, so there is no coin flip left to remove. What remains here is the CHASER: the rim state with its own counter and pincer rule (TOPPER is already transcribed and byte-verified in the CAM, so the interpreter is done — only the rim STATE is missing). PREREQUISITES LEFT BY tp1-4's REVIEW, all of which this story touches directly: (1) jchpla has no zero-delta branch, but the ROM's JCHPLA does — ASL/IFCC treats a delta of ZERO as positive and sets INVROT to CCW unconditionally, and CHASER CALLS JCHPLA to pick its pincer direction, so a chaser on the player's own lane currently gets a history-dependent direction; (2) fastestFlipperRimSpeed() in src/shell/input.ts still returns the pre-CAM 4 frames/lane — TOPPER's real cadence is a VSLOOP 4 crouch plus JUMP_ANGLE_STEPS/WTTFRA frames (~6.7), so the keyboard escape margin must be re-derived against it; (3) speedFor's default throws at runtime but gives no compile-time exhaustiveness — this story adds a sixth EnemyKind, so use assertNever; (4) the pulse kill (sim.ts) was not widened alongside the mid-jump grab gate."
    points: 6
    priority: p1
    status: done
    started: '2026-07-14'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - "Flip direction is derived from the ROM's rule, not from the RNG. A test proves that two enemies in identical positions flip the same way."
      - "The CHASER rim state exists with the ROM's pincer rule — enemies at the rim converge on the player from both sides rather than milling."
      - "The pulsar runs a CAM program like every other enemy; its bespoke stepper is gone."
      - "Depends on tp1-4 (the interpreter). This story does not re-implement it."
      - "npm test -- citations stays green."
    completed: '2026-07-14'
    type: refactor
    review_findings: "HIGH: W-032's fix is unreachable dead code. The ROM uses ONE constant ($20) for both the carrier auto-split (JSMOVE, CMP I,20/IFCC) and SPLCHA's too-close test, so every naturally-arriving tanker is 'too close' and its children always get NEWGEN (no flipping). We split at TANKER_SPLIT_DEPTH=0.9 (INVAY 38.4), below the $20 band (INVAY 32 = depth 0.9286), so t.depth >= SPLIT_TOO_CLOSE_DEPTH is never true. Proven: deepest reachable tanker depth is 0.897 across levels 1-81. Gameplay unchanged, yet W-032 is stamped remediated_by:tp1-5 in the machine-checked audit. The W-032 test hides this by hand-placing a tanker at depth 0.95. MEDIUM: W-023 replacement test lacks a liveness guard (frozen fuseball passes vacuously); prerequisite 3 half-delivered (scoreFor/enemyCanShoot/makeEnemy/stepGame still lack assertNever, and interpreter.ts:151 falsely claims otherwise); widened citation gate validates nothing once remediated_by + NO_COUNTERPART are both set. The ROM archaeology (CHASER, POLDEL, JCHPLA, JCHKPU, TOPPER cadence, the 7-of-40 pulse) is verified correct against ALWELG.MAC."
    review_verdict: approved
  - id: tp1-6
    title: "NYMPHS + THE 7-INVADER CAP — the arcade holds surplus enemies dormant; we have neither the cap nor the queue"
    description: "Cluster C3. Subsumes W-002, W-003, W-004, W-024, W-029, DA-012, DA-017. ONE OBJECT, NOT TWO CHANGES: the cap is not independently implementable. The ROM caps live invaders at 7 (NINVAD=7, WINVMX=6 for every wave 1-99) and regulates spawning by SLOT BACK-PRESSURE — nymphs simply stop advancing when the slots are booked. Without a nymph queue there is nowhere to hold the surplus, so adding the cap alone would silently drop spawns. Changes the difficulty of every wave. Also unblocks the fuseball turn-back (W-024) and the pulsar yo-yo (W-029), both keyed on NYMCOU."
