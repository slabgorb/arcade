  - id: tp1-26
    title: "The pulse and the potency zone are WAVE-PARAMETERISED in the ROM; we freeze both at their wave-1 value"
    description: "Found by Obi-Wan during the tp1-5 review and left homeless; filed on Jedi's instruction (2026-07-14). tp1-5 landed W-026 (the pulse is ONE global counter, PULSON stepped by PULTIM, lit for 7 frames of 40) and W-027 (a pulse only kills from inside the potency zone, PULPOT). Both are correct AT WAVE 1 AND WRONG LATER, because both constants are wave-parameterised in the ROM's WTABLE and we hardcoded the first row. WPULTIM (ALWELG.MAC:610-613): `.BYTE T1,1,48.,4 / .BYTE T1,49.,64.,6 / .BYTE T1,65.,99.,8` — PULTIM is 4 for waves 1-48, then 6, then 8. `PULSE_STEP = 4` (src/core/rules.ts) is the first row only. Since PULTIM is the counter's STEP, changing it changes the period AND the duty cycle AND the reachable residue class — the whole '7 frames of 40' derivation is a wave-1 result, not a universal one. WPULPOT (606-609): `.BYTE T1,1,32.,0A0 / .BYTE T1,33.,64.,0A0 / .BYTE T1,65.,99.,0C0` — PULPOT is $A0 through wave 64 and $C0 from 65. `PULSAR_NEAR_FAR_DEPTH` hardcodes $A0. AND IT IS REACHABLE: nothing caps the level (sim.ts increments s.level on every clear; MAX_SELECT_LEVEL=16 only bounds the STARTING wave). A player who survives past wave 48 gets a pulse on the wrong beat and, past 64, a potency zone in the wrong place. SECOND, SMALLER PROBLEM, same family: `PULSAR_NEAR_FAR_DEPTH` currently serves TWO distinct ROM constants — JPULMO's climb-speed threshold and PULPOT (the W-027 kill gate). They coincide at $A0 today and DIVERGE at wave 65, so a future correction to one will silently move the other."
    points: 3
    priority: p2
    status: backlog
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - "PULTIM is read per wave from WPULTIM (4 / 6 / 8 at waves 1-48 / 49-64 / 65-99), cited. The wave-1 behaviour tp1-5 pinned (period 40, lit for 7, seeded at -1 by INEWLI) must NOT regress."
      - "PULPOT is read per wave from WPULPOT ($A0 for 1-64, $C0 for 65-99), cited, and is given its OWN name — it must stop sharing an identifier with JPULMO's climb-speed threshold, which is a different ROM constant that merely happens to equal it below wave 65."
      - "A test derives the pulse period and duty cycle OUT OF THE RUNNING SIM (never by re-deriving the arithmetic in the test — that is how the audit and its own refuter both got 9 instead of 7) at a wave in each PULTIM band, and asserts they differ across the bands."
      - "A test pins the kill gate at a wave on each side of 65, so the $A0 -> $C0 step is real and not decorative."
      - "npm test -- citations stays green."
      - "READ THIS BEFORE YOU PORT THE TABLES — tp1-25 already fell into the hole waiting for you. Both WPULTIM (ALWELG.MAC:610-613) and WPULPOT (606-609) END AT WAVE 99, and s.level is NOT capped (sim.ts increments it on every clear; MAX_SELECT_LEVEL bounds only the SELECT screen). A naive table walk returns its end-of-table 0 at wave 100 — and 0 is far nastier here than it was for the fuseball: PULTIM is the pulse counter's STEP, so a step of 0 means the counter never advances and THE PULSE FREEZES FOREVER; PULPOT of 0 puts the kill zone at depth 0. The ROM never reaches the end of its own table because CONTOUR (415-423) folds it first: for CURWAV >= 98 it substitutes a RANDOM wave, `LDA RANDO2 / AND I,1F / ORA I,40` then INC, giving 65..96 — a band that lies wholly inside each table's last record, so the draw is UNOBSERVABLE and the answer is deterministic. Every table lookup must go through that fold."
      - Do NOT re-derive the fold per table. tp1-25 shipped it inline in wfuschForLevel (src/core/rules.ts) because it was the only bounded table at the time; this story makes it three. EXTRACT it once — a `contourWave(level)` helper carrying the ALWELG.MAC:415-423 citation — and route wfuschForLevel, WPULTIM and WPULPOT through it. The bug is in the SHAPE of the port, not in any one table, and the next table will inherit it.
      - A test drives each of the three lookups at a wave ABOVE the last record (100, 150) and asserts the ROM's answer, not 0. wfuschForLevel's existing deep-wave tests (tests/core/tp1-25.fuseball-chase.test.ts) must still pass UNCHANGED after the extraction.
    type: bug
  - id: tp1-27
    title: PLAYER_RIM_DEPTH = 0.92 is an invented constant, and tp1-24 just made it load-bearing — derive the grab line from the ROM byte or ratify it
    description: "Filed by Obi-Wan out of the tp1-24 review (2026-07-14). WHAT IT IS: PLAYER_RIM_DEPTH (src/core/rules.ts:84) is `export const PLAYER_RIM_DEPTH = 0.92` with a bare comment and no ROM derivation. Invert it: INVAY = 0xf0 - 0.92 * 224 = 33.92 — NOT a clean ROM byte. Every neighbouring constant in that file is derived from one ((0xf0 - 0x20) / WARP_ALONG_SPAN; PULSAR_ALONG_PER_FRAME * ROM_FPS / WARP_ALONG_SPAN), and a round decimal with a bare comment is the exact fingerprint of the two constants this epic has ALREADY caught and killed: TANKER_SPLIT_DEPTH = 0.9 (tp1-5) and SPLIT_CHILD_DEPTH = 0.85 (tp1-24). No finding tracks it — it appears only inside OTHER findings' prose (W-010's `ours`, W-030's claim, WD-016), never as a claim of its own. WHY IT MATTERS NOW: it was harmless while a tanker's children were clamped to 0.85 and could never reach it. tp1-24 deleted that clamp and ratified a DIFFICULTY CHANGE expressed entirely in terms of this constant — 'the children are born ABOVE PLAYER_RIM_DEPTH, therefore a player on a flanking lane dies on the burst frame'. The grab line is now load-bearing for how lethal the game is, and nobody has ever audited it. If 0.92 is wrong, the lethality window is wrong. THE LIKELY ROM SIDE: the grab is JKITST/kill-check territory (ALWELG.MAC ~1981-82 is already cited by W-010 for the mid-jump gate); find the byte the ROM actually compares INVAY against and derive the constant from it exactly as SPLIT_TOO_CLOSE_DEPTH derives from $20. A CONSEQUENCE WORTH TESTING EITHER WAY: because the grab line (0.92) and the no-flip line (0.9286) are different numbers, there is a band [0.92, 0.9286) in which a BULLET-split child is born both LETHAL (above the grab line) and FLIPPING (below the too-close line, so it runs the wave's cam and can jump onto the player). That band was unreachable under the old clamp and is reachable now. The two-threshold structure is authentic — the ROM's grab and no-flip tests genuinely are different bytes — but the sliver's WIDTH is set by this unaudited 0.92, and no test covers it."
    points: 2
    priority: p2
    status: done
    started: '2026-07-14'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - Find the ROM byte the kill-check actually compares INVAY against (JKITST / the grab path — W-010 already cites ALWELG.MAC:1981-82 for the mid-jump gate on the same routine) and quote it byte-exact.
      - EITHER derive PLAYER_RIM_DEPTH from that byte the way SPLIT_TOO_CLOSE_DEPTH derives from $20 — (0xf0 - BYTE) / WARP_ALONG_SPAN, no round decimals — OR, if the ROM genuinely has no such constant, ratify 0.92 as a deliberate divergence with the reasoning recorded in the audit, not in a code comment alone.
      - Whichever way it goes, it is a FINDING in docs/audit/findings/ with both citations, so the grab line stops being the one number in rules.ts that nobody has ever checked. Today it is referenced only inside other findings' prose.
      - "If the value MOVES: tp1-24's suite (tests/core/tp1-24.split-child-depth.test.ts) asserts children are born above PLAYER_RIM_DEPTH and that a flanking-lane player dies on the burst frame. Re-verify both against the new line — do not just let them re-derive and go green vacuously."
      - 'Cover the newly-reachable sliver [PLAYER_RIM_DEPTH, SPLIT_TOO_CLOSE_DEPTH): a tanker SHOT in that band drops children that are both lethal (above the grab line) AND flipping (below the too-close line). Untested today, and unreachable before tp1-24 removed the 0.85 clamp.'
