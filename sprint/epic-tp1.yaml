    review_verdict: approved
  - id: tp1-24
    title: "W-030's open half — the tanker's burst is THREE rules and we ship two: the children must be born at the PARENT's depth, above the grab line"
    description: "Filed by Obi-Wan and Yoda out of the tp1-5 review (2026-07-14). WHAT IT IS: W-030 (pair-1, DIVERGENCE, unremediated) asserts TWO divergences and its own refuter verified both byte-accurate. tp1-5 closed the FIRST — the carrier bursts at $20 (depth 0.9286), not our invented 0.9 — because it had to: JSMOVE (ALWELG.MAC:1748-1758) auto-splits a climbing carrier at `CMP I,20 / IFCC`, and the KILINV it routes to (2344) hands SPLCHA the SAME `CMP I,20 / IFCC`. One byte, read twice. Writing it as two numbers is what made W-032's no-flip rule dead code for a whole review cycle. THE SECOND HALF IS UNTOUCHED. KILINV (2300-2302) opens `LDA Y,INVAY / STA TEMP0` — the PARENT's own depth — and ACTINV (1219-1226) then seats each child with `LDA TEMP0 / STA Y,INVAY`. Both children are born at the parent's exact depth. Ours clamps them to SPLIT_CHILD_DEPTH = 0.85 (src/core/sim.ts:222, `const depth = Math.min(t.depth, SPLIT_CHILD_DEPTH)`). WHY THIS IS NOT A TYPO: 0.85 is a deliberate softening, and SPLIT_CHILD_DEPTH's own comment says so — 'Must be < PLAYER_RIM_DEPTH (0.92) so a rim-split is not an instant grab.' It predates this epic. THE ROM DOES THE OPPOSITE ON PURPOSE: the carrier bursts at 0.9286, which is ABOVE the 0.92 grab line, and drops both children there — instantly lethal — and the ONLY thing that makes that survivable is the no-flip rule (NEWGEN/W-032, landed in tp1-5): the children cannot flip ONTO you, so they can grab you only if you are already standing on a lane one of them landed on. Burst position, child position, and no-flip are ONE mechanism. We now ship two thirds of it, which means our rim-burst is materially gentler than the cabinet's — and gentler by accident, not by ruling. THIS IS A DIFFICULTY CHANGE. It must be ratified or closed on purpose, with a test, not left as residue. HOUSEKEEPING: W-030's title still asserts both halves and its `claim`/`reasoning` still quote the old `TANKER_SPLIT_DEPTH = 0.9`, so the finding reads half-stale; tp1-5 re-anchored its `ours` onto the surviving divergence rather than stamp a `remediated_by` that would have been a lie. Split the finding (or amend it) as part of this story so the ledger stops asserting a divergence that is closed."
    points: 2
    priority: p2
    status: done
    started: '2026-07-14'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - "DECIDE FIRST, then build: this is a playability ruling, not a transcription. Either (a) adopt the ROM — children are born at the parent's depth, above PLAYER_RIM_DEPTH, lethal on the lanes they land on — or (b) ratify the 0.85 clamp as a deliberate, cited divergence. Do not leave it as residue. Record the decision and its reasoning in the story."
      - "If (a): splitTanker seats both children at the PARENT's depth (KILINV 2300-2302 -> ACTINV 1219-1226, `LDA TEMP0 / STA Y,INVAY`), citing the source. SPLIT_CHILD_DEPTH is deleted, not left orphaned."
      - "If (a): a test drives a REAL tanker climb (never a hand-placed depth — the tanker is destroyed the frame it crosses TANKER_SPLIT_DEPTH, so any fixture seating one above it is testing a board the sim cannot produce; this is exactly how W-032's dead branch survived a full review cycle) and asserts the children are born above PLAYER_RIM_DEPTH."
      - "If (a): a test proves the burst is survivable — the no-flip rule (W-032) means a player NOT standing on a child's landing lane lives. If that test cannot be made to pass, that is the finding, and option (b) wins."
      - "If (b): SPLIT_CHILD_DEPTH's comment cites the ROM line it is deliberately departing from, and the divergence is recorded in the audit rather than in a code comment alone."
      - "W-030 stops being half-stale: split it into the closed half (split depth, remediated_by tp1-5, keeping its historical `ours`) and the open half, or amend its title/claim so it no longer asserts a divergence that is already fixed."
      - "npm test -- citations stays green, and `node tools/audit/reanchor-citations.mjs` reports 0 lost."
