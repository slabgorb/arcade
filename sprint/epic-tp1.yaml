      - "Live invaders are capped at 7 (NINVAD=7). WINVMX=6 for every wave 1-99 — a test proves the cap does not vary by wave, because the ROM's does not."
      - "Spawning is regulated by SLOT BACK-PRESSURE, not by a rate limiter. A surplus spawn is QUEUED, never dropped — a test proves no spawn is silently lost when the board is full."
      - "The fuseball turn-back (W-024) works, keyed on NYMCOU."
