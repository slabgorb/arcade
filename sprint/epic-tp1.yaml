    priority: p1
    status: backlog
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - tools/audit/check-citations.mjs reads the 'ours' side from the audit commit (git show 4232ed4:<file>), not from the working tree. The audit record is immutable by construction.
      - "The ROM 'source' side is still byte-checked unconditionally against ~/Projects/tempest-source-text (the LF copy — NEVER the CRLF sibling ~/Projects/tempest-source). This is non-negotiable: it is where the audit's authority lives."
      - The 82 citations tp1-1 re-pointed by hand and the 'remediated_by' flag it introduced are NOT reverted. They are the interim record and they stand.
      - 'A finding whose class is NO_COUNTERPART can never be marked remediated_by — today that combination hard-errors with a confusing message. Either make it a clear error or make it unnecessary, and comment the branch: tp1-4/tp1-6/tp1-8 all ADD systems we do not have, which is exactly the NO_COUNTERPART class.'
