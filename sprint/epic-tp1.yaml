    title: "THE CHEAP WINS — nine one-line fidelity fixes carved out of the clusters"
    description: "Carve-out story: these items are removed from C6/C7/C11/C12/C13/C15's scope so they are not double-counted. Each is a one-line or one-constant change. Together they are the fastest visible fidelity gain in the audit. SCOPE CHANGE (2026-07-13, user-approved at SM setup): WD-010 (warpAccel's 0-based CURWAV) has been MOVED OUT of this story and INTO tp1-1. It was ordering-constrained behind tp1-1 (touching rules.ts:51 while the 60 is still baked in re-bakes the 60), and tp1-1 rewrites warpAccel anyway. This story now carries NINE fixes — matching its title — and depends on nothing."
    points: 3
