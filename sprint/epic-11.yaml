id: '11'
type: epic
title: star-wars 3D-vector render pipeline (clipping + camera/MVP + debug overlay)
description: 'Fix the star-wars 3D vector renderer so geometry positions, sizes, and reads correctly — WITHOUT a 3D engine. Root causes (see star-wars/docs/adr/0001-3d-vector-render-pipeline.md): (1) no near-plane line clipping in wireframe.ts drawWireframe (edges straddling the camera plane are dropped, so the Death Star surface and trench render as triangles); (2) no camera/view transform or scale — placement is faked with ad-hoc world constants, so positioning/sizing is guesswork; (3) no visual debug feedback loop. Decision: a small dependency-free 3D-vector layer on the existing Math Box — near-plane clipping (shell), a camera + MVP pipeline (pure matrix builders in core/math3d, composition in shell), and a dev debug overlay. Determinism and the core/shell boundary preserved; zero new deps. SCENE-GEOMETRY FOLLOW-ON (see star-wars/docs/adr/0002-scene-geometry-surface-and-trench.md): after 11-1/11-2 the surface still renders as a triangle and the trench as a flat sliver — NOT a clipping/MVP bug (that plumbing is correct) but because the surface and trench were never built as a surface and a trench (a narrow Object_8 spike and a single flat floor tile). 11-4 adds a dev phase-jump so those scenes are reachable for verification (the gap that let the defect ship through two approved stories), 11-5 builds a procedural receding ground grid, 11-6 a walled receding trench channel, and 11-7 (optional) a Death Star body. Sequence 11-1 -> 11-2 -> 11-3 -> 11-4 -> 11-5/11-6 -> 11-7.'
priority: p2
status: backlog
repos: star-wars
stories:
  - id: 11-1
    title: Near-plane line clipping in the wireframe renderer
    description: Fix wireframe.ts drawWireframe so edges crossing the near plane are CLIPPED, not dropped. Today 'if (!pa || !pb) continue' discards any edge with an endpoint at/behind z=-NEAR (project() returns null), so the Death Star surface and trench collapse into triangles. Clip the edge to z=-NEAR (parametric crossing t=(-NEAR-za)/(zb-za), lerp to the cut point) BEFORE projecting. wireframe.ts is shared with the model contact sheet (tools/contactSheet.ts) — verify both. See star-wars/docs/adr/0001-3d-vector-render-pipeline.md (part A).
    points: 3
    priority: p1
    status: done
    started: '2026-06-29'
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - An edge with one endpoint in front of and one behind the near plane is clipped to z=-NEAR and drawn to the crossing point (not dropped)
      - Edges fully behind the near plane draw nothing; edges fully in front are unchanged (no regression)
      - The crossing point uses the correct parametric intersection; unit tests cover both-behind, both-in-front, straddling, and endpoint-exactly-on-plane cases
      - The Death Star surface and trench render as receding surfaces (no longer triangles), eyeballed in the dev server (:5274) and the model contact sheet
      - Determinism preserved; npm run build clean and tests green
    completed: '2026-06-29'
    type: bug
    review_verdict: approved
  - id: 11-2
    title: Camera + MVP transform pipeline (model/view/projection + scale)
    description: Introduce a real model->view->projection chain. Add pure scaling() matrix and viewMatrix(camPos, orientation) builders to core/math3d.ts; build a per-entity model matrix = translation o rotation o scale; compose MVP = projection x view x model in the shell and transform vertices through it. Rewire render.ts to place models via {pos,rot,scale} through the camera, retiring the ad-hoc placement glue (SKIM_OFFSET, Z_SURFACE_PLACEMENT, surfacePlacement/trenchPlacement). The camera derives from sim state (the cockpit IS the camera); core stays pure. See star-wars/docs/adr/0001-3d-vector-render-pipeline.md (part B). Depends on 11-1.
    points: 5
    priority: p2
    status: done
    started: '2026-06-29'
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - core/math3d.ts gains pure, unit-tested scaling() and viewMatrix() builders (matrix invariants / inverse-camera identity covered)
      - A per-entity model matrix composes translation, rotation, and scale; vertices render through MVP = projection x view x model
      - render.ts places the surface, trench, and TIEs via the camera/model-matrix path; the prior ad-hoc world-offset constants are removed or reduced to camera state
      - The camera is derived from GameState only; core/math3d remains pure (no DOM/shell imports) and determinism is preserved
      - Surface/trench/TIE placement matches or improves current visuals — eyeballed in dev (:5274) and the contact sheet; build clean, tests green
    completed: '2026-06-29'
    type: refactor
    review_verdict: approved
  - id: 11-3
    title: 'Dev debug overlay: axes, grid, frustum, model bounds'
    description: "Add a dev-only, toggle-key debug overlay to the shell renderer: world axes at the origin, a ground grid in y=0, the camera frustum, and each on-screen model's bounding sphere + name label (reuse modelView.modelBounds). Pure Canvas 2D, no core changes, no determinism impact — the feedback loop for placing 3D geometry that today 'MUST be eyeballed' blind. See star-wars/docs/adr/0001-3d-vector-render-pipeline.md (part C). Builds on 11-2's camera."
    points: 3
    priority: p2
    status: backlog
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - A keyboard toggle shows/hides the overlay; it is off by default and never affects gameplay or the sim
      - Overlay draws world axes (X/Y/Z) at the origin and a ground grid in the y=0 plane
      - Overlay draws the camera frustum and each on-screen model's bounding sphere + name label
      - Any pure geometry helpers added (frustum corners, bounds projection) are unit-tested; drawing output is eyeballed in dev
      - No core/shell boundary violation, no new runtime deps, build clean, tests green
    type: chore
  - id: 11-4
    title: Dev phase-jump keys to reach the surface/trench scenes for verification
    description: "Add dev-only keys to jump the run straight to the 'surface' and 'trench' phases (and back to 'space') without clearing 6 TIE + 4 turret kills first. The triangle/sliver bug in those scenes shipped through stories 11-1 and 11-2 because their 'eyeball in the dev server' ACs were unverifiable — the phases were unreachable in casual play and the contact sheet shows models centered-in-isolation where the defects hide (see star-wars/docs/adr/0002-scene-geometry-surface-and-trench.md). This makes the surface/trench actually reachable so 11-5/11-6 can be signed off honestly. Dev-only, off by default, no effect on the sim contract or a real run."
    points: 2
    priority: p2
    status: done
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - Dev-only keys jump the active run to the surface phase and the trench phase (and back to space), reusing the existing enterPhase transition so phase state stays consistent
      - The jump is gated to dev/debug and never fires in a normal run; it does not alter determinism or the stepGame(state,input,dt) contract
      - Any core helper added (e.g. a phase-set used by the jump) is pure and unit-tested; the binding itself is eyeballed in dev (:5274)
      - Build clean, tests green, no new runtime deps, core/shell boundary intact
    completed: '2026-06-30'
    type: chore
    review_verdict: approved
  - id: 11-5
    title: Procedural Death Star surface — receding ground grid + horizon
    description: "Replace the DEATH_STAR_SURFACE (Object_8) spike with a wide, procedurally-generated ground grid on the y=0 plane that recedes to a horizon and scrolls toward the cockpit — the Wave-2 surface skim. Object_8 is a narrow 3-fin structure (~960 wide, ~10,560 deep) seated 600 units from the eye, so it balloons off all screen edges and collapses to a point (verified by reprojection; see star-wars/docs/adr/0002-scene-geometry-surface-and-trench.md part A). Add a PURE core generator surfaceGrid(scroll) -> Model3D: longitudinal lines parallel to -Z wide enough to run off-screen at the horizon, lateral lines every GRID_Z scrolling toward the camera and recycling by scroll mod GRID_Z. The existing SURFACE_TOWER turrets keep their sim positions and sit on the grid. Retire Object_8 from the surface render (re-classify, don't delete). Add a surfaceScrollZ accumulator to GameState advanced by TURRET_SCROLL_SPEED and reset on phase entry. Depends on 11-4 for verification."
    points: 5
    priority: p2
    status: backlog
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - core gains a pure, deterministic surfaceGrid(scroll) generator (no DOM/time/random); unit tests cover line counts, X-symmetry, the width/length envelope, and scroll recycling
      - render.ts draws the grid in the surface phase instead of DEATH_STAR_SURFACE; the turrets sit on the grid at y~0
      - The grid scrolls toward the cockpit attached to the turret flow via a surfaceScrollZ accumulator (added to GameState + initialState + reset on phase entry)
      - The surface reads as a wide receding ground with a horizon — NOT a triangle — eyeballed via the 11-4 phase-jump in dev (:5274)
      - Object_8/DEATH_STAR_SURFACE is removed from the surface scene (re-classified, not deleted); determinism preserved; build clean, tests green
    type: feature
  - id: 11-6
    title: Walled trench channel — floor + ribbed side walls, receding
    description: "Replace the flat 512x384 TRENCH floor tile with a long walled channel that reads as a corridor you fly down. The current tile projects to a ~224px-wide, ~4px-tall sliver — no walls, no length (verified by reprojection; see star-wars/docs/adr/0002-scene-geometry-surface-and-trench.md part B). Add a PURE core generator trenchChannel(scroll) -> Model3D: floor rails at x=+/-TRENCH_HALF_W plus lateral floor ribs every RIB_Z, two vertical side walls from y=0 to y=TRENCH_WALL_H with a vertical rib at each RIB_Z, and top rails — running from ~z=0 to a far cutoff and scrolling toward the camera (recycling by scroll mod RIB_Z). The exhaust port keeps its own sim scroll and is seated in the floor at channel center. Add a trenchScrollZ accumulator to GameState advanced by TRENCH_SCROLL_SPEED and reset on phase entry. Camera unchanged (skims y=TRENCH_SKIM, centered). Depends on 11-4 for verification."
    points: 5
    priority: p2
    status: backlog
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - core gains a pure, deterministic trenchChannel(scroll) generator (no DOM/time/random); unit tests cover floor/wall/rib counts, +/-X symmetry, the length envelope, and scroll recycling
      - render.ts draws the channel in the trench phase instead of the flat TRENCH tile; the exhaust port rides inside the channel at its sim position
      - The channel scrolls toward the cockpit via a trenchScrollZ accumulator (added to GameState + initialState + reset on phase entry)
      - The trench reads as a long walled corridor receding to a vanishing point — NOT a flat sliver — eyeballed via the 11-4 phase-jump in dev (:5274)
      - Determinism preserved; core/shell boundary intact; no new runtime deps; build clean, tests green
    type: feature
  - id: 11-7
    title: 'Death Star body: distant wireframe sphere in the space phase (optional)'
    description: "Optional / deferrable. Add a wireframe Death Star body so the space phase shows what you are attacking — today there is no Death Star model anywhere in the registry. A PURE core sphere builder (lat/long rings + the equatorial trench line + the superlaser dish) seated far in -Z during the 'space' phase, growing as phaseKills rises (you are approaching), drawn behind the TIEs so it never interferes with TIE hit-tests. See star-wars/docs/adr/0002-scene-geometry-surface-and-trench.md part C. Lower priority than 11-5/11-6; does not block them."
    points: 3
    priority: p3
    status: backlog
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - core gains a pure, deterministic Death Star sphere builder (no DOM/time/random); unit tests cover vertex/edge counts and symmetry
      - The body is seated far in -Z in the space phase and grows on approach from sim state; it draws behind the TIEs and does not affect enemy hit-tests or determinism
      - render.ts draws it only in the space phase; build clean, tests green, no new runtime deps, core/shell boundary intact
    type: feature
