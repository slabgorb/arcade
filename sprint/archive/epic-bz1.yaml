id: bz1
type: epic
title: Battlezone (1980) — full faithful vector clone
description: "Faithful browser-based vector clone of Atari's 1980 Battlezone — first-person 3D wireframe tank combat on a flat plain. Full game in one epic: dual-tread steering, green radar scanner, all 21 ROM-positioned obstacles, full enemy roster (slow tank 1000 / missile 2000 / super tank 3000 / saucer 5000), 'always one hostile' spawn, score-threshold intro, difficulty ratchet up-to-ROM, extra-tank award, POKEY-style SFX, cracked-glass viewport + gunsight. New gitignored subrepo battlezone/ (TS/Vite/Vitest, pinned port 5276 — 5275 taken by asteroids/epic A), math3d PORTED from star-wars (shared-lib extraction deferred). Canonical source: https://6502disassembly.com/va-battlezone/. Design brief: docs/superpowers/specs/2026-07-03-battlezone-bz1-epic-design.md. Sequenced AFTER epic A (Asteroids, p1); tagged p2. Descopes: no coin-op mechanics, difficulty capped at ROM, spawn-in-obstacle ROM bug not replicated. First of an expected bz1/bz2/bz3 Battlezone epic line."
priority: p2
status: done
