  - id: tp2-1
    title: PULPOT is one ROM byte — the pulsar CLIMB/REVERSE tier also widens to $C0 at wave 65, but tp1-26 fixed only the kill gate
    description: 'PULPOT (WPULPOT, ALWELG.MAC:606-609: $A0 for waves 1-64, $C0 for 65-99) is ONE ROM byte read at THREE JPULMO sites — the pulsar KILL gate (1804-1806), the climb-speed near/far switch (1783-1786), and the descend REVERSE (1795) — all widening to $C0 at wave 65. tp1-26 gave the KILL gate its own wave-parameterised lookup (pulpotKillDepthForLevel, routed through the contourWave fold) but LEFT the climb and reverse readers (src/core/enemies/interpreter.ts:183 climb, :321 reverse) frozen at PULSAR_NEAR_FAR_DEPTH = $A0 — a pre-existing deferral introduced by feat 6-15 (rules.ts:452-453: the L65+ $c0 tier is deep-level gold-plating, intentionally not modelled). Reviewer-noted consequence (tp1-26 review): at wave 65+ the ROM climbs a $A0..$C0-band pulsar at PULSAR (slow) speed while our port climbs it at FLIPPER (fast) speed. Close the gap, or formally ratify the deferral. The two constants (kill PULPOT vs climb PULSAR_NEAR_FAR_DEPTH) coincide at $A0 below wave 65 and diverge at 65.'
    points: 2
    priority: p3
    status: done
    started: '2026-07-19'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - 'DECIDE FIRST, then build (a fidelity ruling, not a pure transcription): EITHER (a) adopt the ROM — the climb-speed reader (interpreter.ts:183) and reverse reader (:321) read the SAME wave-parameterised PULPOT the kill gate uses (a shared PULPOT-wave lookup, $A0 waves 1-64 / $C0 65-99, routed through contourWave), so all three JPULMO readers widen together at wave 65; OR (b) formally ratify the $A0-only climb/reverse deferral as a deliberate, cited divergence recorded in docs/audit/findings, not only in a code comment. Record the decision and its reasoning in the story.'
      - 'If (a): the wave-1 pulsar-motion behaviour must NOT regress — the tp1-5 / tp1-6 / sim.enemy-motion-fidelity pulsar suites stay green (they pin $A0 at wave 1, which is unchanged). Add a test that derives the climb/reverse boundary OUT OF the running sim (not re-derived arithmetic) and pins its widening to $C0 at a wave on each side of 65.'
      - 'If (a): PULSAR_NEAR_FAR_DEPTH (the frozen $A0 climb constant) is unified with / retired in favour of the wave-parameterised PULPOT — no two constants that merely coincide below wave 65 left drifting (the tp1-26 name-split hazard).'
      - Cite ALWELG.MAC:1783-1786 (climb), 1795 (reverse), 1804-1806 (kill), and WPULPOT 606-609. npm test -- citations stays green and node tools/audit/reanchor-citations.mjs reports 0 lost.
    completed: '2026-07-19'
    type: bug
    review_verdict: approved
  - id: tp2-2
    title: The level-select prompt says 'PRESS FIRE TO SELECT' but the sim advances on Enter (input.start), not fire
    description: "On the RATE YOURSELF / SELECT START LEVEL screen, the on-screen prompt reads PRESS FIRE TO SELECT (drawn by drawSelect in src/shell/render.ts) but the sim's select->playing transition reads input.start (Enter), NOT input.fire (src/core/sim.ts, case select: if (input.start) startGameAtLevel(...)). So on the select screen pressing FIRE (Space) does nothing; the level starts only on Enter. Found in-game during tp1-39 verification (Playwright drive: Space lit the prompt but never advanced; Enter did). The PRESS FIRE TO SELECT string was shipped by tp1-20 as a ROM-authentic message, which suggests the arcade cabinet started the selected level on the FIRE button — making the BEHAVIOUR (Enter-only) the bug, not the prompt. Decide against the ROM."
    points: 1
    priority: p3
    status: done
    started: '2026-07-19'
    repos: tempest
    workflow: trivial
    acceptance_criteria:
      - 'DECIDE which side is right against the ROM/arcade convention and record it: the cabinet SELECT screen almost certainly confirms on the FIRE button (the prompt tp1-20 shipped is ROM-authentic), so the likely-faithful fix is to make input.fire confirm the level select. Verify against the ROM select/start path before choosing; if the ROM genuinely uses a distinct start input, correct the PROMPT string instead.'
      - 'Implement the chosen fix: EITHER (a) the sim case select also advances on input.fire so Fire (Space) confirms — matching the prompt — WITHOUT double-triggering on the same press that entered select and WITHOUT regressing the Enter path; OR (b) the drawSelect prompt string is corrected to name the key that actually confirms.'
      - 'A test pins the chosen behaviour: the select->playing transition fires on the documented input, and the prompt string names an input that actually confirms (no lingering fire-does-nothing mismatch).'
      - npm test -- citations stays green.
    completed: '2026-07-19'
    branch: fix/tp2-2-select-fire-input
    type: bug
    review_findings: '3 MEDIUM: (1) SelectState.fireHeld duplicates the canonical GameState.prevFire edge-latch (6-2) — rework to input.fire && !s.prevFire, delete the field; (2) no test pins spin-while-fire-held; (3) lost bullets===0 pin on the fire-confirm frame. No Critical/High; security/rules/preflight clean.'
    review_verdict: approved
