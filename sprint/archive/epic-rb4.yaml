id: rb4
type: epic
title: Red Baron — ROM fidelity against the original 1980 Atari source
description: "Remediation epic for red-baron/docs/2026-07-13-red-baron-primary-source-audit.md, the audit of our clone against the ORIGINAL 1980 Atari assembler source (primary source at ~/Projects/red-baron-source-text; the CRLF sibling ~/Projects/red-baron-source is NOT citable). 169 findings, every citation byte-verified on BOTH sides; 98 attacked by adversarial refuters (95 survived, 3 killed, 72 materially corrected); a Phase-3 coverage review killed one more finding and three FALSE CONFIRMEDs. THE HEADLINE: the clone's gameplay constants were transcribed from a `.RADIX 16` region AS IF DECIMAL. ACCEL=30 means 0x30=48; P.INDP=1080 means 0x1080=4224; P.MNDP=140 means 0x140=320; S.MAXZ=19 means 0x19=25; HORZ=1000 means 0x1000=4096. ~30 constants, nearly all wrong in the same direction, which is why the game 'seems way off'. THE RADIX SWEEP (rb4-1) BLOCKS EVERY OTHER NUMERIC STORY — anything numeric that lands first re-bakes the decimal reading and then confirms itself against this document. ROOT CAUSE: our OWN doc, red-baron/docs/red-baron-1980-source-findings.md, sourced its enemy constants to R2BRON.MAC — a build that NEVER SHIPPED, sitting beside the real one and differing in two lines (FRMECNT=5 vs 4) — and misread that build's hex as decimal. Production code cites the doc as authority, so rb4-2 must retract it or it re-infects the next story. Note what is NOT wrong: the timebase is already correct (NMI 250 Hz / display 62.5 Hz / calc frame 96 ms = 10.4167 Hz, RBGRND.MAC:102 + CALCNT=0x18), and topology.ts is byte-exact — the picture ROM is genuinely .RADIX 10, so reading it as decimal was RIGHT. The transcriber applied decimal everywhere: correct for the geometry, wrong for every constant. RULINGS (user, 2026-07-13): all eleven fix-clusters bought; C12 (PERCENT, the EAROM-backed adaptive difficulty that retunes every closing speed to hit an operator-set game duration) is a DELIBERATE DESCOPE — it is a coin-throughput device and this repo does not replicate quarter-extracting mechanics. It is recorded in the audit, filed nowhere. red-baron/tools/audit + tests/audit/citations.test.ts re-open every cited line byte-for-byte and must stay green; the checker REJECTS any citation to the decoy build."
priority: p1
status: done
repos: red-baron
