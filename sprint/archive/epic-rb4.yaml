    title: "THE MISSION CLOCK — difficulty ramps twice as fast, and waves come in RUNS not alternation"
    description: "Cluster C6. Subsumes MI-003, MI-004, MI-005, MI-007, MI-008, MI-009, CB-001, CD-009. GMLEVL indexes PLNLVL by OBJKLD>>1 — the ROM HALVES the kill count before the table lookup (RBARON.MAC:2399-2408), so OUR DIFFICULTY RAMPS EXACTLY TWICE AS FAST as the arcade's. (Filed independently by two pairs — CB-001 and MI-009 — and both refuters decoded the LSR themselves.) MCOUNT is indexed by MODECT>>1 and a ground MODECT reloads NEWCT=1, so the ROM runs RUNS of plane waves, not the 1:1 air/ground alternation we implement; MODECT wraps modulo 16. NEWCT counts WAVES, not calc frames — our inter-wave gap is ~10x too short. Ground mode ends on a CONDITION (GRNDCT spent AND no live ground objects), not a countdown; ours lasts ~0.4 s. CD-009 CERTIFIED our wave clock as an exact match; the coverage review proved that CONFIRMED FALSE (NWPLNE has three gates before DEC NEWCT; it saw one)."
