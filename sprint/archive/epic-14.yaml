  - id: 14-7
    title: Trench catwalk hazard never costs a shield (COCKPIT_HIT_RADIUS < catwalk y-offset)
    description: "Found during 14-6's live playtest (13-3 AC2). The catwalk obstacle spawns at station (0, 200, -2100) — src/core/trench-obstacles.ts TRENCH_OBSTACLE_STATIONS — and as it scrolls toward the cockpit only its z advances (src/core/sim.ts stepTrench); x/y stay fixed. Its hazard check is `collides(pos, COCKPIT, COCKPIT_HIT_RADIUS)` with COCKPIT=[0,0,0] and COCKPIT_HIT_RADIUS=80 (src/core/state.ts). The closest the catwalk can ever get to the cockpit is at z=0, giving distance sqrt(200^2+0^2)=200 — always > 80, so the crash branch (crashedCatwalk=true, terrain-crash event, -1 life) can never fire; the hazard is geometrically unreachable. Repro (live, confirmed 2026-07-02): press 9 to jump to a fresh trench (6/6 shields), do not fire, wait until t=4.5s (after the catwalk's own ~4.2s crossing of z=0, before the port's ~4.8s crash) — the isolation screenshot showed shields at 5 (one port-crash cycle had elapsed by capture time); the catwalk contributes zero shield loss, confirming the geometric proof. The static /scenes.html contact sheet cannot catch this (it's a single-frame render, not a collision-over-time bug). Fix options: raise COCKPIT_HIT_RADIUS for this check, lower the catwalk's spawn y, or give the catwalk its own (larger) hazard radius separate from COCKPIT_HIT_RADIUS."
    points: 2
    priority: p2
    status: done
    started: '2026-07-03'
    repos: star-wars
    workflow: tdd
    completed: '2026-07-03'
    type: bug
