    title: 'Superzapper empty-board behavior: restore Story-5-1/4-1 semantics (no activate event on empty press; weak shot with no target is wasted-but-not-spent) OR pin the new windowed behavior with tests + a deviation. Regression surfaced in 10-2 review (stepZap dropped the enemies.length===0 early-return).'
    points: 2
    priority: p2
    status: backlog
    repos: tempest
    workflow: tdd
    type: bug
