  - id: jt2-4
    title: "Eggs — spawn with victim velocity, bounce/settle laws, ledge tables, value ladder + air catch, hatch and remount, 4-egg permadeath"
    description: "The egg lifecycle as a process: spawn carrying the victim's velocities (JOUSTRV4.SRC:2991-2996); bounce keeps 1/4 of VY inverted, X index decays 2 per bounce (JOUSTRV4.SRC:3204-3218); settle when |VY| <= $20 and X index = 0 (JOUSTRV4.SRC:3219-3222); ledge placement via EGLEDG/EGGLNT (69 slots, 8 px apart, JOUSTRV4.SRC:2910-2935); eggs use the NARROWER 4..288 wrap (JOUSTRV4.SRC:3141-3146), not the entity band. Values 250/500/750/1000 capped (EGGVAL, JOUSTRV4.SRC:3097-3104); mid-air catch +500 (PFEET, JOUSTRV4.SRC:3065-3069) — emitted as score events per the epic's scoring seam. Hatch: buzzard flies in from the NEARER edge at max speed to remount (JOUSTRV4.SRC:3245-3278). Each enemy carries 4 eggs before permadeath (PEGG, JOUSTRV4.SRC:2900-2901, 3001). Egg score-message state overlays PRDIR/PPVELX (JOUSTRV4.SRC:3028-3036) — the tagged union carries egg-specific fields, it does not grow the shared struct."
    points: 2
    priority: p1
    status: done
    started: '2026-07-20'
    repos: joust
