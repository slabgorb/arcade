stories:
  - id: jt2-1
    title: "Process scheduler core — the tagged-union process list, frame naps, two classes, kill by id+mask, per-frame RNG stir"
    description: "GameState grows from a frame counter to the ruled ROM-shaped core (clone design spec §Architecture): a tagged-union process list mirroring the 40-slot cooperative scheduler's SEMANTICS (subsystems §1) — per-process nap timers decremented once per frame pass (PNAP, RAMDEF.SRC:171; 1 nap = 1 frame, five author oracles, brief §3), two scheduling classes run as two full passes (primaries then secondaries — PRISEC, SYSTEM.SRC:217/231/248; PROCCR/SECCR RAMDEF.SRC:8-18), kill takes id+mask so one call kills a class (KLPROC, SYSTEM.SRC:341-346). Per-frame RNG stir mirroring the IRQ's (SYSTEM.SRC:581-582 — RNG advances on the timer, not only on calls) via @arcade/shared/rng seeded by the shell. RULING: semantics only, NOT a memory image — no 56-byte blocks, no PPC resume addresses, no pool; the layout facts stay dossier citations. HAZARDS (jt1-10, binding): any layout claim anchors on PBLKM (RAMDEF.SRC:166), never a searched ORG $0 (an earlier one exists — claim JT10-010); any pool arithmetic re-derives 40x56=2240 (not the old 2040). Player entities join the list; existing flight/ground stepping is driven from it without behaviour change (the jt1-5 determinism replay must survive the migration bit-for-bit)."
    points: 2
    priority: p1
    status: done
    started: '2026-07-20'
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "Processes nap in whole frames (a process napping N wakes on exactly the Nth pass); primaries all step before any secondary each frame; kill-by-id+mask removes a class in one call — each law cited + claims entries; citations suite green."
      - "The RNG advances once per frame independent of consumption (a frame with no RNG calls still changes the stream position), mirroring SYSTEM.SRC:581-582; deterministic under seed."
      - "The jt1-5 seeded-replay trajectory reproduces bit-for-bit with players now stepped from the process list (no behaviour change from the migration)."
      - "No wall-clock, no Math.random in core (purity guard green); frame.ts's GameState migration keeps npm test fully green."
    completed: '2026-07-20'
  - id: jt2-2
    title: "Enemies — the shared LINET brain, the NSMART/WSMART intelligence budget, promotion to BOUNDR/B2UNDR/SHADOW, EMYTIM divider"
    description: "The three ground enemies (bounder/hunter/shadow lord) as processes on the same flight core the players use (buzzards flap). One shared dumb brain: LINET lane-tracking toward the three cliff-tier altitudes $45/$81/$D0 +/- $20 (JOUSTRV4.SRC:3722-3749, 7994-7997). Promotion to the smart brains BOUNDR/B2UNDR/SHADOW (JOUSTRV4.SRC:3787, 3971, 4230) under the GLOBAL intelligence budget: NSMART vs WSMART, seeded per wave from the pursuit nibble, growing every 15 s while enemies live (JOUSTRV4.SRC:2075-2129). EMYTIM divider: enemies integrate every Nth frame — 2 on waves 1-2 and after early deaths, else 1 (JOUSTRV4.SRC:2202-2205) — modeled as a DIVIDER, not a speed scale (open-questions §4, ruled). The IFN DEBUG invariants (JOUSTRV4.SRC:1982-1990, 3765-3770 — 'NSMART had better be zero') become test oracles for the budget bookkeeping. Wave seeding inputs (pursuit nibble) may be stubbed as parameters until jt2-5 lands the wave machine — the seam is the budget's INPUTS, not its laws. Enemy facing/mount animation uses jt1-3's transcribed buzzard/rider frames by name only (rendering is jt2-7)."
    points: 5
    priority: p1
    status: done
    started: '2026-07-20'
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "LINET altitude targets, tolerance band, and the promotion rule transcribed with radix-cited comments + claims entries; a dumb enemy tracks lanes, a promoted one runs its smart brain; citations suite green."
      - "The budget's laws hold under test: seeded from the pursuit nibble per wave, +1 every 15 s (900 frames) while enemies live, promotions debit it, deaths credit it back — and the IFN DEBUG invariant (budget zero at wave end with all enemies dead) holds as an oracle."
      - "EMYTIM=2 makes an enemy integrate on exactly every 2nd frame (identical inputs, half the displacement of EMYTIM=1 over any window) — a divider, not a scale; proven by test."
      - "All three smart brains produce distinct, cited behaviours (bounder/hunter/shadow-lord pursuit differences per their JOUSTRV4.SRC blocks); deterministic under seeded replay."
    completed: '2026-07-20'
  - id: jt2-3
    title: "The joust — box broad-phase + span narrow-phase, OSTBO sub-pixel resolution, bounce-apart, facing + bump registers"
    description: "Entity-vs-entity collision and the game's namesake resolution. Broad-phase box test then narrow-phase against jt1-3's transcribed collision spans (COFF bias, $8000/$8100 sentinels — pictures.md); this story CONSUMES COLLISION_TABLES, so the count floors owed since the jt1-3 review land here (each table gets a floor; dropping one must redden the suite). THE JOUST (OSTBO, JOUSTRV4.SRC:5002-5012): compare (PLANTZ + PPOSY) 16-bit FRACTION INCLUDED — strictly lower wins, exact tie = both bounce (JOUSTRV4.SRC:5014-5017); skidding sets PLANTZ=2 (JOUSTRV4.SRC:6071-6072 — jt1-5's recorded consumable); enemies NEVER kill each other (JOUSTRV4.SRC:4953-4961). Bounce-apart: winner PBUMPY -2 / loser +2, wrong-way velocity inverted and halved (JOUSTRV4.SRC:5163-5176); horizontal reverse-minus-2 with half passed to the other as bump (JOUSTRV4.SRC:5114-5157). CARRIED SEEDS (binding): add FACING to EntityState — the jt1-6 gap that leaves the skid chain (SKID_DELTA/SKID_PLANT_Z) unreachable; wire the ground state machine's onMinus transitions through it so skid/PLANTZ=2 is REACHABLE and tested. Model PBUMPX/PBUMPY as one-shot positional shoves with the cited drain laws (X drained <=3 px/frame JOUSTRV4.SRC:7270-7284; Y consumed whole JOUSTRV4.SRC:6495-6496) — the jt1-5 tail. Kills emit score events carrying transcribed DVALUE bytes: bounder 500 / hunter 750 / shadow lord 1500 (JOUSTRV4.SRC:5563-5577); accumulation is jt4 (scoring seam ruling). The 50-points-for-dying credit is DEFERRED (verify-in-emulation caveat, open-questions §4)."
    points: 3
    priority: p1
    status: done
    started: '2026-07-20'
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "The joust resolves on the 16-bit sub-pixel (PLANTZ + PPOSY) comparison: a 1-fraction-unit height difference decides the winner; an exact tie bounces both — proven at the fraction level, not integer Y (the dossier's false-tie trap)."
      - "Facing exists; the skid chain is reachable (a facing-vs-input reversal enters it) and skidding demonstrably lowers the lance via PLANTZ=2 into a joust outcome; bump registers drain by the cited laws (X <=3 px/frame, Y whole)."
      - "Bounce-apart velocities/bumps match the transcribed laws; enemies never kill each other (enemy-enemy contact always bounces); kill events carry 500/750/1500 per type — all cited + claims entries, citations suite green."
      - "COLLISION_TABLES (and every table this story consumes) carry count floors — deleting a table or truncating spans reddens the suite (prove red once); determinism replay through a joust stays bit-for-bit."
