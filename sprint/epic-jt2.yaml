id: jt2
type: epic
title: Joust — the joust slice (scheduler, enemies + intelligence budget, joust resolution, eggs, wave machine core, transporters)
description: "Second epic of the joust clone — the roadmap's 'The joust' slice (DESIGN: docs/superpowers/specs/2026-07-20-joust-jt2-epic-design.md at the orchestrator, executing joust/docs/superpowers/specs/2026-07-19-joust-clone-design.md roadmap row jt2). GROUND TRUTH: joust/docs/rom-study/ (machine-gated by the citations suite) — cite the dossier, do not re-derive it; new transcriptions add fully-qualified FILE:LINE claims (the jt1-8 lesson: never bare :N). RULINGS THIS EPIC (design doc §Design rulings, all binding): scheduler = the ruled tagged-union process list with frame naps / two classes / kill-by-id+mask, NOT a memory image (no 56-byte blocks, no PPC, no RAM pool — layout facts stay citations); SCORING SEAM — core emits kill/egg score events carrying transcribed DVALUE/EGGVAL values, BCD accumulation + display + extra men are jt4 (the 50-points-for-dying credit JOUSTRV4.SRC:4730-4732 is DEFERRED with its verify-in-emulation caveat, open-questions §4); TEXT SEAM — wave machine emits message beats, shell renders NONE of them (fonts are later work; WAVDEL delays are ~1s, JOUSTRV4.SRC:2045/2601 divide by 6 — no exact-duration pins); EMYTIM is an integrate-every-Nth-frame DIVIDER not a speed scale (2 on waves 1-2, JOUSTRV4.SRC:2202-2205); WBJSR phantom wave types 12/14 pinned ABSENT as a negative claim (JOUSTRV4.SRC:187); wave-type dispatch lands as the 6-entry WJSRTB skeleton with survival/co-op live + degrade-by-player-count (gladiator/egg/ptero behaviours are jt4/jt3); baiter seam — jt2 builds the NSMART/WSMART budget incl. 15s growth, BAITBL spawn schedule is jt3. SEEDS CARRIED FROM jt1 (all binding, verified in the archives): (1) EntityState needs a FACING field — jt1-6 gap, skid chain + PLANTZ currently unreachable, the joust needs both (skid PLANTZ=2, JOUSTRV4.SRC:6071-6072, recorded by jt1-5 as jt2's consumable); (2) PBUMPX/PBUMPY bump registers unmodeled — jt1-5 tail, drain laws cited (X ≤3 px/frame JOUSTRV4.SRC:7270-7284, Y whole JOUSTRV4.SRC:6495-6496); (3) scheduler layout anchors on PBLKM (RAMDEF.SRC:166) never a searched ORG $0 (claim JT10-010), pool arithmetic is 40x56=2240 not 2040; (4) count floors owed on consumption (jt1-3 review): COLLISION_TABLES floors land with jt2-3, ENTITY_RECORDS floors with jt2-7; (5) the full 80-row WAVTBL decode is jt2-5's appendix (open-questions §4 names it). The IFN DEBUG blocks (JOUSTRV4.SRC:1982-1990, 2953-2959, 2966-2970, 3765-3770) are the author's own invariant list — free oracles for wave/budget bookkeeping tests. Demo at epic end: wave 1 vs the buzzards on 5279, screenshot with port-ownership proof (strictPort alone is porous — td1-1)."
priority: p1
