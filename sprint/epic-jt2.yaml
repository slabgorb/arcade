  - id: jt2-5
    title: "Wave machine core — the CIA process, full 80-row WAVTBL decode, six-type dispatch skeleton, degrade laws, seeding"
    description: "The wave machine as the CIA process (JOUSTRV4.SRC:1875): the 4-byte nibble-packed wave table — bounders:hunters / lords:pursuers / pterodactyls / status (JOUSTRV4.SRC:175-181) — with THE FULL 80-ROW WAVTBL DECODE as this story's appendix (open-questions §4 names it; head/sample/tail was the dossier's honest gap; loop at 81 via WTBRST/WTBEND, JOUSTRV4.SRC:2535-2546, 2018-2021; late waves all Shadow Lords at max pursuit $00,$AF). Wave number is independent BCD 0-99 (JOUSTRV4.SRC:2001-2004). Status low nibble dispatches the six wave types via the WJSRTB skeleton (JOUSTRV4.SRC:2586-2591) — survival/co-op paths LIVE with the degrade-by-player-count laws (co-op -> survival solo JOUSTRV4.SRC:2628-2631; gladiator no-ops solo JOUSTRV4.SRC:2697-2700); gladiator/egg/ptero BEHAVIOURS are jt4/jt3 (ruled seam). High nibble cliff destruction recorded as data (JOUSTRV4.SRC:185-192); the bridge burn is jt3's. Seeds jt2-2's budget (pursuit nibble -> NSMART/WSMART) and EMYTIM (2 on waves 1-2, JOUSTRV4.SRC:2202-2205). NEGATIVE CLAIMS pinned: WBJSR phantom types 12/14 never implemented (JOUSTRV4.SRC:187); wave 0's table entry never played (PWAVE seeded at WAVTBL-WLEN, JOUSTRV4.SRC:2437, 1878). WAVDEL-area delays are APPROXIMATELY 1 s (divide by 6 through a variable-length message loop, JOUSTRV4.SRC:2045, 2601) — emit message beats per the text seam, pin no exact durations. The IFN DEBUG invariants (JOUSTRV4.SRC:2953-2959, 2966-2970) are wave-bookkeeping test oracles."
