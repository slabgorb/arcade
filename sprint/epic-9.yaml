id: '9'
type: epic
title: ROM-accurate TIE fighter flight AI
description: 'Make Wave-1 TIE fighters move, attack, and present like the 1983 cabinet instead of the current straight-line ram-the-cockpit model. Today TIEs spawn at z=-1200 and fly dead-straight at the origin until they ram or are shot, ballooning to fill the screen with no swoop, weave, formation spread, or peel-away (see the side-by-side: ours is a wall of overlapping wireframe; the cabinet shows distinct ships swooping in on banking arcs). Source of truth is the 6809 main-program disassembly in the gitignored reference/disasm/ quarry (StarWars.asm, SW_M_Hi.asm), which holds the real flight logic but is uncommented (IDA auto-labels) so recovery is genuine reverse engineering. Sequenced spike-first: a bounded RE spike (9-1) decodes the flight model and gates the rest; if RE stalls at the timebox, fall back to a feel-faithful approximation informed by what was learned. NOTE: the AVG vector-RAM dumps (swspace.bin etc.) + DAVGAD disassembler the user also provided unblock the SEPARATE authentic-vector-edges work (docs/HANDOFF-authentic-vector-edges.md) - not this epic.'
priority: p2
status: backlog
repos: star-wars
stories:
  - id: 9-1
    title: 'RE spike (bounded): decode the TIE flight-AI routine from the 6809 disassembly'
    description: Bounded reverse-engineering spike. Trace the 6809 main-program disassembly (docs/references/SW/StarWars.asm + SW_M_Hi.asm) to locate the per-frame TIE object update and decode the flight model. Deliverable is a WRITTEN MODEL committed as markdown under star-wars/docs/ (e.g. tie-flight-ai-model.md) — NOT production code. Bounded to one focused session; this story GATES 9-2..9-5.
    points: 3
    priority: p1
    status: done
    started: '2026-06-29'
    repos: star-wars
    workflow: trivial
    acceptance_criteria:
      - 'Located in the disassembly: the routine(s) that update TIE object world coordinates each frame, plus where spawn/initial state is set'
      - 'Documented flight model: spawn position/distribution, per-frame position/velocity update (incl. any curve/swoop/weave/banking) and the math used (Math Box calls if any)'
      - 'Documented attack lifecycle: fire timing/trigger and the peel-away / fly-past / exit condition (when a TIE stops approaching)'
      - Documented per-wave difficulty knobs the AI reads (speed/aggression/count), or an explicit note that they were not recoverable
      - 'DECISION GATE recorded: (a) model recoverable -> 9-2..9-5 port it faithfully, or (b) RE stalled at the timebox -> fall back to feel-faithful approximation using whatever partial findings were captured'
      - No production code changes in this story; output is the committed markdown model doc
    completed: '2026-06-29'
    type: chore
    review_verdict: approved
  - id: 9-2
    title: Port the RE'd TIE flight model to core/sim.ts (swoop/weave/bank approach)
    description: 'Replace the straight-line moveEnemy/spawnTie in core/sim.ts with the flight model from 9-1: curved swoop/weave approach with banking, deterministic via the seeded RNG carried in GameState. Pure-core, unit-tested. Honors the core/shell boundary (no DOM, no wall-clock time, no Math.random).'
    points: 3
    priority: p1
    status: done
    started: '2026-06-29'
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - 'spawnTie / moveEnemy (or successors) implement the 9-1 approach model: TIEs follow curved/weaving paths, not a straight line to the origin'
      - 'Motion is deterministic: identical (state, input, dt, seed) -> identical trajectories; covered by unit tests in tests/'
      - Banking/orientation follows the path per the model, not just a static look-at (extends story 8-13)
      - Existing Wave-1 tests still pass; collisions/hit-tests unaffected; core stays pure
    completed: '2026-06-29'
    review_verdict: approved
  - id: 9-3
    title: 'Peel-away / fly-past lifecycle: un-killed TIEs complete their pass and exit instead of ballooning into the cockpit'
    description: Un-killed TIEs complete their attack pass and exit (peel away / fly past) instead of flying all the way into the cockpit and ballooning to fill the frame (the Image-1 defect). Bounds on-screen scale and matches the cabinet's 'they pass and leave' feel.
    points: 2
    priority: p2
    status: done
    started: "2026-06-29"
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - A TIE that is neither killed nor lands a hit transitions to a peel-away/exit phase per the 9-1 model and leaves the play volume (freeing its slot) rather than ramming
      - 'On-screen TIE scale is bounded: no TIE renders as a full-frame wall (cabinet-equivalent near-bound)'
      - Cockpit damage still occurs for genuine collision/strafe hits per the model (peel-away does not make TIEs harmless)
      - Deterministic and unit-tested; existing tests pass
    completed: '2026-06-29'
