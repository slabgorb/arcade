      - "The award is capped at 6 lives (:1989-1991 'CMP I,6 / BEQ'); a test crosses many thresholds and asserts lives never exceed 6; the BCD/decimal-mode arithmetic is pinned against packed-BCD scores."
      - "The DIP increment is hardcoded to 10,000 (BONUSV[0]) and parameterized per the epic ruling; open-questions.md records the DIP options not modelled (increment, OPTSW2 timed-play branch)."
