stories:
  - id: cp4-1
    title: "Centipede speed goes live — thread CENTIS into the march step and entry direction"
    description: "THE playtest fix. Retire the module-private CENT_SPEED=2 (src/core/centipede.ts:72, used as both dh and dv at :190-191) and make the train's per-frame march read SimState.centis instead. CENTPC drives BOTH axes from CENTIS: :479-480 'STA MOBJDV' (vertical) and :481-485 'MOBJDH = CENTIS*1 OR -1' with the sign from 'FRAME AND 2' (:483-484). The value 2 that ships today is exactly CENTIS's boot value (INIT :1174-1176 'LDA I,02 ;FAST TO START WITH'), which is why wave 1 looks correct and nothing after it changes. stepWaveCadence already computes the per-wave CENTIS from cp3-4 — this story makes createCentipede()/the march CONSUME it. Pure src/core, NO rng, no shell. Scope fence note at centipede.ts:162-168 gets its speed half struck (fragmentation stays cp4-2). SANITY: with CENTIS resetting to 1 below 40,000 on the wave-2 re-lay (per stepWaveCadence), verify the train does NOT get slower than boot on wave 2 in a way that contradicts play — transcribe what the code does and pin it, record any surprise in open-questions.md rather than 'fixing' it."
    points: 2
    priority: p1
    status: done
    started: '2026-07-20'
    repos: centipede
    workflow: tdd
    acceptance_criteria:
      - "The centipede's per-frame march magnitude reads SimState.centis, not a hardcoded constant; CENT_SPEED=2 is removed or demoted to CENTIS's documented boot seed with a radix-cited comment + claims entry; citations green."
      - "Both axes derive from CENTIS as the ROM does (:479-485): vertical magnitude = CENTIS, horizontal = ±CENTIS with the sign from FRAME AND 2; pinned by a test that changes centis and observes the step change on both axes."
      - "A deterministic test drives a real wave clear (reusing cp3-4's cadence) and observes the wave-2 train marching at the CENTIS the cadence produced — no hand-poked centis."
      - "Full suite green from the current baseline (new tests added, none deleted); build + lint clean."
    completed: '2026-07-20'
    review_verdict: approved
  - id: cp4-2
    title: "Fragmented train — CENTIN connected segments plus loose extra heads from RNGEN"
    description: "The real difficulty curve, and the harder (rng-sensitive) half of the scope fence. CENTPC (:496-551) lays CENTIN connected segments (head + bodies, :477-524) and then fills the REMAINING slots CENTIN..NCENT-1 with LOOSE INDEPENDENT HEADS (:527-546): DEAD=NCENT is set unconditionally (:549-551), so a 'short' train still puts 12 objects on screen — wave 2 is 11 segments PLUS one free-roaming head, NOT a shorter train (the cp3-4 carry-forward's 'shorter' framing was imprecise; the design doc corrects it). Each loose head costs TWO seeded-rng reads in ROM order: first the DIRECTION sign ('BIT RNGEN / BPL / JSR COMP' :536-540, negative → try other direction) then HPOS ('LDA RNGEN / AND I,0F8' :543-545). MOBJDV for a loose head is 2, or CKFE if cocktail (:531-534 — non-cocktail default 2, cocktail is out of scope, transcribe the default and note the branch). createCentipede() currently hardcodes NCENT=12 connected; this story makes it read centin and place the loose heads. DETERMINISM: draw ONLY from @arcade/shared/rng (seeded by the shell); a determinism test replays an identical wave from a fixed seed and asserts identical loose-head columns/directions; purity guard stays green (no Date.now/Math.random). Closes the fragmentation half of the scope fence at centipede.ts:162-168. NEEDS cp4-1 (speed) landed so the loose heads march at the right CENTIS."
    points: 3
    priority: p2
    status: done
    started: '2026-07-20'
    repos: centipede
    workflow: tdd
    acceptance_criteria:
      - "createCentipede() lays CENTIN connected segments then fills slots CENTIN..NCENT-1 with loose independent heads, each placed by two seeded RNGEN reads in ROM order (direction sign :536-540, then HPOS = RNGEN AND 0F8 :543-545); DEAD=NCENT (12 objects on screen regardless of CENTIN); radix-cited comments + claims entries; citations green."
      - "A determinism test replays an identical wave from a fixed seed and asserts byte-identical loose-head columns and directions; a second seed produces a different-but-deterministic field; purity guard green."
      - "An integration test drives a real wave clear to centin=11 and observes exactly one loose head plus an 11-segment connected train, all alive, all marching at the wave's CENTIS."
      - "The scope-fence comment at centipede.ts:162-168 is struck (both halves now closed) or updated to reflect what genuinely remains; full suite green from baseline; build + lint clean."
