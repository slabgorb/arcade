    completed: '2026-07-22'
    review_findings: "APPROVED at round 2. All six round-1 findings re-verified closed against the code: the HIGH (startPrev maintained in only one branch, so the first START press at every game-over was swallowed) is fixed structurally — the level is now recorded at a single exit in stepSim covering every phase — and confirmed on the live page (startPrev false during play; ONE press commits {KEA,50000,wave 1} without also restarting). The entry softlock is closed by porting GETINT's timeout, DERIVED not transcribed: FRAME+1 is the high byte of a per-frame counter (CENIR4.MAC:269-271, and the INC sits inside the VBLANK branch so it is once per frame despite 4 IRQs/frame), so a seed there costs (0x100-seed)*256 frames — :2625 0xF0 -> 4096 (~68s, '1 MINUTE AT 60HZ') and :1101 0xF4 -> 3072 (~51s, 'ABOUT 50 SECONDS'). On expiry the row commits with whatever was typed because UPDATE :2619 writes the score before initials are collected. Round-1's toothless wiring guard is re-anchored to the render() call; the prompt is withdrawn after commit (:1109-1116); the phase-guard test now uses an input only it can reject. Verification: 12/12 mutations killed on the new code (including both 'read the ROM seed as a frame count' mutations), 3 adversarial probes pass (held key through death, clock runs while held, attract-by-timeout still deals a fresh game), 885/885 tests, lint+build clean, citations 26/26 with HS-8 corrected and HS-16..HS-19 added. Three LOW observations left open, none blocking: attract-by-timeout keeps the dead field and lives:0 (a seam for cp4-7), a timed-out entry commits an empty name where the ROM would write 'A' plus two blanks (HS-19), and the three entry row positions remain uncited clone layout."
    review_verdict: approved
  - id: cp4-7
    title: "Attract mode — self-playing ATTRT demo plus copyright and bonus panel"
    description: "Ties the outer loop shut and carries the epic-end demo. ATTRT (:158 'ATTRACT-MODE GAMEPLAY') is REAL self-playing gameplay, not a static screen: it steers the gun (PLAYH, reversing direction at :188-195 'CMP I,1C ... CMP I,0E4'), fires via RSHOT1, and even reads a tile off the screen (:181-183 'LDX PLYFLD+200 ;READ A 1 (\"A\" IN \"ATARI\")'). It also draws the copyright message (CPYRHT via MESSAG :166-176) and, via BONUS (:225 'DISPLAY \"BONUS LIFE EVERY XXXX\" MESSAGE'), the bonus panel showing the DIP-selected level, and clears the 'GAME OVER' message every 4 seconds (:177-180). Design attract as a state in cp4-5's machine that runs the sim with a scripted/AI gun driver (transcribe ATTRT's steering + fire logic, keep it deterministic — seeded rng only, no Date.now/Math.random) and overlays the copyright + bonus panel. Insert-coin/start input drops from attract into a real game (cp4-5's start transition). The DEMO ARTIFACT for the whole epic is captured here: on 5278 from THIS checkout (lsof the port's cwd or serve a spare port — port-ownership trap), attract → insert → wave 1 → visibly faster wave 2 with a loose head + colour shift → death → game-over → initials → back to attract. NEEDS cp4-5 (the state machine) and benefits from cp4-1/2/3 (visible wave progression in the demo) and cp4-6 (initials in the loop)."
