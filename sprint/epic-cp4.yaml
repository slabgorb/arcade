    review_findings: "SUBSUMED by cp2-13 (centipede #19, merged 2026-07-19, 'pulled forward from cp4'). The per-wave LCOLOR colour walk shipped end-to-end before this story started: palette.ts (SCHEME_TABLE + colorIndexForWave ((wave-1)*3)%42 + *PensForWave, claims CL-17..CL-27), atlas.ts buildAtlas(wave), main.ts rebake on schemeNumberForWave(sim.wave). AC-1 satisfied via sim.wave (advances on clear sim.ts:512, not on death sim.ts:462); AC-2/AC-3 live in production; tests/palette-cycle.test.ts pins the walk. No code delta; a dedicated SimState.lcolor field would be redundant derived state. Closed by user ruling 2026-07-21."
  - id: cp4-4
    title: "Bonus lives — score-threshold crossing, BONUSV increment, the 6-life cap"
    description: "The bonus-life mechanism (:1968-1995), the missing CONSUMER of the already-shipped score. On each scoring event the ROM tests the running score (SCORE1:SCORE2) against the next threshold (BONUSL:BONUSM) — ':1968-1974 CMP X,BONUSL-1 / SBC X,BONUSM-1 / BCC 25$ ;NOT AT BONUS LEVEL'. On crossing it computes the NEXT threshold by adding the DIP-selected increment (BONUS1 :239-247 reads OPTNS D4-D5 → BONUSV .WORD 100,120,150,200 = 10k/12k/15k/20k *100; :1975-1981 adds increment to BONUSL:BONUSM) and awards a life UNLESS already at six ':1989-1991 LDA X,LIVES-1 / CMP I,6 / BEQ 25$ ;NO MORE LIVES 6 IS MAX', then :1993 'INC X,LIVES-1'. Bonus-life SOUND (CHAN4 :1994-1995) is DEFERRED to cp5. SimState.lives already exists (STARTING_LIVES=3). DIP RULING: hardcode the increment to BONUSV[0]=10,000 and parameterize per the epic ruling (open-questions.md entry); the OPTSW2 unlimited-time-vs-timed branch (:1982-1988) is out of scope — transcribe the default (award proceeds) and note the branch. Watch the SED/CLD BCD mode around the compare — the score is packed BCD (score.ts), the threshold arithmetic runs in decimal mode (:1975 SED). NOTE :1958-1966 (COUNT3-=2 'INCREASE FREQUENCY OF NEW HEADS' + SCORE2+=1) is a DIFFERENT routine (a 60,000-point spawn-rate bump) — do not conflate it with the bonus award; if it's in scope for the sim's difficulty it can ride along, otherwise file it."
    points: 3
    priority: p2
    status: done
    started: '2026-07-21'
