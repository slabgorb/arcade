    review_verdict: approved
  - id: cp4-3
    title: "Per-wave colour walk — LCOLOR advance on the all-dead re-lay"
    description: "The third CENTPC per-wave effect: :461-463 'LDA X,LCOLOR-1 / ORA I,80 / STA X,LCOLOR-1 ;TIME TO CHANGE COLORS', inside the same all-dead guard (:459-460 ';NO CHANGE IN COLOR OR SPEED UNTIL ALL DEAD') that gates the speed/length walk — so it fires on the WAVE-CLEAR re-lay, NOT the death re-lay. The centipede's colour changes wave to wave; today it does not. Transcribe how LCOLOR (a per-player colour selector) feeds CLRCH's colour init / the IRQ colour cycling (subsystems.md CLRCH :879), and drive the rendered segment colour from it. This story spans core (the LCOLOR flag on SimState, advanced on the wave-clear re-lay) and shell (render.ts / palette.ts consuming it) — keep the sim change and the render change in SEPARATE commits per the epic's boundary ruling. VERIFY on a server proven to be THIS checkout (lsof the port's cwd first) that the train visibly changes colour between waves. NEEDS cp4-1/cp4-2 landed (the re-lay path they touch is the same CENTPC block)."
    points: 2
    priority: p2
    status: done
    repos: centipede
    workflow: tdd
    acceptance_criteria:
      - "SimState carries the LCOLOR selector; it advances via 'ORA 0x80' on the wave-clear re-lay ONLY (not the death re-lay), transcribed with a radix-cited comment + claims entry; pinned by a test that clears a wave and asserts LCOLOR changed, and dies a player and asserts it did NOT; citations green."
      - "render.ts/palette.ts draws the centipede's colour from LCOLOR through the ROM's CLRCH mapping (subsystems.md :879), transcribed not invented; a render test asserts the segment colour tracks LCOLOR."
      - "Human smoke test on a server proven THIS checkout: the train is a visibly different colour on wave 2 than wave 1."
      - "Sim change and render change in separate commits; full suite green from baseline; build + lint clean."
