id: cp4
type: epic
title: Centipede — game structure (wave progression, bonus lives, the outer loop, high scores, attract)
description: "Fourth centipede epic — closes cp3-4's logged SCOPE FENCE and builds the game's outer loop. cp3-4 wired SimState.centis (the wave's centipede SPEED) and SimState.centin (its LENGTH) far enough to open the flea's spawn gate, but NOTHING consumes them as train behaviour: the march reads a module-private CENT_SPEED=2 (src/core/centipede.ts:72, exactly CENTIS's boot value, so wave 1 looks right and never changes) and createCentipede() always lays a full 12-segment train. User playtest 2026-07-20 detected this as 'every wave runs at the same pace' — correct detection of the fence, not a bug. DESIGN SPEC: centipede/docs/superpowers/specs/2026-07-20-centipede-cp4-game-structure-design.md (parent: 2026-07-18-centipede-clone-design.md, roadmap row cp4; demo 'Full loop, start to game-over'). GROUND TRUTH: centipede/docs/rom-study/ — cite the dossier + claims, never re-derive; citation gate live. RADIX: CENTI4.MAC inherits .RADIX 16 via CENDE4 — bare literals hex unless trailing-period decimal; every transcribed constant carries a radix-cited comment + claims entry. CITATIONS: line numbers cite the VENDORED tree only (reference/atari-source/centipede/revision.v4/CENTI4.MAC) — the ~/Projects/centipede-source copy is off-by-one from line 44 (CRLF + form-feeds); re-anchor and machine-verify at delivery (brief.md documents the trap). SCOPE CORRECTION (measured against code, not roadmap prose): the scoring/BCD table already ships (body 10/head 100 CT-35/36, spider 300/600/900 SP-18, flea 200, mushroom 1/5; score2Of/bcdByte in score.ts) — cp4 adds only the bonus-life CONSUMER of the score; high-score DISPLAY already ships (main.ts:49-50 load, render.ts:231 draw) — cp4 adds the WRITE path + initials; 'cap 6' is TWO real caps, the DLIVES HUD icon cap (already ships) AND the 6-life award ceiling (:1990 'CMP I,6 / BEQ ;NO MORE LIVES 6 IS MAX', cp4-4 owns it). NOTE 2026-07-21 (cp4-4 delivery, two corrections a later story must not re-inherit): (a) that ROM 6 counts SPARE lives (:851 'STX LIVES ;NUMBER OF LIVES-1 (WE ARE PLAYING WITH ONE)'), and SimState.lives counts the gun in play too, so the clone ceiling is SEVEN — shipped as LIVES_CEILING = ROM_LIVES_MAX + 1; the HUD still draws min(lives,6), one icon more than DLIVES below the cap, an open divergence. (b) cp4-4's description called :1958-1966 'a 60,000-point spawn-rate bump' — it is NOT: :1959 'BCC ;IF NOT ON 10K BOUNDARY' is the carry out of SCORE1, so COUNT3-=2 fires EVERY 10,000 points. The 60,000 figure belongs to ANTPC's flea descent. That new-head-frequency dial is still unmodelled — a cp5 candidate. Ground truth: centipede/docs/rom-study/open-questions.md entry 13 + claims BL-1..BL-21. CONSTANT-SOURCE FINDINGS (read at design time, each story re-verifies): CENTPC :456-554 holds THREE per-wave effects in the all-dead-guarded opening block, all keyed off CENTIS — SPEED (:479-482 MOBJDV=CENTIS, MOBJDH=±CENTIS sign from FRAME AND 2, so CENTIS drives BOTH axes), FRAGMENTATION not shortening (:549-551 DEAD=NCENT unconditionally, so a short train still puts 12 objects up: CENTIN connected segments then slots CENTIN..11 as LOOSE INDEPENDENT HEADS at random columns :527-546, TWO RNGEN reads each — direction sign via BIT RNGEN→COMP, then HPOS=RNGEN AND 0F8; wave 2 = 11 segments PLUS a free-roaming head, the real difficulty curve), and COLOUR (:461-463 LDA LCOLOR/ORA I,80/STA LCOLOR ';TIME TO CHANGE COLORS' — NOTE 2026-07-21: the COLOUR effect was already shipped end-to-end by cp2-13 the evening before this epic was written, so cp4-3 closed as subsumed). Bonus lives :1968-1995 + BONUSV :248 (.WORD 100,120,150,200 '*100 PER BONUS LIFE', OPTNS D4-D5 → 10k/12k/15k/20k). ATTRT :158 is real self-playing gameplay (steers PLAYH, reverses at 0x1C/0xE4, fires via RSHOT1, reads a screen tile) + CPYRHT message + BONUS :225 panel. GETINT :1001 initials is trackball-driven in silicon — for a keyboard clone it's a UX PORT, the one legit divergence (logged). CROSS-CUTTING RULINGS: DIP options (OPTNS/OPTSW2 — bonus increment, starting lives NLIVES 2-5, unlimited-time bit) are NOT modelled; hardcode
  ROM defaults (bonus increment 10,000=BONUSV[0]; starting lives 3=STARTING_LIVES) and parameterize the input, same as cp3's wave-gating ruling; file an open-questions.md entry. Core/shell boundary holds — speed/fragmentation/bonus/loop are src/core (pure, seeded rng only, no Date.now/Math.random); colour cycling and initials UI reach into src/shell in separate commits. cp4-2's loose-head placement draws from @arcade/shared/rng, two reads per head in ROM order, determinism test replays an identical wave from a fixed seed, purity guard green. SEQUENCING: cp4-1 → cp4-2 → cp4-3 are the wave triad (cp4-1 first, it ALONE fixes the flat-pace playtest); cp4-4/5/6 are the game-loop spine with cp4-5 (game-over) before cp4-6 (save-on-game-over); cp4-7 (attract) last, it replays gameplay and wants the loop closed. ALL SEVEN ARE PARALLEL-SAFE AGAINST cp3-3 (scorpion): none touch SCORP/poison/the dive, so wave progression need not wait on the scorpion — user ruling 2026-07-20, cp4-1 picked up next ahead of cp3-3. Demo at epic end: full loop on 5278 from THIS checkout (lsof the port's cwd or serve a spare port — port-ownership trap) — attract → insert → wave 1 → visibly faster wave 2 with a loose head + colour shift → death → game-over → initials → attract."
priority: p2
status: backlog
