    title: Wave 0 — scaffold, Math Box & glowing wireframe skeleton
    description: 'Scaffolded directly this session (outside the pf pipeline, so no Reviewer verdict): Vite 8 + TS strict + Vitest, the pure-core/IO-shell boundary, the software Math Box (math3d: vec3/mat4 + perspective), seeded RNG, and a glowing wireframe render-loop. Verified: tsc --noEmit clean, vite build OK, 7/7 math-box tests pass. Committed + pushed to github.com/slabgorb/star-wars (develop).'
