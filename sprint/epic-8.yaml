  - id: 8-4
    title: 'Wave 2 — Death Star surface: towers, laser turrets, terrain skim'
    description: 'Renders DEATH_STAR_SURFACE + SURFACE_TOWER from core/models.ts. GEOMETRY DEBT (architect, 8-3 follow-up): those models still carry the nearest-neighbour heuristic EDGES from the 8-2 port and WILL render as tangled wireframes — the exact bug fixed for the TIEs. In scope here: re-author both models'' edges by ring reconstruction (close each coplanar ring into a loop + radial spokes/struts), guard with an inducedSingleCycle topology test (see tests/core/models.test.ts), and give each model a fixed display orientation like TIE_ORIENT in shell/render.ts (authentic object-space axes ≠ in-game view; the trench/surface lie in y=0, towers stand on +y). Eyeball every model the first time it renders — structural tests don''t catch orientation/scale. Detail in context-epic-8.md → ''Geometry connectivity (read before 8-4/8-5)''. Points may need revisiting to cover the re-authoring.'
    points: 5
