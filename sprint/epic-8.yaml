id: '8'
type: epic
title: 'Star Wars: vector cockpit shooter (Waves 0-5)'
description: 'Faithful browser clone of Atari''s 1983 vector Star Wars — first-person cockpit shooter escalating through three phases per wave: space (TIE fighters + fireballs) -> Death Star surface (towers, turrets) -> trench run (exhaust port). Glowing 3D vectors on Canvas 2D, no engine, no backend. Deterministic pure core with a software ''Math Box'' (math3d) wrapped by a thin render/input/audio shell, mirroring tempest. Authentic vector models and speech ported from the cabinet disassembly under star-wars/reference (gitignored).'
priority: p2
status: backlog
repos: star-wars
stories:
