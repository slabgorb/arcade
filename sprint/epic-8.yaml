  - id: 8-8
    title: 'Wave/phase progression: space->surface->trench (make Waves 2-3 playable)'
    description: |-
      Wire wave/phase progression so the built-but-unreachable waves become playable. Today stepGame starts in phase 'space' and never transitions, so the Death Star surface phase (8-4) and the trench phase (8-5) — full gameplay AND rendering — are dark code, reachable only via constructed test states.

      Scope: in src/core/sim.ts (pure/deterministic — dt + seeded RNG only), advance GameState.phase space->surface->trench in order, each wave running the three phases (the epic phase model). Define a per-phase advance condition (clear the wave / survive a timer — derive from StarWars.asm where possible) and carry score/lives across phases. The space->surface leg can be wired now against the completed 8-4 surface phase; the trench leg fully lands once 8-5 exists.

      Also reconcile the surface render placement 8-4 left provisional (only eyeballed in isolation): in src/shell/render.ts turrets render at y=0 while the floor draws at y=-altitude (they float — reconcile the cockpit/altitude frame); DEATH_STAR_SURFACE is sparse (5 cross-sections) and likely needs tiling/scrolling instances or added relief for a convincing skim. Eyeball every surface/turret model in-phase. Detail in sprint/archive/8-4-session.md Delivery Findings.

      Depends on 8-4 (surface phase); the full chain also needs 8-5 (trench). Coordinate with 8-6 framing (difficulty ramp) — this story owns the phase-transition machinery, 8-6 consumes it.
    points: 3
    priority: p2
    status: done
    started: '2026-06-28'
    repos: star-wars
    workflow: tdd
    depends_on: 8-4
    acceptance_criteria:
      - stepGame advances GameState.phase space->surface->trench in order with a defined per-phase advance condition; transitions are deterministic (seeded RNG, dt-driven) and carry score/lives forward.
      - The surface (8-4) and trench (8-5) phases are reachable and playable in the live game — not only via constructed test states.
      - 'Surface phase verified live: eyeball the surface + turrets in the running game; turret/floor altitude framing reconciled (no floating turrets) and surface scale/tiling reads as a skimmable Death Star surface.'
    completed: '2026-06-28'
    review_verdict: approved
