  - id: rb3-1
    title: 'Transcribe ground/landscape data (the rb2-2 analogue) — mountain silhouettes SCAPE0..3 (21/16/18/15 pts, PFPNTS 2-D format via the SEGSTR = pointIndex*6+4 opcode already stubbed in topology.ts), the 24 PFCOL ground-object collision boxes (PFOCOL), and horizon/altitude constants HORZ=1000, HORIZN=$40, PFPLOW=80*4 — into src/core/topology.ts from RBGRND.MAC'
    description: 'Carryforward from rb2-2 (topology.ts): the picture-ROM plane/explosion/blimp connect-lists are transcribed, but topology.ts explicitly scoped OUT the ground-wave SCAPE lists (see its SEGSTR comment). THIS story closes that gap — the rb3 analogue of rb2-2. Source: RBGRND.MAC SCAPE0..3 (findings §7, R2GRND.MAC:725-798) each a PFPNTS x,height,intensity 2-D list (Z discarded, X/2, Y*2); the 24 PFCOL collision boxes (PFOCOL); constants HORZ=1000, HORIZN=$40, PFPLOW=80*4 (min altitude). Reuse the existing ConnectOp/decodeOp machinery + OP_SEGMENT (=SEGSTR, already exported). Pure data + decode, RNG-free, no render. UNBLOCKS rb3-3 (landscape render) and rb3-4 (ground targets).'
    points: 2
