    workflow: tdd
  - id: rb3-3
    title: 'Scrolling landscape — up to 4 PFOBJ mountain slots scroll toward the player and "fall" from the horizon (PFOBMN); render the SCAPE silhouettes via the SEGSTR-decoded 2-D lists through the rb1 scene.ts/camera.ts/horizon.ts substrate; the low-altitude mountain-pass run'
    description: 'Depends rb3-1 (SCAPE data) + rb3-2 (ground mode). Findings §4 (INITGR, R2BRON.MAC:1401-1407; PFOBMN): landscape = the four SCAPE silhouettes fed through up to 4 PFOBJ mountain slots that scroll toward the player and fall from the horizon line (HORIZN=$40). Reuse the rb1 render substrate (scene.ts projectSegment, camera.ts flightView, horizon.ts) — do NOT add a new renderer. The mountains are 2-D playfield objects given depth by the same divide-by-depth projection as the biplanes (findings §8); stroke the decoded SCAPE segments as glowing vectors. GOTCHA (carryforward from rb2-4 reviewer finding): scene.ts only culls edges with BOTH endpoints behind the eye — a mountain crossing min depth can flash a stray near-plane edge; note as candidate follow-up, do not gold-plate.'
    points: 5
    priority: p2
    status: backlog
    repos: red-baron
    workflow: tdd
  - id: rb3-4
    title: 'Ground targets + strafing kills — GRDISP draws ground objects via PFOCOL collision outlines, type index >=4 = active gun emplacement / <4 = passive; player shells (reuse guns.ts CDSSET/SHCDCK rotated windows) strafe them; targets explode with expanding circles (EXCRCL); score via PLVALU = depth x VALFRC (closer worth more), reuse scoring.ts'
    description: 'Depends rb3-1 (PFCOL boxes) + rb3-3 (scrolling landscape). Findings §4 (GRDISP, R2BRON.MAC:3550-3706; PFOCOL): objects with type index >=4 are ACTIVE gun emplacements (they will return fire in rb3-5 via SHLAUN); type <4 are passive. Taxonomy (tank/tent/gun) is NOT labeled in ROM — only geometry + active/passive (findings §9 gap #4); do not invent named object types. Reuse guns.ts player-shell collision (CDSSET builds rotated/projected min-max windows; SHCDCK tests player shells) against the PFOCOL outlines — the SAME hit path as air kills, no new collision engine. Kills explode with an expanding-circle EXCRCL (reuse/extend explosion.ts). Score via scoring.ts PLVALU = depth x VALFRC (closer = more, §4); kills bump OBJKLD -> GMLEVL. First-playable ground slice lands HERE (fly low, strafe targets, score them).'
    points: 5
    priority: p2
    status: backlog
    repos: red-baron
    workflow: tdd
  - id: rb3-5
    title: 'Ground fire (emplacement -> player) — SHLAUN leads/aims at the player, fires only 1 of 4 frames (FRAME&3) and only at GMLEVL>=2 ("NO GROUND SHELLS @ LOWER LEVELS"), shell count grows with level GRSLVL: 0,14,42,70; reuse the guns.ts shell model'
    description: 'Depends rb3-4 (active emplacements exist). Findings §5(b) (SHLAUN, R2BRON.MAC:4022-4110): active ground objects (type >=4) lead/aim a shell at the player, launched only 1 of 4 calc-frames (FRAME&3, ~384 ms) and ONLY at GMLEVL>=2 — no ground shells at lower levels; the active shell budget grows with level via GRSLVL: 0,14,42,70. Reuse the guns.ts shell slot/advance/expire model (enemy shells were skipped by the player-shell hit test in rb2-5 — this is the reverse direction: emplacement shells that threaten the player). The player-hit consequence (death) is the terrain/ground channel handled by rb3-6 + the rb2-9 lives/respawn path — coordinate, do not duplicate the death sequence here.'
    points: 3
