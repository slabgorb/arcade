  - id: rb3-6
    title: 'Terrain-crash death channel — when a mountain reaches min depth SCENE2 runs PLYCOL (window PCDX=0C1, PCDY=60); on contact set GREND D6 "GROUND COLLISION" and abort the frame ("PLAYER RAN INTO GROUND"); the ground-wave death that rb2 explicitly deferred'
    description: 'Depends rb3-3 (mountains reaching min depth). Findings §5(b) (SCENE2/PLYCOL, R2BRON.MAC:781-782): a mountain reaching min depth runs PLYCOL with window PCDX=0C1, PCDY=60; on contact it sets GREND D6 GROUND COLLISION and the main loop aborts the frame ("PLAYER RAN INTO GROUND"). rb2 clamped altitude (I4YPOS 8*4..180*4) so you canNOT crash by pitching in a dogfight — terrain only bites HERE (findings §2, confirmed by context-epic-rb2 guardrail 5). CROSS-EPIC DEPENDENCY: the crash must feed the SAME ENDLFE -> DEC LIVES -> INITIAL respawn + WO.CNT(5) spawn-grace path as rb2-9 (findings §5) — rb2-9 is still BACKLOG. Either sequence rb2-9 first, or land the death-signal seam here (emit a "player died: ground" event) and wire the shared respawn when rb2-9 lands. Architect flags this as the one ordering risk in the epic.'
    points: 3
