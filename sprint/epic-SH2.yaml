  - id: SH2-8
    title: Extract @arcade/shared/glow (browser subpath) — withGlow + glowPolyline superset — and migrate the three flat games
    description: "First BROWSER subpath. Build the neon-glow primitive: withGlow(ctx, style, draw) sets strokeStyle/lineWidth/shadowColor/shadowBlur, runs the draw, then resets shadowBlur to 0 (the footgun every game hand-writes); glowPolyline(ctx, pts, style, close?) is the one-liner built on it. GlowStyle.stroke accepts string | CanvasGradient so richer looks are expressible. Deliberately no ctx.save/restore (mirrors the existing per-frame code). Migrate asteroids/star-wars/battlezone's single-pass polygon + text strokes onto glowPolyline/withGlow; per-cabinet blur/width constants stay in the games. Extend the purity guard so glow is a recognised browser subpath (exempt) while the pure core stays DOM-free."
    points: 5
    priority: p2
    status: backlog
