  - id: SH2-13
    title: Consistent keyboard high-score entry across the cabinet — type initials + Backspace (tempest mousewheel and star-wars/battlezone auto-tag retired; asteroids typing is the reference)
    description: "Make high-score NAME entry consistent and actually usable across the cabinet's four scoring games. Today it is neither. tempest cycles letters with the MOUSEWHEEL (also L/R arrows), click/SPACE confirms — nearly unusable, so players just leave the default. asteroids lets you TYPE on the keyboard (the good pattern) but neither game supports BACKSPACE. star-wars and battlezone do not prompt at all — they silently auto-tag a constant ('ACE' and 'AAA' respectively; battlezone's was descoped in bz1-10). Deliberate guiding call (from the user): IGNORE the arcade ROMs' spinner/joystick entry schemes here — they are poor with a keyboard and we have a keyboard. Converge every scoring game on ONE keyboard entry mechanism, with asteroids' direct-typing flow as the reference: type A-Z (uppercased) to fill the initials, Backspace deletes the last character, and the game's existing confirm (start/fire edge) commits. star-wars and battlezone GAIN a real entry screen (replacing the auto-tag), tempest's mousewheel letter-cycle is retired for typing, and asteroids gains Backspace. Share the VERB (the identical keyboard entry mechanism, likely a small PURE helper in @arcade/shared so it stays DOM-free under the purity guard), keep the NUMBERS per-cabinet (max length, styling, confirm key). NO storage change: entries continue through the existing @arcade/shared/highscore seam (HighScoreEntryBase.name — the 3-char initials convention — via insertHighScore + makeHighScoreStorage). red-baron is OUT OF SCOPE: it is a Wave-0 skeleton with no scoring or high-score stack at all (its high-score entry belongs to epic-rb5, GAMODE 7). This story IS the battlezone initials-entry follow-up that bz1-10 left as a non-blocking 'candidate follow-up' Delivery Finding and never materialized — it supersedes that note. Large: a strong candidate to split per-game during planning (pf sprint story split)."
    points: 13
    priority: p2
    status: done
    started: '2026-07-10'
    repos: arcade-shared,tempest,asteroids,star-wars,battlezone
