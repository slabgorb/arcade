  - id: SH2-11
    title: Extract the "additional pass" compositor + phosphor pass; migrate tempest's phosphor+shake through it (tempest sole consumer)
    description: "Build the post-processing hook the design reserves. @arcade/shared/compositor exports RenderPass {name, render(src,dst,frame), resize?, clear?}, FrameInfo {dt,dpr,width,height,shake}, and createCompositor(passes) -> {beginScene(w,h,dpr), present(main, frame), clear()}: the game draws its scene into beginScene's offscreen ctx, and present runs the pass chain to the screen (empty passes = a plain blit with shake). @arcade/shared/phosphor exports phosphorPass({decay}) -> RenderPass (holding the EMA accumulator + twin buffers) and the pure phosphorAlpha(decay, dt). Migrate tempest's existing beginScene/composite phosphor + screen-shake onto createCompositor([phosphorPass({decay})]) — behaviour-identical, tempest is the ONLY consumer. Porting afterglow to the other cabinets stays deferred; they may adopt createCompositor([]) as a no-op seam."
    points: 5
    priority: p2
    status: backlog
    repos: arcade-shared, tempest
    workflow: tdd
    acceptance_criteria:
      - "@arcade/shared/compositor exports RenderPass, FrameInfo, and createCompositor(passes); an empty-pass compositor blits the scene with shake and changes nothing."
      - "@arcade/shared/phosphor exports phosphorPass({decay}): RenderPass and pure phosphorAlpha(decay, dt) with node unit tests for the frame-rate-corrected fade."
      - tempest renders through createCompositor([phosphorPass({decay})]) with its phosphor + shake behaviour-identical to today (manual run); its local phosphor.ts accumulator is gone; vitest + vite build green.
      - The purity guard recognises compositor + phosphor as browser subpaths; the other three games are not forced to adopt a pass (afterglow port remains out of scope).
