      - asteroids, star-wars, and battlezone stroke their polygons (and stroke-text from SH2-4/5/6) via the shared primitive at a pinned ref; per-cabinet constants remain in each game.
      - The purity guard recognises glow as a browser subpath (exempt) and still fails the pure core on DOM references; each game's vitest + vite build are green.
