  - id: SH2-20
    title: '@arcade/shared/audio adopts the shared synth context bootstrap — kill the THIRD copy of the substrate and its per-gesture AudioContext leak (audio.ts:103-111 orphans a live context when createGain() throws; resume() is wired to every gesture). Internal refactor, no public API change; star-wars + asteroids must stay behaviour-identical.'
    description: |-
      Follow-on to SH2-18, split out of it deliberately. Design: docs/superpowers/specs/2026-07-12-shared-synth-extraction-design.md, section 9.

      The SH2-18 audit found the WebAudio context bootstrap written THREE times, not two. SH2-18 hardens two of them (battlezone, red-baron) onto @arcade/shared/synth's createSynthHost. The third copy lives inside the shared package itself: arcade-shared/src/audio.ts:57 carries its own getAudioContextCtor(), and its resume() (audio.ts:98-117) has the SAME half-built-context leak red-baron's review round 1 fixed — line 103 assigns `ctx = new Ctor()`, and if the subsequent createGain() throws, the catch nulls the field while ORPHANING a live AudioContext. resume() is wired to every user gesture, so a persistent fault leaks one context per keystroke until the browser's cap starts rejecting new ones. /audio also has no closed-context guard.

      So after SH2-18 the cabinet still ships two context bootstraps inside one package — one hardened (/synth), one leaky (/audio). This story kills the third copy: /audio's engine internally adopts /synth's context bootstrap (resume + the live/no-throw guard), deleting getAudioContextCtor and its hand-rolled resume body.

      Held OUT of SH2-18 on purpose: /audio is consumed by two SHIPPED games (star-wars, asteroids, migrated in SH2-17), and that regression risk should not ride along with a synthesis story. This is an INTERNAL refactor — createAudioEngine(manifest)'s public API, the filename-keyed buffer store, channel stealing and star-wars' context() accessor are all unchanged.
