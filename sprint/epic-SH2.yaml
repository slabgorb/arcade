  - id: SH2-18
    title: "Extract @arcade/shared/synth — the WebAudio SYNTHESIS engine skeleton (lazy gesture gate, no-throw contract, resolveContextCtor, noiseBuffer, voice bookkeeping) now that a SECOND synthesis cabinet proves the duplication: battlezone bz1-11 and red-baron rb2-11 hand-write byte-identical copies. DISTINCT from /audio (SH2-16), which is a SAMPLE/.wav buffer player and cannot host oscillator synthesis — the two are siblings, not replacements. Ship the VERB (context bootstrap + silent-degrade + closed-context guard), keep the NUMBERS (each cabinet's oscillators/filters/ROM seams) local. Adopt in battlezone + red-baron via the publish→release→repin dance."
    description: |-
      Extraction of the WebAudio SYNTHESIS substrate, sibling to /audio (SH2-16, the SAMPLE player that cannot host oscillator synthesis — battlezone was formally DESCOPED from SH2-17 for exactly that reason). Design: docs/superpowers/specs/2026-07-12-shared-synth-extraction-design.md.

      THE FINDING (the story is bigger than "dedup"). The substrate exists THREE times at three levels of hardening, and the fixes never propagated between them: red-baron (rb2-11) has the half-built-context close, the closed-context guard (live()) and the no-throw contract (guard()); shared /audio (SH2-16) ORPHANS a live AudioContext on a createGain() throw (audio.ts:103-111) and has no closed-context guard; battlezone (bz1-11) has NO try/catch at all. Verified mechanically: resolveContextCtor() (bz audio.ts:61-65 vs rb audio.ts:165-169) and noiseBuffer() (bz:86-92 vs rb:214-220) are BYTE-IDENTICAL; master gain is 0.8 in both.

      Battlezone's gap is a latent FREEZE, not silence. Its play()/setEngine() call createOscillator() unguarded from stepFrame (main.ts:153-154), which createLoop invokes ABOVE the requestAnimationFrame re-schedule (arcade-shared/src/loop.ts:76, no try/catch). A CLOSED context (iOS audio reclaim, long-backgrounded tab) throws InvalidStateError synchronously, escapes the frame, and kills the rAF chain — render, input, everything. Red-baron's review round 1 caught and fixed precisely this (see its audio.ts:24-35 header); battlezone never received the fix. So this story PROPAGATES A STRANDED HARDENING FIX and dedupes as a consequence. The duplication is the symptom; the disease is having no single home for this class of fix.

      DESIGN: ship a HOST, not an engine. createSynthHost({masterGain = 0.8}) -> { resume(), withAudio(effect), start(name, build) / stop(name), ensure(name, build) }, plus a standalone noiseBuffer(). Deliberately NOT manifest-driven like /audio: the two cabinets' public interfaces genuinely differ (bz setEngine(throttle: number) vs rb setEngine(on: boolean)), so unifying them would mean a lowest-common-denominator API or an oscillator-graph DSL — i.e. inventing a modular synth. Each game KEEPS its own createAudioEngine() and its own public interface; only the context lifecycle moves. Six exports, every one with two proven consumers; isRunning()/stopAll()/context() omitted as YAGNI until a consumer proves them.

      Share the VERB, keep the NUMBERS: every oscillator, filter, cutoff, envelope and ROM seam stays local (rb's pokey.ts, gunStrobe, explosionLevel, approachWhine, engineHumParams; bz's engineParams, saucerVoice, trackVoice). Nothing in /synth asserts a ROM fact. Browser subpath per ADR-0003 — 'synth' joins BROWSER_SUBPATHS in the purity guard, NEVER PURE_SUBPATHS.

      NOT behaviour-preserving for battlezone, BY DESIGN — the epic's house rule departs here in one direction (hardening) for one consumer. Audibly identical in both games; battlezone GAINS the no-throw contract, the closed-context guard and the half-built-context close. Log as a deviation. red-baron is pure dedup (it already has every fix), so adopt it FIRST — it is the source of the hardened code, and its adoption proves the surface fits without a bug fix confounding it. Publish->release->repin dance: arcade-shared v0.12.0 -> v0.13.0; force re-resolution with `npm install @arcade/shared@github:...#<ref>` (a bare npm install keeps the old commit); do NOT delete the shared feature branch until the tag is cut and both pins are bumped. Follow-on SH2-19 kills the third copy in /audio.
