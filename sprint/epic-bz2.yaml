title: Battlezone — playtest followup
description: 'Follow-up epic from the first live playtest of the bz1 slice (through bz1-8). Fixes: canvas stretches to full browser width instead of holding a fixed aspect ratio; HUD/text uses a default sans-serif font instead of the shared arcade vector font used in tempest and star-wars; camera/scale reads too close (objects loom larger/nearer than intended); tank turret/aim control granularity is too coarse to aim precisely; no on-screen control indicator and no pause feature (Escape should pause and show keybinds). Closes with an explicit live playtest pass to verify all fixes together. Sequenced after bz1; tagged p2.'
priority: p2
status: backlog
