  - id: bz2-9
    title: 'Unfair enemy spawns: enemies appear behind/out-of-view and fire instantly, killing the player within ~2s — fix spawn geometry + add a post-spawn fire grace so the opening is survivable'
    description: "Playtest: the opening isn't hard, it's UNFAIR. Enemies spawn behind the player (outside the forward view cone), immediately open fire, and kill the player within ~2s of spawn — no time to turn or react. Not fun / not playable. This is spawn GEOMETRY + instant-fire, not a difficulty-ratchet volume problem. Fix: bias initial/respawn placement toward the forward view cone (or at least a reactable bearing) instead of the rear blind spot, and/or add a brief post-spawn grace before a newly spawned enemy can fire. Keep authentic ROM difficulty as the ceiling for later levels — this is about fair engagement geometry, not softening the ratchet."
    points: 3
    priority: p1
    status: backlog
    repos: battlezone
    workflow: tdd
    acceptance_criteria:
      - Newly spawned enemies do not materialize directly behind / on top of the player and fire before the player can react — no sub-2s unavoidable deaths from spawn.
      - Spawn placement biases toward the player's forward view cone (or a reactable bearing), not the rear blind spot.
      - A brief post-spawn grace prevents a just-spawned enemy from firing on the same frame/instant it appears.
      - Authentic ROM difficulty remains the ceiling for later levels — this fixes fairness, not the ratchet.
    type: bug
