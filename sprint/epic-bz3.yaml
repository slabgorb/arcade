id: bz3
type: epic
title: Battlezone — ROM fidelity against the original 1980 Atari source
description: "Remediation epic for battlezone/docs/2026-07-17-battlezone-primary-source-audit.md, the audit of our clone against the ORIGINAL 1980 Atari assembler source (primary source at ~/Projects/battlezone-source-text; the CRLF sibling ~/Projects/battlezone-source is NOT citable). 161 findings, every citation byte-verified on BOTH sides by `npm test -- citations`; 35 attacked by adversarial refuters (35 survived, 0 killed, 6 materially corrected); a Phase-3 coverage review killed one FALSE BOOK_WAS_WRONG (B-026). THE HEADLINE is the TIMEBASE, not the radix that broke red-baron: movement.ts and firing.ts hard-code FRAMES_PER_SEC=60, but the cabinet game frame is 15.625 Hz (64 ms; NMI 250 Hz divided by 16, 'END OF FRAME (64 MS)' at BZONE.MAC:1085, gated by LSR SYNC at :422). The effect is NOT a uniform 3.84x — the refutation proved it: the tank TURNS 3.84x too fast (pure per-frame quantum), DRIVES forward 1.96x too fast (FORWARD_STEP=48 should be 0x5E=94, the two errors partly cancel), and FIRES shells ~4% slow (the shell integrator already sub-steps 4x per frame). So bz3-1 is a careful per-quantum rebase, NOT a one-line constant change, and it BLOCKS every other numeric story. Note what is NOT wrong: the radix was read correctly everywhere (scores are BCD with implicit x1000), and all 10 of the clone's 3D models are BYTE-EXACT ROM decodes (world-3d filed 0 divergences). Tally: 94 CONFIRMED / 33 DIVERGENCE / 19 NO_COUNTERPART / 13 STRUCTURAL / 2 BOOK_WAS_WRONG. 36 fix-findings clustered into these 13 stories (~41 pts vs 78 raw). RULINGS (user, 2026-07-17): all 13 clusters bought. The audit itself lives on branch chore/audit-primary-source (unmerged). battlezone/tools/audit + tests/audit/citations.test.ts re-open every cited line byte-for-byte and must stay green; the checker REJECTS any citation to a decoy module (COIN65/BZSADG/STATE2/VCRMAN/MBUCOD). Third of the bz1/bz2/bz3 Battlezone epic line."
priority: p1
status: backlog
repos: battlezone
stories:
  - id: bz3-1
    title: "THE TIMEBASE REBASE — the sim runs on FRAMES_PER_SEC=60; the ROM game frame is 15.625 Hz"
    description: "Cluster C1. Subsumes C-001, M-001, M-003, F-004. The systematic error and the gate on everything numeric — LAND THIS ALONE AND FIRST, or every later numeric story bakes the 60 Hz reading into its baseline. movement.ts:45 and firing.ts:59 hard-code FRAMES_PER_SEC=60 labelled 'the ROM player-update cadence', but the cabinet advances one game frame per 64 ms = 15.625 Hz (NMI 250 Hz / 16 via AND I,0F + INC SYNC, BZONE.MAC:1084-1088; consumed by LSR SYNC at MAIN:422). The refutation established the effect is NOT uniform 3.84x: TURN is a pure per-frame quantum (3.84x too fast, M-001); FORWARD is 1.96x too fast because FORWARD_STEP=48 is itself under-scaled — the ROM SIN table peaks at 0x7FFF so the high byte is 127 not 64, and the M.SET halvings give 3/4 x 127 = 0x5E = 94 (M-003), partly cancelling the frame error; SHELL speed is only ~4% slow because the shell integrator already sub-steps 4x per frame (SAVE3=4 loop, BZONE.MAC:608, so 256 is per-sub-step -> ~16000 u/s, F-004). Expect the whole magnitude suite to re-baseline — that is the point, not a regression."
    points: 5
    priority: p1
    status: done
    started: '2026-07-17'
    repos: battlezone
    workflow: tdd
    acceptance_criteria:
      - "The 60 Hz conversion is corrected to the 15.625 Hz (64 ms) game frame everywhere it feeds a per-frame quantum (movement.ts:45, firing.ts:59), each carrying a comment citing BZONE.MAC:1085 (64 ms frame) and :422 (LSR SYNC)."
      - "FORWARD_STEP is corrected 48 -> 0x5E = 94 (the SIN table peaks at 0x7FFF, high byte 127, times 3/4); turn rate and forward speed are re-derived at 15.625 Hz. A test pins the corrected turn (ROM ~22 deg/s), forward, and shell speeds."
      - "The shell integrator is NOT naively rescaled: it already sub-steps 4x per frame (SAVE3=4, BZONE.MAC:608), so 256 is per-sub-step and yields ~16000 u/s — leave it (~4% is within tolerance). A test proves the shell speed was not multiplied by the frame-rate fix a second time."
      - "npm test -- citations stays green; the magnitude test suite is re-baselined against the 15.625 Hz values."
    completed: '2026-07-17'
    type: bug
    review_verdict: approved
  - id: bz3-2
    title: "ENEMY AI AGGRESSION — the ROM tank is attack-dominant; the clone pursues 30% of the time"
    description: "Cluster C2. Subsumes E-002, E-004, E-009, E-011, E-013. Depends on bz3-1 (per-frame conversions). The ROM disposition tree is attack-DOMINANT: a fair coin (LDA PRAND / LSR / BCC R.ATCK) routes at least 50% of decisions straight to attack before any score logic, rising further when the player leads (E-002), where the clone makes pursuit a deliberate 0.3 minority and forbids back-to-back charges. The clone then COMPENSATES with a 2.5-5x wider fire cone (E-004, 6.9 deg vs ROM ~2.8 deg) and a ~1.5x faster turn (E-011, 34/59 vs ROM 22/44 deg/s) — the refuter confirmed these must be retuned TOGETHER with the disposition, not in isolation. Spawn arc is score-scaled in the ROM (0x0F->0x7F = +/-21 deg mild -> +/-178 deg full-aggro, centered on player heading) but the clone uses a fixed +/-90 deg (E-009). And the clone has NO long-range fire restraint where the ROM withholds fire at TDIST >= 0x24 until fully aggressive (E-013)."
    points: 3
    priority: p1
    status: done
    started: '2026-07-17'
    repos: battlezone
    workflow: tdd
    acceptance_criteria:
      - "Enemy disposition is restored to attack-dominant: the ROM's fair-coin route to attack means at least 50% of decisions attack; the clone's charge probability is retuned up from 0.3 and the no-back-to-back restriction reconsidered against R.ATCK."
      - "The fire cone (toward ROM ~2.8 deg) and turn rate (toward ROM 22/44 deg/s) are retuned TOGETHER with the disposition change, not independently — they were compensations for the passivity."
      - "Spawn arc becomes score-scaled (+/-21 deg early -> +/-178 deg full aggression, centered on player heading), and the ROM's rookie fire-restraint (no fire while TDIST >= 0x24 until aggressive) is added."
    completed: '2026-07-17'
    type: bug
  - id: bz3-3
    title: "SPAWN PROBABILITY & ROSTER — missile odds are a 50/50 coin, and the super tank arrives one missile late"
    description: "Cluster C3. Subsumes R-008, E-010. Small and independent. (1) The missile-vs-tank spawn is a fair 50/50 coin flip in the ROM: LSR / BCC at BZONE.MAC:3737-3741 unambiguously resolves to a 1-bit coin, but the clone uses a provisional MISSILE_SPAWN_CHANCE=0.4 (enemies.ts:297) self-flagged 'undecoded'. (2) The super ('high-powered') tank appears one missile EARLY in the clone: NOR2D3 is '#missiles - 1' (LDA I,-1 init at :1175, 'SET TO 0 FOR FIRST' at :3773), so the ROM's CMP I,5 means the 6th missile, while the clone's from-0 missilesLaunched >= 5 fires on the 5th — a clean +1 off-by-one confirmed by the refuter."
    points: 1
    priority: p2
    status: done
    started: '2026-07-17'
    repos: battlezone
    workflow: trivial
    acceptance_criteria:
      - "MISSILE_SPAWN_CHANCE is corrected 0.4 -> 0.5 (fair coin, BZONE.MAC:3737-3741), and its 'undecoded' comment is replaced with the decode."
      - "Super-tank gating is fixed by one: it appears on the 6th missile (NOR2D3 = missiles - 1, CMP I,5), not the 5th."
    completed: '2026-07-17'
    type: bug
  - id: bz3-4
    title: "PER-TYPE COLLISION TABLES — the clone reuses one circle where the ROM has distinct proximity tables"
    description: "Cluster C4. Subsumes F-006, F-007. Depends on bz3-1 (units). The refuter confirmed F-005/006/007 are one architectural pattern: the clone flattens the ROM's per-type proximity tables to a single reused Euclidean tank-circle. (F-005, the shell-vs-tank view-space range+bearing cone, is ruled ACCEPT under the planar-sim descope and is NOT in this story.) Tank-vs-obstacle: the ROM uses per-type PROXTB radii (832/832/1024/960, i.e. .WORD 340/340/400/3C0 hex) where the clone sums two radii (~1876-2283), so obstacles block from ~2x too far (F-006). Shell-vs-obstacle: the ROM uses a distinct, smaller table PRXTBL (56/88/86, trailing-period decimals inside the hex block) with a >>2 range shift the clone omits, approximating it with the big tank-footprint radius (F-007)."
    points: 3
    priority: p2
    status: done
    started: '2026-07-17'
    repos: battlezone
    workflow: tdd
    acceptance_criteria:
      - "Tank-vs-obstacle collision uses the per-type PROXTB radii (832/832/1024/960) rather than the summed-radii approximation."
      - "Shell-vs-obstacle collision uses the distinct PRXTBL table (56/88/86) with the ROM's >>2 range scaling, not the tank-footprint radius."
    completed: '2026-07-17'
    type: bug
  - id: bz3-5
    title: "EXPLOSION DEBRIS — a 6-piece gravity particle subsystem replacing the fixed 1.5s timer"
    description: "Cluster C5. Subsumes F-008 (re-sized m -> l by the coverage review AND the refuter: it is a whole new particle subsystem, not a constant swap). Depends on bz3-1. The ROM object explosion is a 6-piece gravity-driven particle sim: launch velocities IZVEL = 55,40,70,88,40,66 (BZMTNS.MAC:837-838, DECIMAL in that file's .RADIX 10 block — the refuter found a SIXTH byte .BYTE 66 at :838 that the auditor missed), GRAVTY = -4/frame (BZONE.MAC:380, decimal), pieces expanding then falling over ~3 s until the tallest lands. The clone has a fixed 1.5 s timer with no debris physics. Build this as a REUSABLE particle subsystem — the volcano eruption (bz3-6) consumes it."
    points: 5
    priority: p2
