id: td1
type: epic
title: Tech debt — fleet-wide fixes and carried-open items from the joust jt1 epic
description: 'Cross-repo tech debt surfaced by the jt1 joust foundation epic (2026-07-19/20). Three classes: (1) FLEET-WIDE holes joust found and closed locally — the sibling repos still carry them; (2) FOLD-BACK of improvements joust proved (the AST purity scanner and its case tables); (3) CARRIED-OPEN items the jt1 reviews named honestly rather than silently shipping. Each story cites the joust story/review that found it, and where joust already shipped the fix, the joust implementation is the reference — port it rather than re-deriving.'
priority: p2
status: backlog
repos: lobby,tempest,star-wars,asteroids,battlezone,red-baron,centipede,joust
stories:
  - id: td1-1
    title: Fleet strictPort is porous — pin host 127.0.0.1 in every subrepo's vite config
    description: "Found by the jt1-3 review (2026-07-20) and reproduced in this environment: strictPort does NOT protect a pinned port. With 127.0.0.1:5279 held, vite binds [::1]:5279 and starts normally — two dev servers, one port, NO collision error. This makes CLAUDE.md's pinned-port guarantee AND its own 'the port may belong to a different checkout' warning weaker than documented: you can serve and screenshot the WRONG CHECKOUT with no error at all, which is exactly the trap the docs warn about, minus the safety net. joust already carries the fix (host: '127.0.0.1' on server AND preview in vite.config.ts, joust#11 era) — port it verbatim to the seven siblings. Note the behavioural strictPort test in joust/tests/scaffold.test.ts occupies IPv4 only, which is why it was flaky before the host pin; siblings that copy the test should copy the fix with it. Also worth updating the orchestrator CLAUDE.md trap paragraph to say strictPort alone is insufficient."
    points: 2
    priority: p2
    status: done
    started: '2026-07-20'
    repos: lobby,tempest,star-wars,asteroids,battlezone,red-baron,centipede
    workflow: trivial
    acceptance_criteria:
      - "Every servable subrepo's vite.config.ts pins host: '127.0.0.1' on both server and preview blocks; just serve still launches the whole fleet."
      - With a port held on IPv4, that subrepo's dev server FAILS loudly rather than binding the IPv6 twin (prove for at least one repo).
      - The orchestrator CLAUDE.md wrong-checkout trap paragraph states that strictPort alone does not protect the pin.
    completed: '2026-07-20'
    type: chore
    review_verdict: approved
  - id: td1-2
    title: Fold the AST purity scanner back to centipede and tempest — six false negatives each
    description: "joust proved the shape; the siblings still run the regex comment-stripper with all six holes. Source: joust/tests/helpers/purity-scanner.ts (jt1-7 + jt1-11), built on the TypeScript compiler API (ts.createSourceFile — acorn is NOT in the Vite 8/rolldown tree and is JS-only anyway; that misprescription cost jt1-7 a finding). What ports: five intent-named ban tables (objects, member pairs, bare identifiers, calls, constructors) plus aliasing, general trivia-node unwrapping (parens/NonNull/satisfies/as-casts, proven general by composed review attacks), string-literal element access through the member table, located file:line reports, and the documented-limits header (five dataflow routes + shadowing strictness) with its mutation-checked rail. The six false negatives the siblings currently have: string-embedded /*, string-embedded //, template interpolation, Math destructuring alias, Date function-reference alias, and a string carrying BOTH markers. joust's test file is written as a portable flip/hold case table — copy it, expect to DELETE more code than you add. Watch for repo-specific ban differences (each game's core bans its own shell globals)."
    points: 3
    priority: p2
    status: backlog
    repos: centipede,tempest
    workflow: tdd
    acceptance_criteria:
      - centipede and tempest each run the TS-compiler-API scanner; all six false negatives are caught in each repo, each proven red against the old scanner once.
      - Each repo's existing purity expectations still pass and the full suites stay green — no false positives on their generated/data modules.
      - Both carry the documented-limits header and its rail; the centipede '= Date' double-report (fixed in joust's copy with a lookahead) is gone.
    type: chore
  - id: td1-3
    title: Re-take the joust demo screenshot — the committed one predates the shear fix
    description: "joust/docs/rom-study/jt1-6-demo.png was captured BEFORE the reshapeRagged hotfix (joust#12). The bottom island in it is progressively sheared — up to ~18px by its last row — because expandComcl5's ragged rows were being consumed at a fixed stride. The jt1-6 Reviewer's warning is the reason this matters: 'a monotonic skew on a rocky cliff reads as texture, not error. Human review of a render is good at is-this-a-cliff and poor at is-this-cliff-sheared.' So the artifact currently misrepresents the shipped renderer, and an eyeball cannot tell. Re-capture from THIS checkout with lsof port-ownership proof (the jt1-6 precedent: a stale server held 5279 and was proven out rather than assumed). While here, consider whether a known-good pixel comparison belongs in the suite — the Reviewer's point was that geometric fidelity needs a pixel-level or reference check, not a human glance; if that is more than 1 point, file it separately rather than growing this. ⚠️ SEQUENCING — DO td1-5 FIRST (established during the td1 run, 2026-07-20). td1-5 includes an adversarial pass over the joust RENDER INTERNALS (atlas/blit path, ragged-row reshape, integer scaling) and may FIX defects there. Capturing before td1-5 risks re-staling the artifact for exactly the reason it is stale now — a render change landing after the capture. Shoot LAST. ALSO (from td1-1, done 2026-07-20): joust's vite server now pins host 127.0.0.1 on both server and preview, but a stale sibling checkout WITHOUT the pin can still hold [::1]:5279 alongside your 127.0.0.1:5279 — so `lsof -ti tcp:5279` may return more than one server, and 'my server started fine' is NOT proof you are screenshotting your own tree. Prove the cwd of the PID actually answering. See also td1-8: `just serve` currently swallows a failed launch, so a fleet with one game silently missing still looks healthy — do not infer ownership from the serve banner."
    points: 1
    priority: p3
    status: backlog
    repos: joust
    workflow: trivial
    acceptance_criteria:
      - The committed demo screenshot is re-taken from the post-hotfix renderer with lsof (or equivalent) proof of 5279 ownership recorded in the story notes.
      - The bottom island's vertical channel columns hold position across consecutive rows (the shear signature is absent).
    type: chore
  - id: td1-4
    title: Triage the two orchestrator extract-audio reds — tempest/red-baron link-5 audits
    description: "Two tests in the ORCHESTRATOR suite (tests/extract-audio.test.mjs, run with node --test, NOT vitest) have been red since at least 2026-07-19 and are unowned: 'audit: tempest sfx — link 5 catches the 4 sounds whose shipped bake omits the ROM terminal-zero write' and 'audit: red-baron — link 5 catches the 3 inverted envelopes (TP/BN/WP/TH synthesised, TK real)'. Confirmed still failing 2026-07-20 (19 pass / 2 fail of 21). First observed by jt1-1's TEA, who PROVED them pre-existing by moving his own new test file aside and re-running — so they are not attributable to any jt1 story (the develop-red misattribution trap; TEA's control is the right method to repeat). They depend on the gitignored vendored Atari source/audio assets, so the leading hypothesis is an ENVIRONMENT gap in this checkout rather than a code defect — but that is a hypothesis, not a finding: nobody has actually opened them. Triage first (env vs real regression), then either fix, or make the tests skip loudly when their inputs are absent (the jt1 discipline: a test that silently passes without its inputs is worse than one that skips)."
    points: 2
    priority: p3
    status: done
    started: '2026-07-20'
    repos: .
    workflow: tdd
    acceptance_criteria:
      - 'Both failures are diagnosed and the diagnosis is recorded: environment gap vs real regression, with the evidence that distinguishes them.'
      - Either the audits pass, or they SKIP self-describingly when the vendored assets are absent — never a silent pass; the orchestrator suite is green either way.
    completed: '2026-07-20'
    type: bug
    review_verdict: approved
  - id: td1-5
    title: Close the jt1 carried-open verification gaps — render internals and the text-match vacuity sweep
    description: "Two items the jt1 reviews explicitly declared UNVERIFIED rather than implying coverage. Both are recorded in the archived sessions; this story closes them. (1) RENDER INTERNALS: the jt1-6 review's edge-hunter was outstanding at write-up, so the atlas stream/raster discriminant, ragged-row reshape, integer scaling/smoothing, palette denylist and CSRC5L 13-of-14 rested on 'suite green + SM eyeball' — and the specialist LATER found a real defect there (reshapeRagged, fixed in joust#12). The class deserves a real check now: adversarial probing of the atlas/blit path, and consideration of a known-good pixel comparison for geometric fidelity (the Reviewer's point: a human eye reads monotonic skew as texture). (2) THE TEXT-MATCH VACUITY SWEEP: carried open since jt1-5. At least one doc/text assertion was found to be keyword-proximity rather than a content check (the arena-header case: it bites for the exact old sentence but its positive assertions accept vague prose). TEA flagged whole-file text matches passing vacuously THREE times across the epic. Sweep every text/source-scanning assertion in the joust suite and mutation-check it: does it fail on plausible wrong content, or only on the literal string someone happened to mutate?"
    points: 2
    priority: p3
    status: backlog
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - Every text-matching or source-scanning assertion in the joust suite is mutation-checked; vacuous ones are re-aimed at content, and the sweep result is recorded (how many checked, how many were vacuous).
      - The render internals get an adversarial pass beyond the existing suite; any defect found is fixed or filed, and the geometric-fidelity check question (pixel comparison vs known-good) is answered explicitly rather than left open.
    type: chore
  - id: td1-6
    title: tempest bake-sfx expandSeq omits the ROM AUDC high-nibble mask on a ramp — player_fire diverges from event 3
    description: |-
      Surfaced by td1-4 (2026-07-20), NOT created by it — a pre-existing tempest bake-tool defect that only became visible once td1-4 un-crossed the orchestrator's cue->ROM-address map (scripts/audio/games/tempest.mjs). Before that fix, link 5 was comparing player_fire's ROM slice against a DIFFERENT cue's shipped bake, so this divergence was hidden behind the wrong comparison.

      THE DEFECT: tempest/tools/pokey-bake/bake-sfx.mjs's expandSeq() never applies the ROM's AUDC high-nibble (distortion) mask on a ramp — the odd-channel XOR/AND-0xF0/XOR dance MODSND performs in ALSOUN.MAC. The orchestrator's own envelope.mjs DOES apply it (maskHighNibble: true). Consequence: player_fire's LA record ramps AUDC by -8 per step, the ROM masks the high nibble on every step, the shipped bake does not — so the two streams disagree from event 3 onward, not merely at the tail. Observed reason string: ROM=[1,170] shipped=[1,154].

      This is DISTINCT from the terminal-zero-write omission affecting segment_tick/enemy_explosion/enemy_fire/spike_shot (those read ROM=[0,0] shipped=null). Two different bake-tool bugs; do not conflate them.

      td1-4 deliberately surfaced this as a real MISMATCH rather than narrowing the assertion to hide it — tests/extract-audio.test.mjs:243 currently asserts player_fire MISMATCH with a distinguishing reason match. That assertion is the canary: when this story lands, that expectation must flip to ROM_VERIFIED. Fixing the bake tool without updating it will redden the orchestrator suite, which is the intended coupling.

      Scope note: the fix is in the TEMPEST subrepo (tools/pokey-bake/), which is why td1-4 (scope '.') could not take it. Verified by the td1-4 Reviewer as real, with 'out of scope here' confirmed as the right call.
    points: 2
    priority: p3
    status: backlog
    repos: tempest
    workflow: tdd
    type: bug
  - id: td1-7
    title: Scaffold suites guard the wrong invariant — assert host 127.0.0.1 pin, not just strictPort
    description: |-
      Found by the td1-1 Reviewer (2026-07-20). battlezone/tests/scaffold.test.ts:53, red-baron/tests/scaffold.test.ts:70 and centipede/tests/scaffold.test.ts:69 each assert 'strictPort: true' — the guarantee td1-1 just PROVED INSUFFICIENT — while NOTHING asserts host: '127.0.0.1', the guarantee that actually works.

      WHY THIS MATTERS: the suites currently guard the broken invariant and leave the working one unguarded. A future edit could silently delete the host pin and regress the exact bug td1-1 fixed, with a fully green suite. That is the same failure shape td1-4 found in the audit tooling (a check that cannot fail is worse than no check) and the same shape jt1 flagged repeatedly.

      THE PROOF td1-1 established, at the socket layer, both directions:
        held 127.0.0.1:19911 -> binding vite's default host 'localhost' SUCCEEDED on ::1  (port shared, NO error)
        held 127.0.0.1:19912 -> binding '127.0.0.1' gave EADDRINUSE                       (fails loudly)
      So the pin is the load-bearing line; strictPort alone is not.

      SCOPE: add an assertion for host: '127.0.0.1' on BOTH the server and preview blocks to the three repos that already have a scaffold.test.ts. Correctly deferred from td1-1 (a 2-point mechanical config port) rather than scope-creeping it.

      WORTH CONSIDERING: lobby, tempest, star-wars and asteroids have no scaffold.test.ts at all, so they carry no guard of either kind. Decide explicitly whether to extend the pattern to them or leave them unguarded — and record the decision either way rather than leaving it implicit.

      A BEHAVIOURAL test (bind 127.0.0.1, assert the dev server fails loudly) would be stronger than a regex check on the config text, but note joust's own behavioural strictPort test occupies IPv4 only and was flaky before the host pin — copy that fix if the test is ported.
    points: 1
    priority: p2
    status: backlog
    repos: battlezone,red-baron,centipede
    workflow: trivial
    type: chore
  - id: td1-8
    title: just serve swallows a failed launch — bare wait returns 0, fleet looks healthy with one game silently missing
    description: |-
      Found by the td1-1 reviewer-silent-failure-hunter (2026-07-20), empirically reproduced. PRE-EXISTING — not introduced by td1-1 — but directly undermines the guarantee td1-1 was meant to make trustworthy, which is why it belongs to this epic.

      THE DEFECT (justfile:139-164, the 'serve' recipe):
      1. Line 141's 'set -euo pipefail' does NOT catch a failure inside a backgrounded subshell (lines 156-163).
      2. Lines 147-154 print all eight 'ready' URLs UNCONDITIONALLY, BEFORE any server has attempted to bind — the banner claims success for a repo whose npm run dev is about to EADDRINUSE.
      3. Line 164's bare 'wait' returns 0 regardless of which jobs died. The recipe's exit code carries no health information; a caller checking $? sees success with a dead server.

      REPRODUCTION (synthetic, exact shape of the recipe):
        set -euo pipefail
        ( sleep 0.2; exit 7 ) &
        ( sleep 5 ) &
        wait
        echo reached
      -> 'reached' prints, outer exit code 0. The failed job is invisible.

      CONSEQUENCE: because the other seven dev servers are long-running, 'wait' blocks forever with 7 up and 1 dead. The operator's only signal is that repo's vite stack trace interleaved with seven repos' concurrent startup chatter. No summary line, no non-zero exit.

      WHY IT MATTERS HERE: td1-1 fixed vite so a port collision fails LOUDLY at the process level — verified at the socket layer (EADDRINUSE, exit 1). This wrapper then re-attenuates that signal back toward silence. 'The fleet looks healthy with one game silently missing' is the SAME failure shape as the wrong-checkout trap CLAUDE.md warns about: you believe you are serving your own tree, and you are not. Fixing vite while leaving 'just serve' deaf gets much less than the fix is worth.

      SUGGESTED FIX (from the specialist): track each backgrounded PID and wait individually (or 'wait -n' in a loop), exiting non-zero with a NAMED summary line (e.g. 'FAILED: red-baron did not start') when any job dies. Also consider moving the ready-URL banner to AFTER a successful bind, so it stops asserting readiness it has not observed.

      RELATED: td1-1 also surfaced that vite.config.ts is excluded from type-checking everywhere in the fleet (every tsconfig include is [src,tests]; no ESLint; CI runs only build+test). Proven by injecting 'host: 5150' (a number where string|boolean is required) into lobby/vite.config.ts — 'npm run build' passed cleanly. Consider folding a scoped config type-check into this story or filing it separately.
    points: 2
    priority: p2
    status: backlog
    repos: .
    workflow: tdd
    type: bug
  - id: td1-9
    title: Four repos carry no scaffold suite at all — lobby, tempest, star-wars, asteroids have no config guard of any kind
    description: |-
      Filed by the td1-7 Dev + Reviewer (2026-07-20) as the recorded answer to td1-7's mandated OPEN DECISION, and made durable here because the decision otherwise lived only in the gitignored .session/ file (caught by the td1-7 reviewer-rule-checker as its single rule violation — a decision the story required to be explicit was, in tracked terms, invisible).

      THE DECISION td1-7 TOOK, and why: lobby, tempest, star-wars and asteroids all carry the correct `host: '127.0.0.1'` pin in vite.config.ts (landed by td1-1) but have NO tests/scaffold.test.ts of any kind — no port pin assertion, no base assertion, no strictPort, no host. They are not guarding the broken invariant like the td1-7 three were; they are guarding NOTHING. Authoring four scaffold suites from scratch (choosing the idiom, then port/base/strictPort/host/allowedHosts assertions per repo) is materially more than the 1 point td1-7 was sized for, so td1-7 deliberately left them unguarded and filed this instead of growing scope. That call was independently reviewed and upheld.

      WHY IT STILL MATTERS: the pin in those four configs is load-bearing and completely unprotected by tests. A future edit can delete `host: '127.0.0.1'` from any of the four and every suite stays green — which is exactly the regression td1-1 fixed and td1-7 guarded against elsewhere. td1-1 proved at the socket layer that strictPort alone does NOT protect a pinned port: with 127.0.0.1 held, vite falls through to the IPv6 twin [::1] and starts with NO collision error, so you can serve and screenshot the WRONG CHECKOUT silently.

      REFERENCE IMPLEMENTATION: battlezone, red-baron, centipede and joust now all carry a block-anchored host assertion (td1-7). Port that shape — and note td1-7's own lesson, learned the hard way: a bare `count(cfg, "host: '127.0.0.1'") >= 2` is NOT sufficient. The td1-7 Reviewer proved by execution that moving both pins into the server block and leaving preview bare keeps the count at 2 and the suite fully green, under a test named "on both server and preview". Anchor on block membership, not occurrence count. Mutation-check every assertion, including that specific both-in-server case.

      SCOPE NOTE: these four repos differ from each other more than the td1-7 three did (the lobby has no lint script, and allowedHosts/tunnel config is not uniform across them), so expect per-repo variation rather than a verbatim four-way copy.
    points: 3
    priority: p3
    status: backlog
    repos: lobby,tempest,star-wars,asteroids
    workflow: tdd
    acceptance_criteria:
      - lobby, tempest, star-wars and asteroids each gain a tests/scaffold.test.ts guarding at minimum the pinned port, base, strictPort on both blocks, and host 127.0.0.1 on both blocks.
      - Every new assertion is mutation-checked and observed RED before being accepted, including the both-pins-in-server-preview-bare case that td1-7 proved slips past an occurrence count.
      - All four suites and builds stay green, and each repo still passes standalone (a bare clone must not need the orchestrator).
    type: chore
