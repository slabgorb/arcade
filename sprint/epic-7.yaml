  - id: 7-7
    title: 'Canonical arcade server: one authoritative way to serve the games (dev + production)'
    description: "The arcade orchestrator pattern has been cloned ~4 times under ~/Projects (a-2, a-1, arcade, plus a standalone tempest), and every copy can launch its own Vite dev server. Result: the 'production' server on port 5273 (arcade.slabgorb.com via the Cloudflare tunnel) was pinned to a standalone ~/Projects/tempest checkout that sat 5 commits behind, while active work happened in a different copy — so shipped work (6-2, 6-4) never appeared on the live server. There is no single source of truth for serving the games. Establish ONE canonical way to serve the arcade (lobby + game subrepos): a single authoritative checkout + launch command at the orchestrator, pinned ports, the tunnel wired to that checkout only, and the duplicate clones identified and marked non-authoritative or removed. Goal: starting work or viewing the live arcade never depends on guessing which of N copies is current. Known copies (2026-06-27): ~/Projects/a-2/tempest (current), ~/Projects/tempest (standalone, served 5273, stale), ~/Projects/arcade/tempest, ~/Projects/a-1/tempest."
    points: 3
    priority: p1
    status: backlog
    repos: orchestrator
    workflow: tdd
    acceptance_criteria:
      - A single canonical checkout/location is documented as the source of truth for serving the arcade
      - One launch command at the orchestrator (justfile recipe or script) serves the lobby + all game subrepos on their pinned ports from the canonical checkout
      - The production server (arcade.slabgorb.com / Cloudflare tunnel, ports 5273 tempest + 5270 lobby) is wired to the canonical checkout only
      - Duplicate/stale clones under ~/Projects are enumerated and either removed or clearly marked non-authoritative
      - CLAUDE.md / README documents the canonical serve workflow so no one starts an ad-hoc server from a random clone
    type: chore
