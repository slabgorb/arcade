title: Star Wars — ROM fidelity pass (post-audit follow-ons)
description: 'Concrete ROM-fidelity divergences surfaced by the sw2-6 disassembly fidelity audit (docs/sw2-6-disassembly-fidelity-audit.md): the ported star-wars sim faithfully reproduces vertex data, aim/lock, and several scores, but diverges from the 1983 cabinet on score VALUES (TIE 100 vs ROM 1,000; exhaust port 1,000 vs 25,000), the surface phase (flat 4-kill quota vs 22-50 towers + missing 50k all-towers bonus), the trench (no pilotable viewpoint -> unavoidable catwalk shield loss; identical every run; turrets never fire), audio (no music; only 4 of 23 speech lines wired), and HUD scoring (no extra lives, no bonus row). Each story ports a specific ROM behavior. Sequenced after epic sw2.'
priority: p2
status: backlog
repos: star-wars
