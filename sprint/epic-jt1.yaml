  - id: jt1-2
    title: "Citation checker + claims JSON — the dossier becomes machine-verified before any constant is transcribed"
    description: "Port the centipede checker (cp1-2 shape; single-sided schema per the rom-source-study skill: id, claim, source{file,line,verbatim}, corroboration?). Convert docs/rom-study/ brief+subsystems+pictures citations into docs/rom-study/claims/*.json. The checker re-opens every cited line in the vendored tree (arcade/reference/williams-source/joust) byte-for-byte, prints one error per bad claim, exits non-zero; it degrades gracefully (schema-only checks) when the vendored tree is absent, so CI stays green. MAME citations (williams*.cpp) get schema-only claims (the sparse clone is machine-local). THIS BLOCKS jt1-3, jt1-4, and jt1-5 — the rb4/cp1 lesson: any numeric story that lands before the gate re-bakes its own misreadings and then confirms itself."
    points: 3
    priority: p1
    status: backlog
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "npm test -- citations re-opens every claim byte-for-byte against the vendored tree; a deliberately drifted line number or altered verbatim fails the suite (prove red once)."
      - "Every citation in brief.md, subsystems.md, and pictures.md exists as a claims/*.json entry; the 20-citation synthesis cross-sample is among them."
      - "Checker runs schema-only without the vendored tree; CI (which lacks it) is green."
      - "Radix traps are schema-encoded: a claim whose verbatim carries @ octal or !X operators round-trips exactly (no evaluation, no normalization)."
  - id: jt1-3
    title: "Image transcription — decode JOUSTI.SRC into src/core/pictures.ts, byte-gated, with COMCL5 RLE + collision spans + contact sheet"
    description: "Transcribe the merged images source (JOUSTI.SRC — the link target; entity .SRC files are artist provenance, pictures.md) into a committed data module: both record formats (3-word entity frames with position word + w/h-at-source; 4-word background records = partial DMA blocks), the COMCL5 RLE stream decoded via the NEWCL5/UNCOM algorithm (SYSTEM.SRC:927-1023), the collision span tables (COFF bias, $8000/$8100 sentinels), and the COLOR1/HICOLR palettes (BBGGGRRR, resistor weights per williams_v.cpp:342-343). NO ROM binaries exist — the gate is a vitest that re-derives every frame from the vendored JOUSTI.SRC text (and cross-checks OSTRICH.SRC/*.PIC provenance for at least one entity) and compares byte-exact. Radix traps enforced: @ octal rows, decimal spans, % binary COMCL5, DMAFIX !X pre-XOR. Bake a contact-sheet artifact (91 blocks + COMCL5 expansion; bake-models.mjs precedent) for human review. NO hand-authored pixels anywhere. ASH1R/L (undecoded third format, open-questions §5) may be stubbed with its consumer traced or explicitly deferred with a finding."
    points: 5
    priority: p1
    status: backlog
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "A test re-derives pictures.ts from the vendored JOUSTI.SRC byte-for-byte (frames, spans, palettes, COMCL5 expanded); it degrades to committed-fixture comparison when the tree is absent (CI)."
      - "Frame names traceable to JOUSTI.SRC labels; the 91-block inventory from pictures.md is complete and identified on the committed contact sheet (ostrich/stork/buzzard 14 each, riders 13, egg 6, troll hand 6, flame 4, poof 3, ptero 6, cliffs, transporter)."
      - "COMCL5 expands to CLIFF5's raw pixels via the transcribed RLE algorithm, cited to SYSTEM.SRC:927-1023; the expansion is pinned by test."
      - "Zero hand-drawn pixel data: every byte in pictures.ts provably originates in the vendored source; citations suite green."
  - id: jt1-4
    title: "The arena — cliff placements, landing tables + snap Ys, lava + bridge, wrap bounds, ceiling/floor"
    description: "The static world, transcribed: cliff/transporter/bridge placements (pictures.md layout table; JOUSTI.SRC:54-290, 749-752; JOUSTRV4.SRC:1126-1127 solid fills), the landing model — bitmask tables (LNDXTB/LNDYTB semantics, JOUSTRV4.SRC:6703-6707) resolving to the six hard-coded snap Ys (68/80/128/137/162/210, JOUSTRV4.SRC:6729-6759) — landing is a SNAP, not a resolve; cliff-side collision as the separate BCKXTB path (trace BCKCOL far enough to pin behavior — open-questions §4); X wrap [−10,292] modulus 303 (ELEFT/ERIGHT, JOUSTRV4.SRC:38-39, WRAPX :7291-7297); elastic ceiling $20 (:6497-6506); lava floor death at FLOOR+7 (:6508-6521); lava level per wave ($EA→$E0, :1929-1933, :962); bridge as wave-3 destruction hook (TBRIDGE, :954-957 — destruction animation itself may defer to jt3 with the troll). Every constant radix-cited + claims entry. Determinism pinned by test."
    points: 5
    priority: p1
    status: backlog
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "Platform surfaces, wrap bounds, ceiling/floor, and placements all transcribed with radix-cited comments AND claims entries; npm test -- citations green."
      - "Landing resolves via the bitmask+snap model: an entity crossing a platform's band from above lands AT the transcribed surface Y (all six), never penetrates, never sub-pixel-rests; walk-off-edge enters flight with zero VY."
      - "X wrap is the ROM's [−10,292]/303 arithmetic (an entity at 293 emerges at −10); ceiling reflects velocity exactly (elastic); crossing FLOOR+7 kills."
      - "No wall-clock, no Math.random in core (purity guard stays green)."
  - id: jt1-5
    title: "Flight + ground movement — flap impulse decay, gravity pair, FLYX ladder, ground state machine, 2P input contract"
    description: "The flap model, transcribed exactly (subsystems §2): flap on release→press edge; impulse ΔVY = ((PTIMUP×96)>>8) − 96 (ADDFLP, JOUSTRV4.SRC:6429-6436); PTIMUP saturating frame counter (:6476-6478); gravity 4/frame wings-down (button held), 8 wings-up (:952-953, :6170, :6197) — the glide mechanic; FLYX 9-entry ladder ±{2.0,1.0,0.5,0.25,0} px/frame indexed by PVELX, ±2×joystick per flap edge only, REJECTION clamp at ±8 (update discarded, not saturated — :6440-6448; comments lie, trust branches); NO air drag, NO terminal velocity (negative tests pin both absent); takeoff −$0080 + 1px lift vs walk-off zero-VY (:6123-6151); wing-frame holds decoupled from gravity state (:6147, :6221, :6203); positions integrate as 16-bit pixel+fraction. Ground: the STATE machine (:7160-7175) with animation-driven deltas (ORRUN 0/3/2/1/2, skid 2 — :7185-7189, :7242), 8-frame state advance, landing conversion FRCONV (:6253-6257), skid sets PLANTZ=2 (:6071-6072 — recorded now, consumed by jt2's joust). Bump registers as one-shot positional shoves (:7270-7284, :6495-6496). Input: device-agnostic per-player contract {dir −1/0/+1, flap edge} mirroring the ROM's normalisation (:7261-7263); shell maps P1 arrows+flap and P2 A/D+flap, both proven against the same core contract in a shell test. Deterministic under seeded replay."
    points: 5
    priority: p1
    status: backlog
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "Flap impulse, gravity pair, FLYX values, clamp-rejection semantics, wrap/ceiling/floor interactions, and the ground-state deltas all transcribed with radix-cited comments + claims entries; citations suite green."
      - "Negative tests prove no-drag (horizontal speed persists indefinitely without flapping) and no-terminal-velocity (VY grows unbounded until floor/ceiling) — the dossier's cited negative claims stay true in code."
      - "Determinism: identical seed + input script reproduces the identical flight trajectory bit-for-bit through wrap, ceiling bounce, landing, and takeoff."
      - "Both players drive the same core contract from different shell mappings (P1 arrows, P2 A/D) in a shell test; a rapid-flap script out-climbs a slow-flap script (PTIMUP decay observable)."
