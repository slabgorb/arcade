    title: "Flight + ground movement — flap impulse decay, gravity pair, FLYX ladder, ground state machine, 2P input contract"
    description: "The flap model, transcribed exactly (subsystems §2): flap on release→press edge; impulse ΔVY = ((PTIMUP×96)>>8) − 96 (ADDFLP, JOUSTRV4.SRC:6429-6436); PTIMUP saturating frame counter (:6476-6478); gravity 4/frame wings-down (button held), 8 wings-up (:952-953, :6170, :6197) — the glide mechanic; FLYX 9-entry ladder ±{2.0,1.0,0.5,0.25,0} px/frame indexed by PVELX, ±2×joystick per flap edge only, REJECTION clamp at ±8 (update discarded, not saturated — :6440-6448; comments lie, trust branches); NO air drag, NO terminal velocity (negative tests pin both absent); takeoff −$0080 + 1px lift vs walk-off zero-VY (:6123-6151); wing-frame holds decoupled from gravity state (:6147, :6221, :6203); positions integrate as 16-bit pixel+fraction. Ground: the STATE machine (:7160-7175) with animation-driven deltas (ORRUN 0/3/2/1/2, skid 2 — :7185-7189, :7242), 8-frame state advance, landing conversion FRCONV (:6253-6257), skid sets PLANTZ=2 (:6071-6072 — recorded now, consumed by jt2's joust). Bump registers as one-shot positional shoves (:7270-7284, :6495-6496). Input: device-agnostic per-player contract {dir −1/0/+1, flap edge} mirroring the ROM's normalisation (:7261-7263); shell maps P1 arrows+flap and P2 A/D+flap, both proven against the same core contract in a shell test. Deterministic under seeded replay."
