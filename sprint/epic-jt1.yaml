    description: "Transcribe the merged images source (JOUSTI.SRC — the link target; entity .SRC files are artist provenance, pictures.md) into a committed data module: both record formats (3-word entity frames with position word + w/h-at-source; 4-word background records = partial DMA blocks), the COMCL5 RLE stream decoded via the NEWCL5/UNCOM algorithm (SYSTEM.SRC:927-1023), the collision span tables (COFF bias, $8000/$8100 sentinels), and the COLOR1/HICOLR palettes (BBGGGRRR, resistor weights per williams_v.cpp:342-343). NO ROM binaries exist — the gate is a vitest that re-derives every frame from the vendored JOUSTI.SRC text (and cross-checks OSTRICH.SRC/*.PIC provenance for at least one entity) and compares byte-exact. Radix traps enforced (CORRECTED by jt1-3 TEA census: pixel rows are $ HEX — 13,724 of them, zero @ literals in JOUSTI.SRC; collision spans bare DECIMAL (7+COFF); COMCL5 is % binary, an Elias-gamma BIT stream per SYSTEM.SRC:938-1023, NOT value/run pairs; octal only in the palettes SYSTEM.SRC:908-923 + JOUSTRV4.SRC:754-761; DMAFIX !X pre-XOR). Bake a contact-sheet artifact (93 blocks + COMCL5 expansion; bake-models.mjs precedent) for human review. NO hand-authored pixels anywhere. ASH1R/L (undecoded third format, open-questions §5) may be stubbed with its consumer traced or explicitly deferred with a finding. [AC-2 count amended 91→93 by SM ruling 2026-07-20: pictures.md's per-entity table and an independent machine census both sum to 93; only the dossier's headline sentence says 91 — that arithmetic slip is fixed in-story.]"
