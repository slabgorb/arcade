urrently mapped silently, ROM-faithfully). ALSO: jt1-7 (purity-scanner tokenizer) and jt1-10 (SUB-001/002 process-block arithmetic) both GATE this story — check their status before setup; if either is unstarted, the SM must sequence them first or explicitly waive the gate with rationale.] [jt1-4 REVIEW ADDENDUM, mutation-tested: (a) the REVISED reachability ruling — full reachability still belongs to the X-table story, but the cheap partial version lands WITH jt1-5: derive [...new Set(LND_Y_TABLE)] (= {0,1,2,4,8,16,128,0xA0}) and assert groundOutcome handles each — today CASES covers all eight by coincidence, not construction. (b) bridgeDestroyedOnWave: mutating >= to === passed EVERY test (confirmed silent-regression channel, MEDIUM) — the wave-4 one-liner is riding jt1-7; verify it landed before trusting bridge coverage.] [jt1-4 REVIEW ADDENDUM 2 (edge-hunter returned; all findings verified first-hand by the Reviewer): arena.ts exports are UNFROZEN and groundOutcome returns PLATFORMS[i] BY REFERENCE — a determinism channel the purity guard cannot see (mutating a returned platform corrupts the module permanently; seeded replay diverges silently); freeze the exports and correct the header's false 'no shared mutable state' claim — an API decision for this story, not a drive-by. wrapX is WHOLE-PIXEL-domain only: fractional inputs escape the band in both directions (292.5→292.5; −10.5→292.5) — ROM-faithful (the ROM wraps the whole-pixel D register with the fraction in a separate byte) but this story integrates 16-bit pixel+fraction and the signature invites passing the composite; document the domain or assert integrality. Fold the NaN/out-of-range coercion cluster (applyCeiling(NaN)→confident bump, isLavaDeath(NaN)→false, groundOutcome(256)→airborne via &0xff, land(undefined)→raw TypeError) into ONE input-validation decision, not six patches. Corroboration: the 256-mask CKGND verification now has TWO independent confirmations.]"
