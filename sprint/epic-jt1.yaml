id: jt1
type: epic
title: Joust — foundation slice (scaffold, citations, image transcription, arena, flight, render)
description: "First epic of the joust clone — the arcade's first WILLIAMS game and second raster title. DESIGN SPEC (user-approved 2026-07-19): joust/docs/superpowers/specs/2026-07-19-joust-clone-design.md. GROUND TRUTH: joust/docs/rom-study/ (brief, subsystems, pictures, glossary, open-questions) — built with the rom-source-study skill from the vendored 1982 Williams source (arcade/reference/williams-source/joust, pin 9bcfdb1) + the MAME williams driver (~/Projects/mame/src/mame/williams, sparse). Cite the dossier, do not re-derive it. RULINGS: RV4/red-label behavior target (JOUSTRV4.SRC is both citation file and behavior; pre-patch originals preserved in ******** comments); 2-PLAYER SIMULTANEOUS co-op (P1 arrows+flap, P2 A/D+flap; the ROM degrades co-op→survival solo, so 1P is free); faithful raster (JOUSTI.SRC frames + COLOR1 palette — nibbles are literal palette indices, no remap PROM); free play (no coin layer; keep GA1/REPLAY/NSHIP + HSTD; JZAP/LZAP/KZAP zappers deliberately omitted); playable-slice epics. TIMEBASE: one sim step per video frame, FRAME_HZ = 8e6/(512*260) = 60.09615 (williams.cpp:1556); the ROM's nap unit IS one frame (five author oracles, brief §3) — never convert a gameplay constant through 4ms. CORE MODEL stays ROM-shaped: tagged-union process list with frame naps (40-slot scheduler, subsystems §1), positions 16-bit pixel+fraction (256 = 1 px/frame), PVELX is a FLYX table INDEX, joust resolves on sub-pixel PLANTZ+PPOSY, span collision + bitmask landing/snap, NO air drag / NO terminal velocity (cited negative claims — pin with tests). RADIX DISCIPLINE: Motorola syntax — bare DECIMAL, $ hex, @ OCTAL (all palette bytes + image rows!), % binary; every transcribed constant carries a radix-cited comment + claims entry; jt1-2 lands before any constant is transcribed (rb4/cp1 lesson). NO ROM BINARIES vendored — image transcription byte-gates against JOUSTI.SRC's own FCB/FDB data + *.PIC S-Records. ROADMAP AFTER THIS EPIC: jt2 the joust (~15: enemies/AI budget, joust resolution, eggs, wave machine core, transporters), jt3 menagerie (~13: pterodactyl+patches, lava troll, bridge, baiters, DYTBL ramp), jt4 game structure (~10: 2P co-op + six wave types, scoring/BCD, extra men, HSTD+initials, attract lessons), jt5 sound (~8: path decision — sound ROM source ABSENT, lean on MAME williamssound + shipped ROM), jt6 ship (~5: lobby tile, R2 + joust.slabgorb.com, release, closing rom-fidelity-audit). Demo at epic end: fly the ostrich around the authentic arena on 5279. Repo github.com/slabgorb/joust is bootstrapped (develop default, gitflow; dossier + spec merged) but has NO scaffold yet — jt1-1 creates it."
priority: p1
status: backlog
repos: joust
stories:
  - id: jt1-1
    title: "Scaffold — Vite/TS/Vitest on port 5279 + core/shell purity guard + CI caller + orchestrator registration"
    description: "Mirror centipede's config (the newest raster scaffold): Vite 8, TypeScript, Vitest 4, strictPort 5279, base '/'. src/core and src/shell skeletons with the boundary guard: a source-text scan test forbidding shell globals and wall-clock (window/document/Date.now/Math.random and friends) in src/core/ — word test prose to avoid the comment-scanner trap. Ten-line CI deploy caller of slabgorb/arcade/.github/workflows/deploy-r2.yml@main targeting bucket arcade-joust. Orchestrator side: add joust to justfile games/subrepos lists and serve recipe, flip the CLAUDE.md port row from reserved to live, update repos.yaml notes past pre-implementation."
    points: 2
    priority: p1
    status: backlog
    repos: joust
    workflow: tdd
    acceptance_criteria:
      - "npm install && npm run build && npm test green from a fresh checkout; npm run dev serves on 5279 and fails loudly if the port is taken (strictPort)."
      - "Purity guard test exists, passes, and demonstrably fails when a forbidden global is introduced in src/core/ (prove with a temporary red run in the story notes)."
      - "CI workflow caller committed; a push to main would deploy dist/ to arcade-joust (workflow-lints clean; no release cut in this story)."
