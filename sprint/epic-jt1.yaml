  - id: jt1-7
    title: Purity-scanner hardening — real tokenizer for the core boundary guard (five confirmed false negatives)
    description: "GATES jt1-5 (flight/movement — the first story whose core code grows real logic worth guarding). The jt1-1 Reviewer confirmed five false negatives in tests/purity.test.ts's comment-stripper/scanner, all reproduced by execution with a live control: (1) a /* inside an ordinary string constant silently disables the guard for everything up to the next real */ later in the file — worst case, accidental not adversarial; (2) // inside a string likewise truncates the line before scanning; (3) template-literal ${...} interpolation is stripped as comment-adjacent text; (4) aliasing escapes every call-anchored ban (const { random } = Math; const n = random()); (5) see the jt1-1 archived session (sprint/archive/jt1-1-session.md, Reviewer findings) for the fifth reproduction + the test-analyzer's stripper hole. Fix needs a real tokenizer (acorn is already in the dependency tree via vite), not regex patches — the Reviewer's explicit warning: a rushed regex patch in a rejection loop is how new holes get added. Fleet-wide pattern: centipede and tempest share the scanner shape; fold the fix back in a follow-up once joust proves it."
