    description: "The flea, transcribed from rev-4. ANTPC (CENTI4.MAC:128) initializes the flea into slot 12 (ANTP =MOBJP+12., CENDEF.MAC:138); ANTMV (CENTI4.MAC:46) drops it down the screen — transcribe the spawn TRIGGER (the ROM ties it to the mushroom population in the player zone — transcribe the actual count/rows from code), the mushroom SEEDING it performs as it falls (which cells, what probability source — must draw from the seeded rng, determinism preserved), the descent speed(s), and the hit behaviour (the folklore is two hits with a speed-up after the first — transcribe what rev-4 actually does, cite it, and record any folklore divergence). Kill scores flea 200 (CENTIP.DOC:115, rev-1 prose — diff against code per open question 4). Where the spawn condition reads wave state not yet modelled, parameterize per the epic's wave-gating ruling; the story's tests force spawns via debug seeding."
