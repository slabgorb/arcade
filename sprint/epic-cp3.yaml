  - id: cp3-3
    title: "The scorpion (SCORP) — horizontal crossing, poison creation LIVE, dive activation; the ecosystem demo"
    description: "The scorpion, transcribed from rev-4, and the epic's assembly story. SCORP (CENTI4.MAC:2000) starts and moves the scorpion — transcribe the start condition (parameterize any wave input per the epic ruling), crossing rows, direction, and speed(s). Every mushroom it passes becomes POISONED — the sole creator of the 0x38-0x3B band (cp1-4 pre-extraction, claim PM-19; POISON_DESTROY 0x37). This story turns two dormant branches LIVE for the first time: cp2-3's poisoned-dive (a centipede head meeting a scorpion-poisoned mushroom plunges to the bottom zone) and cp1-6's poison render branch (mushroomStamp 0x38-0x3B) — both get live-integration tests driven by an actual scorpion crossing, not seeded fields. Kill scores scorpion 1000 (CENTIP.DOC:116, rev-1 — diff per open question 4); transcribe whether the scorpion can harm the player (the gun sits in the bottom zone; transcribe what the code says rather than assuming). ECOSYSTEM DEMO: wave 1 + debug-forced spawns of all three creatures on 5278 — train marching, spider weaving, flea seeding, scorpion poisoning, a poisoned dive on screen. Port-ownership trap applies to any capture (lsof the server's cwd or serve a spare port)."
