  - id: cp3-4
    title: "DEFECT — the flea goes live: render slot 12, and wire CENTPC's per-wave CENTIN decrement so it can spawn"
    description: "cp3-2 shipped a creature that never appears. The core transcription is correct and stays untouched; two integration links were never made, and BOTH must be for the flea to exist in the actual game. (1) NOTHING RENDERS SLOT 12 — `grep -rn 'flea\\|ANT0' src/shell/` returns nothing, so the flea descends, seeds mushrooms and kills the player INVISIBLY. cp3-1 rendered the spider as part of the spider story (spiderStamp + the slot-13 blit in src/shell/render.ts); cp3-2 did not do the same for slot 12. The atlas already carries ANT0-ANT3 from cp1-3's picture ROM, so no new art is needed — the flea's live band is pic<0x20 (ANT0 at 0x1C) and the 0xFF-0xFA explosion pool falls through to segmentStamp exactly as the spider's does. TRAP: ANTMV advances the picture by TWO (:83-87 INC ANTP *then* ADC I,01), so the reachable cycle is 0x1C -> 0x1E -> 0x1C and ANT1/ANT3 are DEAD ART. That is faithful (open-questions.md item 9) — do not 'fix' the cycle to reach four frames. (2) THE GATE IS WELDED SHUT — SimState.centin is pinned at CENTIN_INIT=12 for the entire game, and ANTMV's gate (:63-65 'CMP I,12.' DECIMAL, ';NO ANTS EARLY IN GAME') blocks a parked flea whenever centin >= 12. Only unit tests can open it. The epic's wave-gating ruling assumed a debug-seeding affordance; RULED OUT by the user (2026-07-20) — transcribe the REAL mechanism instead. CENTPC (:457-475) is a two-counter cadence: SHOOT's wave-clear tail (:2315 '50$: INC X,CENTIS-1 ;FASTER', the same site that already sets WAVE_DELAY at :2317-2319) bumps CENTIS, then the NEXT wave's CENTPC — gated on all-dead (:458-459 ';NO CHANGE IN COLOR OR SPEED UNTIL ALL DEAD', which is the wave-clear re-lay and NOT the death re-lay) — decrements CENTIN only when CENTIS >= 3 (:463-466), reloads it to 0x0C on reaching zero (:467-469), then resets CENTIS to 2 at/after 40,000 (SCORE2 >= 4) or 1 below it (:470-475). Boot is CENTIN=12./CENTIS=2 (:1166-1175). The cadence that falls out: CENTIN reaches 11 on WAVE 2 — so the flea becomes reachable in ordinary play one wave in — then every second wave below 40,000 and every wave above it. SCOPE FENCE: createCentipede() stays hardcoded to NCENT=12; CENTPC's short-train + loose-extra-head lay (:526-547, two RNGEN reads per extra head) is wave-progression work and belongs to cp4, so centin drives the flea gate ONLY here and the deviation is logged. Sequence BEFORE cp3-3, whose ecosystem demo needs a visible flea. Also fixes cp3-2's cosmetic review carry-forward: tests/flea.test.ts says '31 legal columns' where the true count is 30 (32 masked candidates 0x00..0xF8 step 8, less the rejected 0x00 and 0x08)."
    points: 2
    priority: p1
    status: backlog
    repos: centipede
    workflow: tdd
    acceptance_criteria:
      - "src/shell/render.ts draws slot 12: a fleaStamp maps the live band pic 0x1C-0x1F to ANT0-ANT3 (mirroring spiderStamp), the 0xFF-0xFA pool falls through to segmentStamp, and 0xF9 draws nothing. A flea parked off the top draws NOTHING — gated on the ROM's own definition of on-screen (:58-61 'CMP I,0F8 / BCC ;IF ON SCREEN, KEEP MOVING' and :124 'JSR ANTPC ;REMOVE ANT FROM SCREEN'), not an invented flag; claims entry added."
      - "CENTPC's per-wave CENTIN/CENTIS cadence transcribed with radix-cited comments + claims entries; npm test -- citations green. CENTIS increments on the wave-clear tail only, the decrement runs on the wave-clear re-lay and NOT on the death re-lay, and the 0x0C reload + the 40,000-point CENTIS reset are pinned by test."
