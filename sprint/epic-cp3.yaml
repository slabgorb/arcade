title: Centipede — the menagerie (spider, flea, scorpion) + poison goes live
description: "Third centipede epic — the menagerie, RESCOPED per the cp2 planning ruling (2026-07-19, logged in epic-cp2.yaml): player death + the RESTOR sweep moved UP into cp2, so cp3 is spider/flea/scorpion, their collisions + scoring, and poison creation going LIVE (~11 pts, was ~13). DESIGN SPEC: centipede/docs/superpowers/specs/2026-07-18-centipede-clone-design.md (roadmap row cp3; demo 'The complete ecosystem'). GROUND TRUTH: centipede/docs/rom-study/ — cite the dossier + claims, never re-derive; citation gate live. SUBSYSTEM ANCHORS (subsystems.md, rev-4 CENTI4.MAC): flea ANTMV :46 + ANTPC :128, spider BUGOFF :250 + BUGMV :285, scorpion SCORP :2000; PLAY :1769 (extended from cp2-5 to creature contact), EXPLOD :961. SLOT MODEL (glossary): flea is slot 12 (ANTP =MOBJP+12., CENDEF.MAC:138), spider slot 13 (BUGP =MOBJP+13., CENDEF.MAC:139) — the author's names are ANT=flea, BUG=spider. RADIX: CENTI4.MAC inherits .RADIX 16 via CENDE4 — bare literals hex unless trailing-period decimal; every transcribed constant carries a radix-cited comment + claims entry. SCORING PROSE IS REV-1 (open question 4): CENTIP.DOC's verified examples — flea 200 (CENTIP.DOC:115), scorpion 1000 (:116), spider 300/600/900 by proximity (:117), spider hugs the bottom from 60,000 points (:201-202) — are DIFFED AGAINST REV-4 CODE before baking; code wins, divergences recorded in open-questions.md. POISON GOES LIVE: the scorpion is the sole creator of poison mushrooms (band 0x38-0x3B, POISON_DESTROY 0x37 — pre-extracted by cp1-4, claim PM-19); cp2-3's transcribed poisoned-dive branch and cp1-6's poison render branch are first exercised by real gameplay here. WAVE-GATING RULING (same class as cp2's poisoned-dive deferral): spawn/behaviour conditions that read wave or score state not yet modelled (wave progression is cp4) are transcribed with that input PARAMETERIZED and test-pinned; the demo forces spawns via debug seeding, and the conditions go fully live with cp4. Sequencing: all stories need cp2 complete (EXPLOD, PLAY, death + RESTOR machinery); cp3-1 spider first (extends PLAY contact death), cp3-2 flea independent after cp2, cp3-3 scorpion last (activates the dive + carries the ecosystem demo). Demo at epic end: the complete ecosystem on 5278."
priority: p2
