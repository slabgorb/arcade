id: SH
type: epic
title: Shared arcade library — extract cross-repo duplication into @arcade/shared
description: "Extraction epic arising from the 2026-07-04 cross-repo survey and ratified by docs/adr/0001-shared-code-strategy.md (Accepted). Shared code lives in a new dedicated repo `arcade-shared`, published as scoped package `@arcade/shared` with subpath exports (/math3d, /rng, /highscore, /loop), consumed by each game + the lobby as a version-pinned git-URL npm dependency (no registry). Eligibility bar: only code that is byte/algorithm-identical across >=2 games is extracted — game-specific render pipelines, sim bodies, and input maps stay put. Sequence proves the pipe cheaply first (math3d + rng are byte-identical and comment-flagged 'port, don't share') before harder migrations. NOTE: the vector-font strategy is a SEPARATE decision (future ADR-0002) — two incompatible approaches (Vector Battle TTF vs tempest's ROM stroke font) — and is NOT in this epic; it gates bz2-2/A2-2 independently."
priority: p2
status: backlog
repos: arcade-shared
stories:
  - id: SH-1
    title: Scaffold arcade-shared repo + @arcade/shared package (subpath exports, prepare->ESM+d.ts build) and prove the git-URL dependency pipe end-to-end
    description: "Stand up the shared-code home decided in ADR-0001. New independent repo `arcade-shared` (origin github.com/slabgorb/arcade-shared), package `@arcade/shared` with an `exports` subpath map and a `prepare` step that builds ESM + .d.ts via tsc. Register it in .pennyfarthing/repos.yaml as a sibling subrepo. Prove consumption: one game (battlezone) declares a pinned git-URL dep and imports a trivial shared export, with `vite build` + vitest green — validating that Vite consumes the dep before any real extraction lands."
    points: 3
    priority: p2
    status: done
    started: '2026-07-06'
    repos: arcade-shared
    workflow: trivial
    acceptance_criteria:
      - arcade-shared repo exists with package @arcade/shared, an exports subpath map, and a prepare build producing ESM + .d.ts.
      - Registered in .pennyfarthing/repos.yaml (default_branch develop, gitflow) as a gitignored sibling subrepo.
      - One consumer game installs the package via a pinned git-URL ref (github:slabgorb/arcade-shared#vX.Y.Z) and imports a real export; its vite build and vitest both pass.
      - 'The dev inner-loop path (npm link or a #branch ref) is documented in the shared repo README.'
    completed: '2026-07-06'
    type: chore
    review_verdict: approved
  - id: SH-2
    title: Extract Math Box (math3d) into @arcade/shared/math3d and re-point star-wars + battlezone to the pinned dep
    description: "math3d.ts is byte-identical between star-wars and battlezone (battlezone's header explicitly flags it as evidence for this extraction). Move it verbatim into @arcade/shared/math3d, port its tests, and re-point both games to consume the pinned dep. This is the near-zero-risk first payload that proves the extraction pattern."
    points: 3
    priority: p2
    status: done
    started: '2026-07-06'
    repos: arcade-shared
    workflow: tdd
    acceptance_criteria:
      - math3d + its tests live in @arcade/shared/math3d; extraction is a no-op diff (behavior-identical).
      - star-wars and battlezone both import @arcade/shared/math3d at a pinned ref; their local core/math3d.ts is deleted.
      - Each consumer's full vitest suite (including the ported math3d + camera-mvp tests) passes against the dep.
    completed: '2026-07-06'
    review_verdict: approved
  - id: SH-3
    title: Extract RNG into @arcade/shared/rng — settle the single Rng contract (mutable vs immutable) and migrate all sims
    description: "rng.ts is logic-identical (mulberry32) across star-wars/asteroids/battlezone (mutable) and tempest (immutable, rngNext -> {value, rng}). Pick ONE contract, extract to @arcade/shared/rng, and migrate consumers — tempest's call sites are the real work if the mutable form wins (or vice-versa). Determinism/replay behavior must be preserved exactly for already-shipped games; pin them by tag."
    points: 5
    priority: p2
    status: done
    started: '2026-07-07'
    repos: arcade-shared
    workflow: tdd
    acceptance_criteria:
      - A single Rng contract is chosen and documented in the extraction; the decision + rationale is recorded (deviation log or ADR note).
      - '@arcade/shared/rng exports the PRNG; star-wars/asteroids/battlezone/tempest all consume it at a pinned ref; local core/rng.ts removed.'
      - Seeded-sequence tests prove byte-identical output to each game's pre-extraction RNG (no determinism regression).
    completed: '2026-07-07'
    review_verdict: approved
  - id: SH-4
    title: Extract high-score + storage into @arcade/shared/highscore and make the lobby import the same contract (compile-time)
    description: "highscore.ts + storage.ts are algorithm-identical across tempest/star-wars/asteroids, and the lobby reads their {gameId}-high-scores localStorage entries by convention only. Extract a module with the table logic generic over the domain field (level vs wave) plus a makeHighScoreStorage(gameId, validator) factory and a shared key-builder. Wire the lobby to import the SAME key-builder + row guard the games write — turning today's convention into a compile-time contract."
    points: 5
    priority: p2
    status: done
    started: '2026-07-07T19:30:43Z'
    repos: arcade-shared
    workflow: tdd
    acceptance_criteria:
      - '@arcade/shared/highscore exports HighScoreEntry (generic domain field), qualifies/insert logic, a {gameId}-high-scores key-builder, and a row validator.'
      - tempest/star-wars/asteroids write high scores via the shared module at a pinned ref; local highscore.ts + storage.ts duplication removed.
      - The lobby imports the shared key-builder + row guard rather than re-deriving the key/shape by hand.
      - The single MAX_HIGH_SCORES source-of-truth lives in the shared module (no per-repo redeclaration).
    completed: '2026-07-07'
    review_verdict: approved
  - id: SH-5
    title: Extract the fixed-timestep game-loop accumulator into @arcade/shared/loop (carrying asteroids' last===0 fix)
    description: "star-wars and asteroids share a near-identical createLoop accumulator; asteroids fixed a `last === 0` sentinel bug that was never backported. Extract the corrected primitive to @arcade/shared/loop; star-wars + asteroids consume it; tempest keeps its richer event-draining wrapper as a local layer on top; battlezone (loop inlined in main.ts) adopts the primitive."
    points: 3
    priority: p2
    status: backlog
    repos: arcade-shared
    workflow: tdd
    acceptance_criteria:
      - '@arcade/shared/loop exports the fixed-timestep accumulator with asteroids'' started-boolean fix (no last===0 ambiguity).'
      - star-wars and asteroids consume it at a pinned ref; battlezone's inlined loop is replaced by it.
      - tempest's richer wrapper composes over the shared primitive rather than duplicating the accumulator.
