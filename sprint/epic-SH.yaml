    description: "Battlezone has a live lobby tile but no highscore.ts/storage.ts, so its tile reads NO SCORE forever. This is the concrete payoff/proof of SH-4: battlezone adopts the shared highscore module, writing conforming {gameId}-high-scores entries the lobby already knows how to read — with the contract now enforced at compile time rather than by hand-copy."
    points: 3
