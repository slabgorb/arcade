  - id: rb4-3
    title: "DETERMINISM — the sim seeds its RNG from Date.now(); the ROM's RANDOM is an LFSR"
    description: "Cluster C11 (GP-003). Small, cheap, and it UNBLOCKS regression-testing every other story in this epic — do it early. main.ts:467 calls createRng((Date.now() + kills)) to spawn every wave, INSIDE the sim-step path, and main.ts:349 seeds the blimp RNG from the wall clock too. The ROM's RANDOM (RBARON.MAC:6193) is a pure software LFSR with no clock input. Two consequences: the sim is non-deterministic (same-seed replay and same-seed regression tests are impossible — which is exactly what the rest of this epic needs), and it violates the core/shell boundary, which forbids the deterministic sim from reading wall-clock time."
    points: 3
    priority: p1
    status: backlog
    repos: red-baron
    workflow: tdd
    acceptance_criteria:
      - "Zero calls to Date.now() / performance.now() / Math.random() remain anywhere in src/core/ or in the sim-step path of src/main.ts. A test greps for them."
      - "One seeded Rng is threaded through the sim; the SHELL owns the seed and passes it in. The same seed + the same inputs reproduce the same game, pinned by a determinism test."
      - "The determinism test fingerprints a full multi-wave run (enemy spawn sides, blimp rolls, wave composition) and asserts two same-seed runs are identical."
    type: bug
  - id: rb4-4
    title: "WIRE UP THE DEAD MECHANICS — the returning ace is never imported and the player CANNOT DIE"
    description: "Cluster C3. Subsumes CD-010, CD-011, EN-019, MI-021, CB-004, SN-009. The story that turns the clone back into a game. FOUR mechanics are wired to nothing. (1) returning-ace.ts is NEVER IMPORTED by any source file — the signature Red Baron mechanic is dead code, and the refuter confirmed the evade logic inside it is actually CORRECT, it is simply unreachable. (2) main.ts declares `lives` (:342) and assigns it (:406) and NEVER READS IT — there is no death, no respawn, no game over. (3) There is NO ground collision at all: you cannot fly into a mountain, though the ROM checks GREND every frame BEFORE any motion (RBARON.MAC:783-784). (4) No extra lives (BONUSL). (5) score-tick and bonus-life events are declared in core/events.ts and consumed in audio-dispatch.ts but EMITTED BY NOTHING — so three of the five shipped POKEY sounds (TK, TP, BN) can never play."
    points: 13
    priority: p1
    status: backlog
    repos: red-baron
    workflow: tdd
    acceptance_criteria:
      - "returning-ace.ts is imported and driven from the sim: the ROM calls EOLSEQ every calc frame (RBARON.MAC:825). The evade test already in the module (|PLDELX| >= 0x1C toward ENSIDE, first evasion free via BEFLAG, 50/50 thereafter) is REACHED — do not rewrite it, wire it."
      - "`lives` is READ: reaching zero ends the game. The two death channels are distinct (shot down vs flew into the ground) and carry the ROM's own durations (.TIME1=16, .TIME2=28 calc frames = 1.536 s / 2.688 s at 96 ms)."
      - "Ground collision exists: flying into a mountain kills you, via the ROM's GREND path (RBARON.MAC:4643-4645, D6=GROUND COLLISION), checked BEFORE motion each frame."
      - "Extra lives are awarded (BONUSL, RBARON.MAC:1602), and the bonus-life event is EMITTED so the BN sound can fire."
      - "The score COUNT-UP exists (SCOREM: the ROM ticks the score up over time and fires SOUND 0 / SOUND 4 on every tick) and EMITS score-tick, so TK and TP can fire. The audio layer is NOT at fault — pokey.ts and audio-dispatch.ts are already correct; the producers are missing."
      - "A test proves every GameEvent variant declared in core/events.ts has at least one producer in src/. No event may be declared-and-consumed but never emitted."
    type: bug
  - id: rb4-5
    title: "THE CAMERA IS THE WRONG SHAPE — the arcade TRANSLATES the world; we ROTATE it"
    description: "Cluster C4. Subsumes FL-013, FL-014, FL-015, FL-001, FL-004, FL-005. A genuine rewrite, not a constant tweak — say so honestly. The ROM has NO YAW ROTATION: turning adds the scaled PLDELX to UNIV4X, a linear universe-X, and objects are drawn at (their X - UNIV4X) (RBARON.MAC:3200-3213, :2910). It has NO PITCH ROTATION either: climb/dive subtracts the eye height I4YPOS from every object's Y before the single Z rotation and the divide-by-depth (RBGRND.MAC:277-283). We rotate the camera about Y and emit a transient pitch. Also FL-001: the `.4WORD` macro (RBARON.MAC:15-18) MULTIPLIES EVERY OPERAND BY 4, so POTDLY — the pitch table — is 4x what we transcribed. That is an undecoded macro, the classic way this method's findings go wrong, and here it went wrong in OUR code."
    points: 13
    priority: p1
    status: backlog
    repos: red-baron
    workflow: tdd
    acceptance_criteria:
      - "The view pipeline is translation-based: world pan via a UNIV4X-equivalent, eye height via an I4YPOS-equivalent, then the ROM's single Z rotation and divide-by-depth. No yaw rotation matrix and no camera pitch remain."
      - "PITCH_TABLE is re-derived through the `.4WORD` x4 expansion: [-128,-92,-68,-40,-20,0,16,32,52,72,100], not the raw operand list."
      - "The DISCHK proximity bands are the right way round (the refuter confirmed ours are INVERTED: CLOSE is x0.375 and FAR is x1.0, on a x2 baseline), and ground mode forces the MIDDLE band (0x40 = D6 = x0.625), not the slowest."
      - "The POT.X turn step is proportional to the error (an arithmetic >>3, bounded [-16,+15]), not a constant ramp; the invented MAX_TURN=40 cap is gone."
      - "HORIZN = 0x40 = 64 is added to the projected Y of EVERY object (POSITH), and the horizon sits at the finite depth HORZ = 0x1000 = 4096 and moves with altitude."
      - "This story depends on rb4-1 (its constants are hex) — do not land it first."
    type: refactor
  - id: rb4-6
    title: "THE ENEMY IS THE WRONG MACHINE — the weave reverses at the INNER window, and runs on Y too"
    description: "Cluster C5. Subsumes EN-016, EN-017, EN-018, EN-020, EN-021. A rewrite of the enemy stepper, not a constant tweak. (1) We reverse the weave at the OUTER window; the ROM reverses at the INNER one — P.INER is reached only when |position| < P.ILIM and does `EOR I,0FF ;REVERSE FLAG (HEAD AWAY FROM CENTER)` (RBARON.MAC:2794-2797). The plane turns around when it gets CLOSE TO CENTRE. This changes the shape of every engagement. (2) Enemy planes NEVER MOVE VERTICALLY in our clone; the ROM runs the SAME window/servo machine on the Y axis (PLNDEL enters with LDX I,2 for Y, then DEX/DEX to X=0 and re-runs the whole machine on X — RBARON.MAC:2747-2754, :2865-2873). (3) Planes FLY PAST you and are destroyed as objects when they cross P.MNDP; ours hover at a depth floor forever. (4) Drones have their own two-phase PARALLEL→FREE behaviour; ours weave exactly like leads. (5) The 90-degree entry bank is discarded on our first step()."
    points: 13
    priority: p1
    status: backlog
    repos: red-baron
    workflow: tdd
    acceptance_criteria:
      - "The weave reverses at the INNER window limit (P.ILIM), heading away from centre, and accelerates toward the P.IIDL target by level."
      - "The window/servo machine runs on BOTH axes — enemy planes move vertically as well as laterally, biased by HORIZN."
      - "A plane that crosses P.MNDP (0x140 = 320) is DESTROYED as an object and arms the returning attack (GMEND0), with the WO.RTN re-entry delay — it does not hover at a floor."
      - "Drones implement the PARALLEL→FREE two-phase behaviour and spawn at DRINZ = 0x1600, not at the lead's depth."
      - "The blimp is an APPROACHING airship (Z from 0x1000, closing 0x80/frame), gated behind FOUR planes having appeared (N.PLNZ), firing 1-in-4 calc frames (2.604 shots/s) and only at GMLEVL >= 2 — NOT the constant-depth lateral drifter firing every 2nd frame at all levels that we ship. (CD-005 CERTIFIED our blimp as correct; the coverage review proved that CONFIRMED FALSE — it borrowed the plane's div-by-2. Do not trust it.)"
      - "Depends on rb4-1."
