id: rb4
type: epic
title: Red Baron — ROM fidelity against the original 1980 Atari source
description: "Remediation epic for red-baron/docs/2026-07-13-red-baron-primary-source-audit.md, the audit of our clone against the ORIGINAL 1980 Atari assembler source (primary source at ~/Projects/red-baron-source-text; the CRLF sibling ~/Projects/red-baron-source is NOT citable). 169 findings, every citation byte-verified on BOTH sides; 98 attacked by adversarial refuters (95 survived, 3 killed, 72 materially corrected); a Phase-3 coverage review killed one more finding and three FALSE CONFIRMEDs. THE HEADLINE: the clone's gameplay constants were transcribed from a `.RADIX 16` region AS IF DECIMAL. ACCEL=30 means 0x30=48; P.INDP=1080 means 0x1080=4224; P.MNDP=140 means 0x140=320; S.MAXZ=19 means 0x19=25; HORZ=1000 means 0x1000=4096. ~30 constants, nearly all wrong in the same direction, which is why the game 'seems way off'. THE RADIX SWEEP (rb4-1) BLOCKS EVERY OTHER NUMERIC STORY — anything numeric that lands first re-bakes the decimal reading and then confirms itself against this document. ROOT CAUSE: our OWN doc, red-baron/docs/red-baron-1980-source-findings.md, sourced its enemy constants to R2BRON.MAC — a build that NEVER SHIPPED, sitting beside the real one and differing in two lines (FRMECNT=5 vs 4) — and misread that build's hex as decimal. Production code cites the doc as authority, so rb4-2 must retract it or it re-infects the next story. Note what is NOT wrong: the timebase is already correct (NMI 250 Hz / display 62.5 Hz / calc frame 96 ms = 10.4167 Hz, RBGRND.MAC:102 + CALCNT=0x18), and topology.ts is byte-exact — the picture ROM is genuinely .RADIX 10, so reading it as decimal was RIGHT. The transcriber applied decimal everywhere: correct for the geometry, wrong for every constant. RULINGS (user, 2026-07-13): all eleven fix-clusters bought; C12 (PERCENT, the EAROM-backed adaptive difficulty that retunes every closing speed to hit an operator-set game duration) is a DELIBERATE DESCOPE — it is a coin-throughput device and this repo does not replicate quarter-extracting mechanics. It is recorded in the audit, filed nowhere. red-baron/tools/audit + tests/audit/citations.test.ts re-open every cited line byte-for-byte and must stay green; the checker REJECTS any citation to the decoy build."
priority: p1
status: backlog
repos: red-baron
stories:
  - id: rb4-1
    title: "THE RADIX SWEEP — the ROM's constants are HEX; we read them as decimal. ~30 of them."
    description: "Cluster C1. Subsumes EN-002, EN-003, EN-004, EN-014, CB-003, CB-011, CB-018, CB-019, MI-010, MI-011, MI-014, MI-015, MI-016, MI-017, MI-022, FL-016, FL-017, RD-003, RD-016 (~19 findings, ~30 constants — the same error filed nineteen ways). The single most important story in the epic and the gate on everything numeric. LAND THIS ALONE AND FIRST: every other numeric story is downstream, and any that lands first bakes the decimal reading into its own baseline and then 'confirms' itself against this document. RBARON.MAC is `.RADIX 16` from line 74; the ONLY decimal island is :6217-6280 (the vertex table — which we already read correctly). A trailing period forces decimal inside a hex region (`CMP I,250.` is 250, not 592). Expect the whole numeric test suite to re-baseline — that is the point, not a regression."
    points: 8
    priority: p1
    status: done
    repos: red-baron
    workflow: tdd
    acceptance_criteria:
      - "Every constant transcribed from a `.RADIX 16` region is corrected. At minimum: ACCEL 30→0x30=48 (enemy.ts:44); P.INDP 1080→0x1080=4224; MIN_DEPTH 140→0x140=320 (enemy.ts:63); S.MAXZ 19→0x19=25 (guns.ts); EX.ACY -20→-0x20=-32 (explosion.ts); wreck Z spin 0x180; PLANE1/PLANE2 drone offsets 100→0x100=256; HORZ 1000→0x1000=4096 and HORIZN=0x40=64 (scene.ts / camera); PFOBIZ mountain depths+X; P.OBDZ=0x180 and the 0x20 fallen delta; P.OBZI=0x7F00 recycle; the 16-bit recycle threshold 0x01C0=448 (NOT 0xC0)."
      - "Each corrected constant carries a comment citing file:line AND the radix region that governs it — e.g. `// RBARON.MAC:465, .RADIX 16 region (set at :74) → 0x30 = 48`. A bare number with no radix note is a failure of this story."
      - "PLPOSZ is corrected in ALL FOUR respects EN-014 names — sign (negative, added to depth so depth falls), magnitude (hex), length (nine entries), and the level ramp — not just the radix."
      - "A test or script proves NO remaining gameplay constant in src/core/ was taken from a hex region and written as decimal. The transcription is auditable, not asserted."
      - "The 42-vertex biplane, topology.ts and the picture-ROM data are NOT touched: 037007.XXX really is .RADIX 10 from line 80 and our decimal reading of it is CORRECT. Changing it would BREAK the geometry. Say so in the story's own notes."
      - "npm test -- citations stays green."
    completed: '2026-07-13'
    branch: fix/rb4-1-radix-sweep
    type: bug
    review_findings: '3 HIGH: (1) blimp despawns mid-screen — CRUISE_DEPTH 600→2112 moved the airship 3.52x but BLIMP_DESPAWN_X=640 and the entry band did not; blimp now enters near screen centre and is deleted at NDC 0.295, still in frame. A SECOND class of scale-coupled constant (screen-space X/Y read at a depth) that nobody enumerated. (2) the guns→render seam is guarded only by defeatable regexes — reintroduced the exact rejected bug with 799/799 green via SHELL_RANGE_DEPTH/8 + a dead void shellDepth(0) call; shellSegments still lives in the untestable main.ts. (3) the anti-tamper lock is bypassable with LEGAL schema keys — reclassify a finding to NO_COUNTERPART + ours:null and both gates skip it (18/18 green, proven on real EN-001).'
