id: sw6
type: epic
title: Star Wars — ROM audio fidelity (the music that has never played)
description: 'Star Wars ships a complete, correct music path that has never made a sound: sw3-5 wired the core phase-edge MusicEvent -> main.ts startLoop -> @arcade/shared/audio music channel, but the four .wav assets it points at were never produced and 404 on R2 (the sfx/ prefix, by contrast, is populated). The shared engine degrades silently at every failure path, so a missing asset is indistinguishable from working code — the game has simply been quiet since the feature shipped. Asset production was explicitly scoped out of sw3-5 and flagged by TEA, Dev and the Reviewer as a non-blocking Delivery Finding; no follow-up story was ever filed. This epic is that follow-up. Design: docs/superpowers/specs/2026-07-13-star-wars-music-bake-design.md'
priority: p1
status: backlog
repos: star-wars, orchestrator
stories:
  - id: sw6-1
    title: Bake the four POKEY music loops from the original 1983 source — port Rusty's POKEY Music driver (SNDPM.MAC) + the SWMUS.MAC tunes, upload to R2, and make Star Wars audible for the first time
    description: "Star Wars has never played music in production: the four .wav loops sw3-5's MUSIC manifest points at 404 on R2, and the shared audio engine's silent-degrade contract turns that into silence rather than an error. Produce them. Design: docs/superpowers/specs/2026-07-13-star-wars-music-bake-design.md. DO NOT reverse-engineer the disassembly (Music_Functions.asm's `fdb $805A, $8701, $3316` note words) and DO NOT emulate the sound board (we have no sound ROM binary, and the disasm listing carries mnemonics without opcode bytes, so one cannot be rebuilt from it). The ORIGINAL 1983 Atari source has the music fully commented at ~/Projects/star-wars-1983-source-text: SWMUS.MAC ('STAR WARS TUNES' — TUNTAB + every voice's note stream, with each assembled .BYTE carrying its original macro call as a comment directly above it, so the encoding documents itself: `;.CKEY 0` -> `.BYTE 85, 0`, `;.CALL 5` -> `.BYTE 8D, 5`, `;.ENDT` -> `.BYTE 0,0`) and SNDPM.MAC ('(RUSTY''S POKEY MUSIC) DRIVER, 6809 VERSION' — the opcode dispatch table, the note->frequency table, and the frequency/amplitude envelope engines). This is the pattern speech-bake already proved: it did not emulate the 6809 either, it lifted the LPC data from the source and re-implemented only the TMS5220 decoder in JS. Same here — lift the tune data, port the player, feed the ALREADY-VENDORED POKEY core (tools/pokey-bake/vendor/pokey.js). No second POKEY implementation enters the repo."
    points: 8
    priority: p1
    status: in_review
    started: '2026-07-14'
    repos: star-wars, orchestrator
    workflow: tdd
    acceptance_criteria:
      - "PROVENANCE — the tune data is generated from SWMUS.MAC (the original source), not hand-authored and not transcribed from the disassembly's fdb words. Mirror tools/speech-bake/gen-speech-data.mjs: a generator writes the data module, and the module says so and is not hand-edited."
      - "THE PLAYER is a port of SNDPM.MAC: opcode dispatch, .CKEY key offset, .CALL, .GOSUB/.RETURN ($90/$91), .LOOP, .ENDT (0,0 terminator), the note->AUDF frequency table, and the frequency + amplitude envelopes (NUL/OFS/HRN/TRB/BAS/GLK/WW and NUL/SDR/HRD/QKR/TIE). An opcode or envelope the four in-scope tunes never reach MAY be left unimplemented — but it must THROW on encounter, never silently no-op. A silent no-op is how a tune loses a voice and nobody notices."
      - "ORACLE — SWMUS.MAC comments its note streams in human notation (`.NOTE G5A,FS5A,E5B,D6H`). Pin the decoder against them: the bytes must decode to the notes the 1983 author wrote down. This is the hand-transcribed ROM oracle every fidelity story in this sprint carries, and here it is free — the source states the answer."
      - "RADIX TRAP — SWMUS.MAC and SNDPM.MAC are `.RADIX 16`; constants are HEX unless the trailing-dot decimal trick is used (the file's own opening `.RADIX 16.` is a DECIMAL 16). A test must REFUTE the decimal reading of the frequency table and note durations, not merely assert the hex one. This project has been bitten twice already (red-baron RBARON/RBGRND equates; star-wars WSOBJ .PH vertices) — a decimal misread yields music that is plausible and wrong."
      - "PHASE->TUNE MAPPING comes from the source's own named entry points, which state it outright: space=PMTH5 (';MAIN THEME (START OF GAME)'), towers=PMBEN (';BENS THEME (START OF TOWER)'), trench=PMRRP (';REBEL THEME WITH REPEATS(TRENCH WITH REPEATS)' — the with-repeats variant IS the looping trench cue), imperialMarch=PMDAR (';LORD VADER''S THEME'). Pin the mapping in a test so a future edit cannot silently reassign a theme."
      - "SEGMENTS — the main board fires TWO space cues ($24/$25 'space wave music 1/2') and TWO towers cues ($20/$21), so the cabinet has more segments per phase than our four-file manifest has slots. Decide EXPLICITLY, with the ROM evidence written into the session: either bake one flattened loop per phase (manifest unchanged) or extend the MUSIC manifest to carry the segments (audio.ts + the sw3-5 music-channel tests move with it). Do not quietly pick one."
      - "THE BAKE is headless and reproducible, mirroring tools/pokey-bake/bake-sfx.mjs, and drives the SAME vendored web-pokey core — no second POKEY implementation enters the repo. It emits four seamless loops: space_theme.wav, towers_theme.wav, trench_theme.wav, imperial_march.wav (or the manifest's names as revised under the SEGMENTS criterion; manifest and filenames must agree in the same PR)."
      - "UPLOAD — the four .wav are live in the arcade-assets R2 bucket under star-wars/music/ and answer 200. There is NO automated upload path for arcade-assets today (CI deploys each app's dist/ only; the existing sfx/ and speech/ appear to have been placed by hand): this story either adds one (a `just deploy-assets` recipe) or documents the manual step in docs/ops/hosting.md. A story that bakes four beautiful .wav files and never uploads them leaves the game exactly as silent as it is now."
      - "THE ACCEPTANCE TEST IS A LIVE 200, NOT A GREEN VITEST — with the assets live, entering each phase rings the right loop and sw3-5's single-music-channel invariant still holds (one loop at a time; a phase edge swaps it). Verify in the browser and say so in the session; this is shell/IO and no unit test can prove it."
    type: feature
  - id: sw6-2
    title: A music cue that arrives before its buffer decodes is lost forever — the first-ever visitor hears no space theme, because @arcade/shared/audio's startSource silently no-ops on an unloaded buffer
    description: "sw6-1 baked the four loops and put them live on R2 — and a first-time visitor STILL hears no space theme. Found by Dev during sw6-1 by actually playing the game, not by a test. The music buffers (~5 MB) only begin fetching when `resume()` calls `load()` (arcade-shared/src/audio.ts:80,116), and `resume()` is wired to the first user gesture (star-wars/src/main.ts:57). On that very same keypress the core fires its run-start MusicEvent, so `startLoop('space')` (main.ts:223) reaches `startSource` (audio.ts:138) BEFORE the buffer exists, hits `if (!buffer) return  // silent no-op` (audio.ts:141), and the entire space phase plays in silence. The second run has music, because by then the buffers have decoded — which is exactly why this survived sw6-1's browser check. This is the SAME silent-degrade contract that hid this epic's 404s for a full epic: the assets are now genuinely correct, and the engine is now hiding a load race instead of a missing file. The engine is shared, so every consumer whose first music cue rides the unlock gesture has this bug, not just star-wars."
    points: 3
    priority: p1
    status: backlog
    repos: arcade-shared, star-wars
    workflow: tdd
    acceptance_criteria:
      - "REPRODUCE IT FIRST, IN A TEST — a failing test pins the actual defect: `startLoop(name)` issued BEFORE that name's buffer has decoded currently plays nothing, ever. Note arcade-shared's tests are untyped and run in a node env (no root tsconfig; vitest strips types), so pin the contract at RUNTIME, never with a compile-only annotation."
      - "A LOOP REQUESTED EARLY IS HONOURED LATE — `startSource` remembers the requested loop and starts it when that buffer finishes decoding (audio.ts:89, where the decode resolves). Scope this to the LOOP path only: a one-shot `play()` that arrives early must still be DROPPED. A laser that fires before its sample decodes should not fire half a second late, out of sync with the shot that caused it — music is sustained and positional in time, a sound effect is not."
      - "LAST REQUEST WINS, AND THE SINGLE-MUSIC-CHANNEL INVARIANT HOLDS — if two loops are cued before either decodes (a fast phase edge on a cold load), only the most recent one may sound. sw3-5's invariant is one looping source at a time on the `music` channel; a pending-start queue must not resurrect a stale track behind the current one."
      - "A LOOP CANCELLED BEFORE IT DECODES MUST NEVER START — `stopLoop()`, or a phase edge that swaps the track, between the request and the decode cancels the pending start. Otherwise the fix introduces a new bug: music that fades up seconds after the phase that wanted it has ended."
      - "`ready()` IS NOT THE FIX, AND IS ITSELF MISLEADING — `ready()` returns `buffers.size > 0` (audio.ts:175), i.e. TRUE as soon as ANY ONE sound has decoded. The tiny SFX always win the race against the ~5 MB music, so gating START on `ready()` would NOT fix this and would look like it had. Either make `ready()` mean what its name says, or leave it and record explicitly in the session why it cannot be the gate."
      - "A MISSING ASSET MUST STILL BE DISTINGUISHABLE FROM A SLOW ONE — the decode path already swallows a failed fetch (audio.ts:93, `one missing sound is non-fatal`). Do not turn the pending-start into a queue that waits forever and thereby hides a 404 the way this epic's original bug was hidden. A request for a sound that FAILED to load must not sit pending indefinitely with no trace."
      - "THE FIX IS SHARED, SO THE FLEET INHERITS IT — the change lands in `arcade-shared` and ships as a tagged version; star-wars re-pins to that tag in the same PR-set (git-URL dependency, so force the install: `npm install \"@arcade/shared@github:...#ref\"`). Any other game whose first music cue rides the unlock gesture gets the fix for free on its next re-pin; say in the session which ones were checked."
      - "THE ACCEPTANCE TEST IS A COLD LOAD IN A REAL BROWSER, NOT A GREEN VITEST — hard-refresh with an EMPTY CACHE (a warm cache is precisely what hides this), press START on the very first keypress, and hear the space theme from the first note of the first run. No unit test can prove this; verify it in the browser and say so in the session. Port trap: a pinned arcade port may be served by a SIBLING CHECKOUT (a-2/a-3), so confirm the server's cwd with `lsof` before trusting what you hear."
    type: bug
  - id: sw6-3
    title: The POKEY player's fail-loudly rule holds in the middle of the note path but not at its two boundaries — a note transposed onto index 0 becomes a silent rest, and a stray .ENDL silently replays a voice 256 times
    description: "Found by the Reviewer on the sw6-1 re-review, by fuzzing the boundaries rather than reading the diff — both are already MERGED on develop (PR #86), so this is a follow-up, not an amend. sw6-1's central rule is AC-2's `it must THROW on encounter, never silently no-op`, and the H1 rework made the note lookup obey it. But the rule holds in the MIDDLE of the note path and not at either END. (a) `NOTTAB[note]` returns `undefined` off the array — which now throws — but returns `0` at index 0, which does not: index 0 is the REST divisor, so a real note transposed onto exactly the rest slot is force-muted by `output()` and vanishes, with no error. Reproduced: `decodeVoice([0x85, -66, 0x42, 0x16, 0, 0])` (`.CKEY -66` on F5) yields `{note: 0}` and no throw, while one semitone further (`-67`) throws. The guard is off by one, in the direction of silence. (b) The L2 `.LOOP 0` fidelity fix reproduced the ROM's 8-bit `DEC`, which was correct, but it regressed malformed input: a stray `.ENDL` with no open `.LOOP` used to be a harmless no-op (`0 - 1 = -1`, not `> 0`, no jump) and now takes the counter `(0 - 1) & 0xff = 255` and jumps to `loopPc`, which defaults to 0 — the top of the stream. Reproduced: `decodeVoice([0x42, 0x16, 0x8f, 0, 0, 0])` decodes to 256 notes, stays under MAX_STEPS, and throws nothing — a silently 256x-repeated voice, from the file whose whole thesis is that nonsense must be loud. NEITHER is reachable in the shipped corpus (measured: minimum effective note 25, maximum 73; 30 balanced .LOOP/.ENDL pairs, 0 strays), so nothing in production is broken and the four live .wav are verified correct — but that is exactly what was true of the H1 hole right before it was fixed, and both go live the moment the generator is pointed at a sixth tune (the epic has more: the cantina tune CNTV4 is still out of scope, and it is the one that uses .GOSUB)."
    points: 2
    priority: p2
    status: backlog
    repos: star-wars
    workflow: tdd
    acceptance_criteria:
      - "RED FIRST, WITH THE TWO REPROS ABOVE — both defects must be pinned by a FAILING test before either is fixed. `decodeVoice([0x85, -66, 0x42, 0x16, 0, 0])` must currently return `{note: 0}` silently, and `decodeVoice([0x42, 0x16, 0x8f, 0, 0, 0])` must currently return 256 notes. If either test passes before the fix, the repro is wrong and the story is built on sand."
      - "A COMPUTED ZERO IS NOT A REST — a note byte that TRANSPOSES onto NOTTAB index 0 must THROW, naming the note, the key and the result, exactly as the off-array case already does. A WRITTEN rest (`op === 0`) is a different thing entirely and must be left alone: it is never transposed (`BEQ 9$ ;?SOUNDFUL NOTE?(NOT A REST)`) and it must stay a rest however far the key has wandered. The distinction is `op !== 0 && note === 0`."
      - "THE CORPUS GUARD MUST BE ABLE TO SEE THE EVENT IT IS NAMED FOR — `music-data.test.mjs`'s `sounds every note in the corpus ON the table` computes `sounded = effective.filter(n => n !== 0)` and then asserts `min === 25`. A real note transposed onto 0 is therefore RECLASSIFIED AS A REST and drops out of the sample rather than tripping the margin — the one test written to prove `nothing quietly becomes a rest` is blind to precisely that. Fix the guard so it would actually fail."
      - "A STRAY .ENDL MUST THROW, AND .LOOP 0 MUST STILL WRAP — initialise `loopPc` to null and throw on an `.ENDL` with no open loop. Do NOT regress the L2 fix while fixing its regression: `.LOOP 0` must still run the body 256 times (the ROM's `DEC VLC` is 8-bit, so 0 wraps to 255), and that test must stay green."
      - "THE AUDIO MUST NOT CHANGE — this is a guard-tightening story, not a retune. After the fix, all four tracks must rebake BYTE-FOR-BYTE identical to what the arcade-assets R2 bucket is serving (checksum them; `space_theme` = c02721a48db70fd8…, `towers_theme` = 0e87629178aef313…, `trench_theme` = dd2d469e07230fbe…, `imperial_march` = 3a3289570b252340…). If a checksum moves, the new throw is firing on a REAL note and the fix is wrong. No re-upload should be needed."
      - "THE SHIPPED CORPUS MUST STILL DECODE — all 24 voices must still decode without throwing, and the measured margins must hold (min effective note 25, max 73; 30 balanced .LOOP/.ENDL pairs). The whole point of a loud guard is that it stays silent on good data."
    type: bug
